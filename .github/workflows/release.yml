name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create and publish (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          tag='${{ inputs.tag }}'
          if ! [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must match MAJOR.MINOR.PATCH (optional pre-release suffix), got: $tag"
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on the remote"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "API Team"
          git config user.email "api-team@thousandeyes.com"
          
          git tag -a '${{ inputs.tag }}' -m "Release ${{ inputs.tag }}"
          git push origin '${{ inputs.tag }}'

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
