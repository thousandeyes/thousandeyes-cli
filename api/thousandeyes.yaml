      operationId: getAllAzureMonitoringIntegrations
      description: >-
        Retrieves all Azure inventory and flow logs monitoring integrations
        configured for the authenticated account group in ThousandEyes.
      parameters:
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_AccountGroupId
      responses:
        '200':
          description: >
            The response is an array of integration objects, where each object
            represents either an Azure Inventory Monitoring or Azure Flow Logs
            Monitoring integration. Each integration includes metadata such as:
            id — the unique identifier of the integration; name — the
            user-defined name of the integration; appId / clientId — the Azure
            Application (client) ID of the service principal used for
            authentication; password / clientSecret — the client secret value
            associated with the service principal (note: for security reasons,
            the actual secret is never returned. The response includes a masked
            value ("********") instead); azureTenantId — the Azure Active
            Directory tenant ID associated with the integration;
            serviceBusQueueUrl — the Service Bus queue URL used for flow logs
            monitoring (only present for azure-flow-logs-monitoring
            integrations); monitoringType — specifies whether the integration
            monitors Azure resources (azure-inventory-monitoring) or Azure flow
            logs (azure-flow-logs-monitoring); links — HAL-style link relations
            that provide the "self" URL for retrieving integration details. This
            endpoint can be used to: audit all existing Azure integrations
            configured for Cloud Insights, identify which integrations are
            configured for inventory versus flow logs monitoring, and retrieve
            integration IDs for further API operations such as inspection (GET
            /cloud-insights/integration/azure/{integrationId}) or deletion
            (DELETE). The response is returned as a JSON array conforming to the
            AwsMonitoringIntegration schema.
