            $ref: '#/components/schemas/Emulation_API_UserAgent'
        _links:
          $ref: '#/components/schemas/Emulation_API_SelfLinks'
    Emulation_API_UserAgent:
      type: object
      properties:
        browser:
          type: string
          description: The name of the web browser.
          example: Firefox
        os:
          type: string
          description: The operating system for the user-agent HTTP header.
          example: Windows
        value:
          type: string
          description: The text of the user-agent header.
          example: >-
            Mozilla/5.0 (Linux; Android 6.0; Nexus 5 Build/MRA58N)
            AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.5993.70 Mobile
            Safari/537.36
    Emulation_API_EmulatedDevice:
      type: object
      required:
        - category
        - width
        - height
      properties:
        category:
          $ref: '#/components/schemas/Emulation_API_EmulatedDeviceCategory'
        width:
          type: integer
          description: The width of the display of the emulated device.
          example: 1024
          minimum: 50
          maximum: 9999
        height:
          type: integer
          description: The height of the display of the emulated device.
          example: 768
          minimum: 50
          maximum: 9999
    Emulation_API_EmulatedDeviceResponses:
      type: object
      properties:
        emulatedDevices:
          type: array
          items:
            $ref: '#/components/schemas/Emulation_API_EmulatedDeviceResponse'
        _links:
          $ref: '#/components/schemas/Emulation_API_SelfLinks'
    Emulation_API_EmulatedDeviceResponse:
      allOf:
        - $ref: '#/components/schemas/Emulation_API_EmulatedDevice'
        - type: object
          properties:
            name:
              type: string
              description: The device name
              example: iPad Pro 12.9-in
            codeName:
              type: string
              description: A code corresponding to the device name.
              example: IPAD_PRO_12_9
            id:
              type: string
              description: ID of the emulated device.
              example: '11'
            availableUserAgents:
              type: array
              description: A list of user-agent strings for this emulated device.
              items:
                type: string
              example:
                - >-
                  Mozilla/5.0 (Linux; Android 6.0; Nexus 5 Build/MRA58N)
                  AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.5993.70
                  Mobile Safari/537.36
                - >-
                  Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36
                  (KHTML, like Gecko) Chrome/118.0.5993.70 Safari/537.36
            defaultUserAgentTemplate:
              type: string
              description: The default user-agent template to use for this device.
              example: >-
                Mozilla/5.0 (Android 4.4; Tablet; rv:70.0) Gecko/70.0
                Firefox/70.0
    Emulation_API_ExpandEmulatedDeviceOptions:
      type: string
