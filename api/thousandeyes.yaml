            Default global dashboard filter ID (obtained from
            `/dashboards/filters` endpoint).
          example: 65babd9bb90bf55b17c96c8d
    Dashboards_API_LegacyDashboardSnapshot:
      deprecated: true
      type: object
      properties:
        accountId:
          deprecated: true
          type: integer
          format: int64
          description: Identifier of the account group that the snapshot belongs to.
          example: 1234
        createdDate:
          deprecated: true
          type: string
          description: UTC date when dashboard snapshot was created.
          example: '2023-05-16 10:14:28'
        expirationDate:
          deprecated: true
          type: string
          description: >-
            Expiration date of the snapshot. If unspecified, the snapshot
            expires 1 year from its creation date. The expiration date must be
            set within 5 years from the current date.
          example: '2023-05-16 10:14:28'
        permalink:
          deprecated: true
          type: string
          description: Hyperlink to dashboard snapshot in ThousandEyes Application
          example: >-
            https://app.thousandeyes.com/dashboard/?snapshotId=d28bb71f-5a47-4783-8f12-d4b115e61b0c
        apiLinks:
          deprecated: true
          type: array
          description: A links array containing the self link.
          items:
            type: object
            additionalProperties: true
    Dashboards_API_ApiDashboardSnapshot:
      allOf:
        - type: object
          properties:
            snapshotId:
              $ref: '#/components/schemas/Dashboards_API_DashboardSnapshotId'
            snapshotName:
              type: string
              description: Name of the dashboard snapshot.
              example: HTTP Server Dashboard Snapshot
            aid:
              type: string
              description: Identifier of the account group that the snapshot belongs to.
              example: '1234'
            isShared:
              type: boolean
              description: Set `true` if dashboard snapshot is shared, `false` otherwise.
            snapshotCreatedDate:
              type: string
              format: date-time
              description: >-
                UTC date when dashboard snapshot was created (ISO date-time
                format).
              example: '2023-05-16T10:14:28Z'
            dashboard:
              $ref: '#/components/schemas/Dashboards_API_ApiDashboard'
            widgets:
              type: array
              items:
                $ref: '#/components/schemas/Dashboards_API_ApiWidget'
            isScheduled:
              type: boolean
              description: >-
                Set `true` if dashboard snapshot was generated from a schedule,
                `false` otherwise.
            timeSpan:
              $ref: '#/components/schemas/Dashboards_API_ApiReportSnapshotTimeSpan'
            snapshotExpirationDate:
              $ref: '#/components/schemas/Dashboards_API_SnapshotExpirationDate'
            _links:
              $ref: '#/components/schemas/Dashboards_API_AppAndSelfLinks'
        - $ref: '#/components/schemas/Dashboards_API_LegacyDashboardSnapshot'
    Dashboards_API_ApiReportSnapshotTimeSpan:
      type: object
      description: Time span of the dashboard snapshot.
      properties:
        startDate:
          deprecated: true
          type: string
          description: UTC start date of dashboard snapshot.
          example: '2023-05-16 10:14:28'
        start:
          type: string
          format: date-time
          description: UTC start date of dashboard snapshot (ISO date-time format).
          example: '2023-05-16T10:14:28Z'
        duration:
          type: integer
          format: int64
          description: Duration of dashboard snapshot in seconds.
          example: 60
    Dashboards_API_DashboardSnapshotsPage:
      type: object
      description: Dashboard snapshots page.
      properties:
        pages:
          deprecated: true
          type: object
          additionalProperties: true
        dashboardSnapshots:
          type: array
          items:
            $ref: '#/components/schemas/Dashboards_API_ApiDashboardSnapshot'
        _links:
          $ref: '#/components/schemas/Dashboards_API_PaginationLinks'
    Dashboards_API_DashboardLayout:
      description: Dashboard layout configuration for arranging widgets.
      type: object
      required:
        - type
      properties:
        layoutId:
          type: string
          description: Unique identifier for the layout.
          example: grid-layout-1
        type:
          $ref: '#/components/schemas/Dashboards_API_DashboardLayoutType'
        details:
          $ref: '#/components/schemas/Dashboards_API_DashboardLayoutDetails'
      example:
        layoutId: grid-layout-1
        type: grid
        details:
          widgetPositioning:
            - x: 0
              'y': 0
              w: 9
              h: 5
              id: widgetId-71lbb
    Dashboards_API_DashboardLayoutType:
      type: string
      description: Type of the layout.
      enum:
        - grid
        - vertical
      example: grid
    Dashboards_API_DashboardLayoutDetails:
      description: Layout details including widget positioning.
      type: object
      nullable: true
      properties:
        widgetPositioning:
          type: array
          description: List of widget positions within the layout.
          items:
            $ref: '#/components/schemas/Dashboards_API_WidgetPosition'
          example:
            - x: 0
              'y': 0
              w: 9
              h: 5
              id: widgetId-71lbb
      example:
        widgetPositioning:
          - x: 0
            'y': 0
            w: 9
            h: 5
            id: widgetId-71lbb
    Dashboards_API_WidgetPosition:
      description: Position and size of a widget in the layout grid.
      type: object
      required:
        - x
        - 'y'
        - w
        - h
      properties:
        x:
          type: integer
          format: int32
          description: Horizontal position.
          example: 0
        'y':
          type: integer
          format: int32
          description: Vertical position.
          example: 0
        w:
          type: integer
          format: int32
          description: Width in grid units.
          example: 9
        h:
          type: integer
          format: int32
          description: Height in grid units.
          example: 5
        id:
          type: string
          description: Identifier of the widget this position applies to.
          example: widgetId-71lbb
    Dashboards_API_DashboardLinks:
      type: object
      description: A links object containing the self and the snapshots links.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Dashboards_API_Link'
        snapshots:
          $ref: '#/components/schemas/Dashboards_API_Link'
    Dashboards_API_BinSize:
      type: integer
      format: int64
      description: Duration of each bin.
      example: 3600
    Dashboards_API_Timestamp:
      type: integer
      format: int64
      description: Timestamp of the aggregated data point.
      example: 1567620000
    Dashboards_API_WidgetValue:
      type: number
      format: double
      description: Aggregated value.
      example: 100
    Dashboards_API_WidgetStatus:
      type: string
      description: Message for not fully configured card or no data.
      example: No data
    Dashboards_API_ApiContextFiltersResponse:
      type: object
      description: All global dashboard filters saved.
      properties:
        dashboardFilters:
          type: array
          items:
            $ref: '#/components/schemas/Dashboards_API_ApiContextFilterResponse'
    Dashboards_API_ApiDashboardFilterName:
      type: string
      description: The name of the dashboard filter, this must be unique.
      example: cea-filter
    Dashboards_API_ApiDashboardFilterDescription:
      type: string
      description: An optional description of the filter.
      example: Global filter for CEA widgets
    Dashboards_API_ApiDashboardFilterUserDetails:
      type: object
      description: Details of user who created or modified the filter.
      properties:
        uid:
          type: string
          description: Unique ID of the user.
          example: '1'
        name:
          type: string
          description: Name of the user.
          example: Test User
    Dashboards_API_ApiContextFilterRequest:
      type: object
      description: >-
        Request containing dashboard filter name, description and context
        details.
      properties:
        context:
          $ref: '#/components/schemas/Dashboards_API_ApiContextFilters'
        name:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterName'
        description:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterDescription'
      required:
        - name
        - context
    Dashboards_API_ApiContextFilterResponse:
      description: Response containing dashboard filter settings and context details.
      type: object
      properties:
        context:
          $ref: '#/components/schemas/Dashboards_API_ApiContextFilters'
        aid:
          type: string
          description: Account group ID of the filter.
          example: '11'
        id:
          type: string
          description: Unique ID of the dashboard filter.
          example: 65bc18e8f2073a4a469cd958
        name:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterName'
        description:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterDescription'
        createdBy:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterUserDetails'
        modifiedDate:
          type: string
          format: date-time
          description: Timestamp when the filter was last modified.
          example: '2024-02-01T22:19:19+00:00'
        createdDate:
          type: string
          format: date-time
          description: Timestamp when the filter was created.
          example: '2024-02-01T22:19:19+00:00'
        modifiedBy:
          $ref: '#/components/schemas/Dashboards_API_ApiDashboardFilterUserDetails'
        _links:
          $ref: '#/components/schemas/Dashboards_API_SelfLinks'
      required:
        - id
        - aid
        - name
        - context
    Dashboards_API_ApiContextFilters:
      type: array
      description: List of filters to be applied to a dashboard.
      uniqueItems: true
      items:
        $ref: '#/components/schemas/Dashboards_API_ApiDataSourceFilters'
    Dashboards_API_ApiDataSourceFilters:
      type: object
      description: List of different datasource filters.
      properties:
        dataSourceId:
          type: string
          description: Types of data source.
          example: VIRTUAL_AGENT
        filters:
          type: array
          description: List of different filter properties.
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Dashboards_API_ApiDataSourceFilter'
      required:
        - dataSourceId
        - filters
    Dashboards_API_ApiDataSourceFilter:
      type: object
      description: List of different filter properties for a single datasource.
      properties:
        filterId:
          type: string
          description: Data source property to filter by.
          example: TEST_LABEL
        values:
          type: array
          uniqueItems: true
          description: Values to filter by based on the specified `filterId`.
          example:
            - '45862'
            - '59749'
          items:
            type: string
        metricIds:
          type: array
          uniqueItems: true
          description: Dashboard metric associated with the filter property.
          example:
            - WEB_PAGE_LOAD_COMPLETION_RATE
            - WEB_TTFB
            - WEB_AVAILABILITY
          items:
            type: string
      required:
        - filterId
        - values
        - metricIds
    Dashboards_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Dashboards_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Dashboards_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Dashboards_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Dashboards_API_ValidationErrorItem'
    Dashboards_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Dashboards_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
