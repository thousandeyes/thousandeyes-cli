                Indicates whether this dashboard is the account group's default.
                True for default, false if not.
              example: false
            widgets:
              type: array
              items:
                $ref: '#/components/schemas/Dashboards_API_ApiWidget'
            description:
              type: string
              example: HTTP Server Widgets
              description: >-
                A text description of the dashboard's purpose and functionality.
                This information assists users in understanding the dashboard
                but isn't displayed when viewing a dashboard.
            defaultTimespan:
              $ref: '#/components/schemas/Dashboards_API_DefaultTimespan'
            isGlobalOverride:
              type: boolean
              description: >-
                When set to `true`, the defaultTimespan is used and overrides
                the widget's timespan. If set to `false`, the the widget's
                timespan is used.
            isMigratedReport:
              type: boolean
              readOnly: true
              description: True if this dashboard was previously a report.
              example: false
            layout:
              $ref: '#/components/schemas/Dashboards_API_DashboardLayout'
            _links:
              $ref: '#/components/schemas/Dashboards_API_DashboardLinks'
        - $ref: '#/components/schemas/Dashboards_API_DashboardGlobalFilterId'
        - $ref: '#/components/schemas/Dashboards_API_LegacyApiDashboard'
