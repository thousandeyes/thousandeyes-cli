      allOf:
        - $ref: '#/components/schemas/Endpoint_Tests_API_EndpointInstantTest'
        - $ref: '#/components/schemas/Endpoint_Tests_API_EndpointHttpServerBaseTest'
        - type: object
          required:
            - url
          properties:
            hasPing:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestRequestHasPing'
            hasTraceroute:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestRequestHasTraceRoute'
            networkMeasurements:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestNetworkMeasurements'
            targetResponseTime:
              type: integer
              description: >-
                Response time target in milliseconds. Affects the colors of
                agents and legends on the view page. The value is compared with
                actual response time in order to determine the color scale (from
                green to red).
              default: 1000
              example: 1000
            password:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestPassword'
            tcpProbeMode:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestProbeMode'
            url:
              $ref: >-
                #/components/schemas/Endpoint_Tests_API_EndpointHttpServerTestUrl
