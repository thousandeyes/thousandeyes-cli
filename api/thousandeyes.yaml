    Alerts_API_AlertSimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Alerts_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Alerts_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Alerts_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Alerts_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >-
            Indicates if the test is a saved event.

            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Alerts_API_AlertTestType'
        _links:
          $ref: '#/components/schemas/Alerts_API_TestLinks'
    Alerts_API_AlertTestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
        - endpoint-http-server
        - endpoint-network-server
        - endpoint-path-trace
      description: Valid Alert Types for which to return test links.
      readOnly: true
      example: agent-to-server
    Alerts_API_ExpandAlertTestOptions:
      type: string
      enum:
        - test
    Alerts_API_Rules:
      type: object
      properties:
        alertRules:
          type: array
          items:
            $ref: '#/components/schemas/Alerts_API_BaseRule'
        _links:
          $ref: '#/components/schemas/Alerts_API_SelfLinks'
    Alerts_API_BaseRule:
      type: object
      required:
        - ruleName
        - expression
        - alertType
        - roundsViolatingOutOf
      properties:
        ruleId:
          $ref: '#/components/schemas/Alerts_API_RuleId'
        ruleName:
          type: string
          description: Name of the alert rule.
          example: The End of the Internet
        expression:
          type: string
          description: The expression of the alert rule.
          example: ((hops((hopDelay >= 100 ms))))
        description:
          type: string
          description: A description of the alert rule.
          example: A rule description string
        direction:
          $ref: '#/components/schemas/Alerts_API_AlertDirection'
        notifyOnClear:
          type: boolean
          description: Send notification when alert clears.
          example: true
        isDefault:
          type: boolean
          description: >-
            If set to `true`, this alert rule becomes the default for its test
            type and is automatically applied to newly created tests with
            relevant metrics. Only one default alert rule is allowed per test
            type.
          example: true
        alertType:
          $ref: '#/components/schemas/Alerts_API_AlertType'
        alertGroupType:
          $ref: '#/components/schemas/Alerts_API_AlertGroupType'
        minimumSources:
          type: integer
          description: >-
            The minimum number of agents or monitors that must meet the
            specified criteria to trigger the alert.
          example: 10
        minimumSourcesPct:
          type: integer
          description: >-
            The minimum percentage of all assigned agents or monitors that must
            meet the specified criteria to trigger the alert.
          example: 99
        roundsViolatingMode:
          $ref: '#/components/schemas/Alerts_API_AlertRoundsViolationMode'
        roundsViolatingOutOf:
          type: integer
          description: Specifies the divisor (y value) in the “X of Y times” condition.
          example: 5
        roundsViolatingRequired:
          type: integer
          description: Specifies the numerator (x value) in the “X of Y times” condition.
          example: 2
        includeCoveredPrefixes:
          type: boolean
          description: >-
            Set true to include covered prefixes in the BGP alert rule. Only
            applicable to BGP alert rules.
          example: true
        sensitivityLevel:
          $ref: '#/components/schemas/Alerts_API_SensitivityLevel'
        severity:
          $ref: '#/components/schemas/Alerts_API_Severity'
        endpointAgentIds:
          description: >-
            An array of endpoint agent IDs associated with the rule (get `id`
            from `/endpoint/agents` API). This is applicable when
            `alertGroupType` is `browser-session`.
          type: array
          items:
            description: Unique ID of the agent.
            type: string
            example: '281474976710706'
        endpointLabelIds:
          description: >-
            An array of label IDs used to assign specific Endpoint Agents to the
            test (get `id` from `/endpoint/labels`). This is applicable when
            `alertGroupType` is `browser-session`.
          type: array
          items:
            description: An Endpoint label ID.
            type: string
            example: '123456'
        visitedSitesFilter:
          description: >-
            A list of website domains visited during the session. This is
            applicable when `alertGroupType` is `browser-session`.
          type: array
          items:
            type: string
          example:
            - app.thousandeyes.com
    Alerts_API_Rule:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_RuleDetailUpdate'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Alerts_API_SelfLinks'
    Alerts_API_RuleDetail:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_BaseRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/Alerts_API_AlertNotification'
            tests:
              type: array
              items:
                $ref: '#/components/schemas/Alerts_API_AlertSimpleTest'
              readOnly: true
            testIds:
              type: array
              description: >-
                Array of test IDs to link to alert rule (get `testId` from
                `/tests` endpoint).
              readOnly: true
              items:
                type: string
              example:
                - '281474976710706'
                - '271659'
            _links:
              $ref: '#/components/schemas/Alerts_API_SelfLinks'
    Alerts_API_RuleDetailUpdate:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_BaseRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/Alerts_API_AlertNotification'
            testIds:
              $ref: '#/components/schemas/Alerts_API_RuleTestIds'
    Alerts_API_AlertMeta:
      type: object
      properties:
        version:
          type: integer
          format: int32
          description: >-
            Indicates the number of times this alert has re-entered the
            'trigger' state after being suppressed. It starts at 1 and
            increments whenever a real-time ASW ends and the alert conditions
            remain active.
          example: 1
    Alerts_API_BaseAlert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: A unique ID for each individual alert occurrence.
          example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
          readOnly: true
        alertType:
          $ref: '#/components/schemas/Alerts_API_AlertType'
        startDate:
          $ref: '#/components/schemas/Alerts_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Alerts_API_EndDate'
        violationCount:
          type: integer
          description: Number of sources that meet the alert criteria.
          example: 2
        duration:
          type: integer
          format: int64
          description: Duration in seconds the alert was active
          example: 60
        suppressed:
          type: boolean
          description: >-
            Indicates whether the alert is currently suppressed by a real-time
            ASW.
          example: false
        meta:
          $ref: '#/components/schemas/Alerts_API_AlertMeta'
        _links:
          $ref: '#/components/schemas/Alerts_API_AlertLinks'
    Alerts_API_LegacyAlert:
      type: object
      deprecated: true
      properties:
        alertId:
          deprecated: true
          type: string
          format: uuid
          description: A unique ID for each individual alert occurrence.
          example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
          readOnly: true
        dateStart:
          deprecated: true
          type: string
          description: The start date and time for querying alerts.
          example: '2020-04-23 13:43:16'
          readOnly: true
        dateEnd:
          deprecated: true
          type: string
          description: The end date and time for querying alerts.
          example: '2020-04-23 13:43:16'
          readOnly: true
        ruleId:
          deprecated: true
          type: integer
          format: int64
          description: Unique ID of the rule.
          example: 127094
          readOnly: true
        state:
          deprecated: true
          type: string
          description: 'Current state of the alert. Possible values: clear or trigger.'
          enum:
            - ACTIVE
            - CLEARED
          example: ACTIVE
          readOnly: true
        severity:
          deprecated: true
          type: string
          description: The severity of the alert.
          enum:
            - INFO
            - MAJOR
            - MINOR
            - CRITICAL
            - UNKNOWN
          example: MAJOR
        permalink:
          deprecated: true
          type: string
          description: Hyperlink to alerts list, with row expanded
          example: >-
            https://app.thousandeyes.com/alerts/list?__a=75&alertId=2783&agentId=12
        apiLinks:
          deprecated: true
          type: array
          description: List of hyperlinks to other areas of the API
          items:
            type: object
            additionalProperties: true
    Alerts_API_Alerts:
      type: object
      properties:
        alerts:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Alerts_API_Alert'
        _links:
          $ref: '#/components/schemas/Alerts_API_PaginationLinks'
    Alerts_API_Alert:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_BaseAlert'
