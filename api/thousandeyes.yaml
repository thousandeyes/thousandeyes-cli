      readOnly: true
      oneOf:
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAllAgentsSelectorConfig
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentLabelsSelectorConfig
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointSpecificAgentsSelectorConfig
      discriminator:
        propertyName: agentSelectorType
        mapping:
          all-agents: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAllAgentsSelectorConfig
          specific-agents: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointSpecificAgentsSelectorConfig
          agent-labels: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentLabelsSelectorConfig
      required:
        - agentSelectorType
    Endpoint_Test_Results_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Endpoint_Test_Results_API_TestIsPrioritized:
      type: boolean
      description: >-
        Indicates whether the test should be prioritized when the number of
        tests assigned to an agent exceeds the license limit.
      default: false
      example: false
    Endpoint_Test_Results_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Endpoint_Test_Results_API_TestIsEnabled:
      type: boolean
      description: Indicates if test is enabled.
      example: true
      default: true
    Endpoint_Test_Results_API_TestIsSavedEvent:
      type: boolean
      description: >
        Indicates if the test is a saved event.


        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      example: false
      readOnly: true
    Endpoint_Test_Results_API_TestHasPathTraceInSession:
      type: boolean
      description: >-
        Enables "in session" path trace. When enabled, this option initiates a
        TCP session with the target server and sends path trace packets within
        the established TCP session.
      example: true
    Endpoint_Test_Results_API_TestLabel:
      type: object
      properties:
        labelId:
          type: string
          description: Label ID.
        name:
          type: string
          description: Name of the label.
        isBuiltin:
          type: boolean
          description: >-
            Value indicating if the label in question is BuiltIn (Account Admin,
            Organization Admin, Regular User).
      example:
        labelId: '961'
        name: Artem label
        isBuiltin: false
    Endpoint_Test_Results_API_TestLabels:
      type: array
      description: >-
        Labels to which the test is assigned. This field is not returned for
        Instant Tests.
      readOnly: true
      items:
        $ref: '#/components/schemas/Endpoint_Test_Results_API_TestLabel'
    Endpoint_Test_Results_API_TestNetworkMeasurements:
      type: boolean
      description: >-
        Enable or disable network measurements. Set to true to enable or false
        to disable network measurements.
      default: true
      example: true
    Endpoint_Test_Results_API_EndpointTestProtocol:
      type: string
      enum:
        - icmp
        - icmp-with-tcp-connect
        - tcp
        - prefer-tcp
        - ast-autodetect
        - autodetect
      description: Protocol requested for the test.
      default: icmp
      example: icmp
    Endpoint_Test_Results_API_EndpointIpVersionOut:
      description: >-
        For reading current network test configurations, the IP version of the
        test. Values include V4_ONLY, V6_ONLY, V6_PREFER, and OS_DEFAULT.
      type: string
      example: V4_ONLY
    Endpoint_Test_Results_API_TestName:
      type: string
      description: Name of the test.
      example: Test name
    Endpoint_Test_Results_API_EndpointScheduledTestType:
      type: string
      enum:
        - agent-to-server
        - http-server
      description: Type of test being queried.
      example: agent-to-server
      readOnly: true
    Endpoint_Test_Results_API_TestProbeModeResponse:
      type: string
      enum:
        - auto
        - sack
        - syn
        - syn-pcap
        - syn-socket
        - unknown
      description: >-
        Probe mode returned by network test APIs, only valid when the protocol
        is set to TCP. Configuration responses return user-selectable values,
        while result responses may also return resolved driver values.
      default: auto
      example: auto
    Endpoint_Test_Results_API_EndpointTestPort:
      type: integer
      description: Port number.
      default: 443
      example: 443
    Endpoint_Test_Results_API_EndpointTest:
      type: object
      required:
        - type
      properties:
        aid:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_AccountGroupId'
        _links:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestLinks'
        agentSelectorConfig:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentSelectorConfig
        createdDate:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestCreatedDate'
        isPrioritized:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsPrioritized'
        interval:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestInterval'
        isEnabled:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsEnabled'
        isSavedEvent:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsSavedEvent'
        hasPathTraceInSession:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_TestHasPathTraceInSession
        labels:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestLabels'
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        networkMeasurements:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_TestNetworkMeasurements
        protocol:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestProtocol'
        ipVersion:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointIpVersionOut'
        server:
          type: string
          description: Target domain name or IP address.
          example: www.example.com
        testId:
          type: string
          description: >-
            Each test is assigned a unique ID to access test data from other
            endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestName'
        type:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointScheduledTestType
        tcpProbeMode:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestProbeModeResponse'
        port:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestPort'
    Endpoint_Test_Results_API_EndpointAgentToServerType:
      type: string
      description: Type of test being queried.
      example: agent-to-server
      pattern: ^agent-to-server$
      readOnly: true
    Endpoint_Test_Results_API_EndpointAgentToServerTest:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTest'
        - type: object
          properties:
            type:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_EndpointAgentToServerType
    Endpoint_Test_Results_API_EndpointTestAuthType:
      type: string
      description: HTTP authentication type.
      enum:
        - none
        - basic
        - ntlm
      default: none
      example: none
    Endpoint_Test_Results_API_TestUsername:
      type: string
      description: Username for Basic/NTLM authentication.
      example: username
    Endpoint_Test_Results_API_TestSslVersionId:
      type: string
      description: |
        SSL version options:

        * Use '0' for automatic selection.
        * Use '3' for SSLv3.
        * Use '4' for TLS v1.0.
        * Use '5' for TLS v1.1.
        * Use '6' for TLS v1.2.
        * Use '7' for TLS v1.3.
      enum:
        - '0'
        - '3'
        - '4'
        - '5'
        - '6'
        - '7'
      default: '0'
      example: '0'
    Endpoint_Test_Results_API_EndpointTestResultUrl:
      type: string
      description: The test target URL.
      example: https://example.com:443
    Endpoint_Test_Results_API_EndpointHttpServerBaseTest:
      type: object
      properties:
        authType:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestAuthType'
        hasPathTraceInSession:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_TestHasPathTraceInSession
        httpTimeLimit:
          type: integer
          description: >-
            Maximum amount of time in milliseconds the agents wait before a
            request times out.
          default: 5000
          example: 5000
        protocol:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestProtocol'
        username:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestUsername'
        sslVersionId:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestSslVersionId'
        tcpProbeMode:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestProbeModeResponse'
        verifyCertificate:
          type: boolean
          description: Flag indicating if a certificate should be verified.
          default: true
          example: true
        url:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestResultUrl'
    Endpoint_Test_Results_API_EndpointHttpServerType:
      type: string
      description: Type of test being queried.
      example: http-server
      pattern: ^http-server$
      readOnly: true
    Endpoint_Test_Results_API_TestFollowRedirects:
      type: boolean
      description: >-
        To disable following HTTP/301 or HTTP/302 redirect directives, set this
        parameter to `false`.
      default: true
      example: true
    Endpoint_Test_Results_API_TestHttpTargetTime:
      type: integer
      minimum: 100
      maximum: 5000
      description: Target time for HTTP server completion, specified in milliseconds.
      example: 100
    Endpoint_Test_Results_API_TestHttpVersion:
      type: integer
      minimum: 1
      maximum: 2
      description: >-
        HTTP protocol version. Set to '2' to prefer HTTP/2, or '1' to use only
        HTTP/1.1.
      default: 2
      example: 2
    Endpoint_Test_Results_API_TestSslVersion:
      type: string
      description: Reflects the verbose SSL protocol version used by a test.
      readOnly: true
      example: Auto
    Endpoint_Test_Results_API_TestUseNtlm:
      type: boolean
      description: >-
        Set to true to use NTLM, false to use Basic Authentication. Requires
        username and password to be set.
      example: false
    Endpoint_Test_Results_API_EndpointHttpServerTest:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTest'
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointHttpServerBaseTest
        - type: object
          properties:
            type:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_EndpointHttpServerType
            followRedirects:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_TestFollowRedirects
            httpTargetTime:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_TestHttpTargetTime
            httpVersion:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_TestHttpVersion'
            isPrioritized:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsPrioritized'
            interval:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_TestInterval'
            sslVersion:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_TestSslVersion'
            useNtlm:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_TestUseNtlm'
    Endpoint_Test_Results_API_EndpointScheduledTest:
      oneOf:
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentToServerTest
        - $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointHttpServerTest
      discriminator:
        propertyName: type
        mapping:
          agent-to-server: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentToServerTest
          http-server: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointHttpServerTest
    Endpoint_Test_Results_API_StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Endpoint_Test_Results_API_EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Endpoint_Test_Results_API_PaginationNextLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
    Endpoint_Test_Results_API_VpnType:
      type: string
      description: Name of the VPN provider.
      enum:
        - cisco-anyconnect
        - palo-alto-globalprotect
        - ivanti-connect-secure
        - zscaler-internet-access
        - f5-big-ip
      example: cisco-anyconnect
    Endpoint_Test_Results_API_TestProtocol:
      type: string
      enum:
        - tcp
        - icmp
        - udp
      description: >-
        Protocol used by dependent network tests (end-to-end, path trace,
        PMTUD).
      default: tcp
      example: tcp
    Endpoint_Test_Results_API_PaginationNextAndSelfLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
        self:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
    Endpoint_Test_Results_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
    Endpoint_Test_Results_API_EndpointTestResultProtocol:
      type: string
      enum:
        - icmp
        - tcp
        - udp
        - prefer-tcp
        - ast-autodetect
        - autodetect
        - unknown
      description: Protocol used to perform the test.
      default: unknown
      example: tcp
    Endpoint_Test_Results_API_TcpPathTraceModeResponse:
      type: string
      enum:
        - auto
        - syn
        - syn-pcap
        - unknown
        - data-in-session-with-decrementing-ttl
        - data-in-session
      description: >-
        Path trace mode used by network test. Only valid when the protocol is
        set to TCP.
      default: auto
      example: syn-pcap
    Endpoint_Test_Results_API_UdpPathTraceModeResponse:
      type: string
      enum:
        - stun-pcap
        - unknown
      description: >-
        Path trace mode used by network test. Only valid when the protocol is
        set to UDP.
      default: unknown
      example: unknown
      readOnly: true
    Endpoint_Test_Results_API_DynamicTestSelfLink:
      allOf:
        - description: The reference to the test.
          example:
            href: >-
              https://api.thousandeyes.com/v7/dynamic-tests/agent-to-server/281474976710706
        - $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
    Endpoint_Test_Results_API_DynamicTestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
      example:
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/dynamic-tests/281474976710706/network/filter
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/dynamic-tests/281474976710706/pathvis
    Endpoint_Test_Results_API_DynamicTestLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_DynamicTestSelfLink'
        testResults:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_DynamicTestResults'
      readOnly: true
    Endpoint_Test_Results_API_DynamicTestApplication:
      type: string
      description: >-
        Which supported application to monitor, can be one of `webex`, `zoom`,
        `microsoft-teams`.
      example: webex
    Endpoint_Test_Results_API_TestHasPing:
      type: boolean
      description: Optional flag indicating if the test should run ping.
      default: true
    Endpoint_Test_Results_API_TestHasTraceRoute:
      type: boolean
      description: Optional flag indicating if the test should run traceroute.
      default: true
    Endpoint_Test_Results_API_DynamicTest:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_AccountGroupId'
        _links:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_DynamicTestLinks'
        agentSelectorConfig:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_EndpointAgentSelectorConfig
        application:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_DynamicTestApplication
        createdDate:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestCreatedDate'
        isPrioritized:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsPrioritized'
        interval:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestInterval'
        isEnabled:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestIsEnabled'
        hasPathTraceInSession:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_TestHasPathTraceInSession
        hasPing:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestHasPing'
        hasTraceroute:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestHasTraceRoute'
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        networkMeasurements:
          $ref: >-
            #/components/schemas/Endpoint_Test_Results_API_TestNetworkMeasurements
        protocol:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestProtocol'
        ipVersion:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointIpVersionOut'
        tcpProbeMode:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestProbeModeResponse'
        testId:
          type: string
          description: >-
            Each test is assigned a unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestName'
        labels:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_TestLabels'
    Endpoint_Test_Results_API_UdpProbeModeResponse:
      type: string
      enum:
        - stun-pcap
        - unknown
      description: >-
        Probe mode used by network test, only valid when the protocol is set to
        UDP.
      default: unknown
      example: unknown
      readOnly: true
    Endpoint_Test_Results_API_InterfaceHardwareType:
      type: string
      example: wireless
      enum:
        - unknown
        - wireless
        - ethernet
        - modem
        - virtual
        - loopback
        - other
    Endpoint_Test_Results_API_UserPrincipalName:
      type: string
      description: >-
        User login name in Internet-style format, typically used in Active
        Directory environments.
      example: joeblogs32@c.com
    Endpoint_Agent_Labels_API_ExpandLabelOptions:
      type: string
      enum:
        - filters
    Endpoint_Agent_Labels_API_LabelId:
      type: string
      readOnly: true
      description: Label identifier.
      example: abc-123-def
    Endpoint_Agent_Labels_API_Labels:
      description: A list of Labels.
      type: object
      properties:
        labels:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agent_Labels_API_LabelResponse'
        _links:
          $ref: >-
            #/components/schemas/Endpoint_Agent_Labels_API_PaginationNextAndSelfLink
    Endpoint_Agent_Labels_API_Label:
      description: A label definition.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Endpoint_Agent_Labels_API_LabelId'
        name:
          description: The label name.
          type: string
          readOnly: false
          example: Head office meeting rooms
        color:
          description: UI color
          type: string
          readOnly: false
          example: '#ff3333'
        matchType:
          $ref: '#/components/schemas/Endpoint_Agent_Labels_API_MatchType'
        filters:
          description: >-
            The filters combined using the matchType to determine the label's
            match.
          type: array
          readOnly: false
          items:
            $ref: '#/components/schemas/Endpoint_Agent_Labels_API_Filter'
    Endpoint_Agent_Labels_API_LabelResponse:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Agent_Labels_API_Label'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Endpoint_Agent_Labels_API_SelfLinks'
    Endpoint_Agent_Labels_API_LabelRequest:
      allOf:
        - required:
            - name
            - matchType
            - filters
        - $ref: '#/components/schemas/Endpoint_Agent_Labels_API_Label'
    Endpoint_Agent_Labels_API_MatchType:
      description: |
        Specifies how the filters are combined for matching this label.

        * `and`: All filters must be matched.
        * `or`: Any of the filters should match.
      type: string
      readOnly: false
      enum:
        - and
        - or
      example: and
    Endpoint_Agent_Labels_API_Filter:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/Endpoint_Agent_Labels_API_FilterType'
        values:
          type: array
          example:
            - 10.1.1.0/24
            - 192.168.1.0/24
          items:
            type: string
            description: >
              Value depends on the key, and may change in the future.


              * `agent-id`: The agent identifiers.

              * `gateway`: The gateway IP to match.

              * `ssid`: A wildcard match on the SSID. Supports `*` for any
              characters and `?` for any single character.

              * `user-name`: A wildcard match on the users that use the agent.
              Supports `*` for any characters and `?` for any single character.

              * `hostname`: A wildcard match on the host name - supports `*` for
              any characters

              and `?` for any single character

              * `bssid`: BSSID for the wifi, lower case, with colons.

              * `platform`: Currently supports `Mac`, `Windows`, and `Linux`.

              * `asn`: Integer AS Number.

              * `public-network`: Network for agent's public IP in CIDR format,
              or IP for single IP. e.g. `192.45.32.0/22`.

              * `local-network`: Network for agent's local IP in CIDR format, or
              IP for single IP. e.g. `10.100.64.0/20`.

              * `connection`: Type of connection `Ethernet` or `Wireless`.

              * `agent-type`: Type of agent `endpoint`, `endpoint-pulse` or
              `endpoint-csc`.

              * `ip-address-family`: `ipv4` or `ipv6`.

              * `vpn-vendor`: Vendor of the VPN software. 
                  Examples include: 
                  
                  * `cisco-anyconnect`
                  * `palo-alto-globalprotect`
                  * `ivanti-connect-secure`
                  * `zscaler-internet-access`
                  * `f5-big-ip`
              * `vpn-gateway-address`: Server-side VPN connection IP address.

              * `vpn-client-network`: Network for the VPN client IP in CIDR
              format. For example, `10.100.32.128/25`.

              * `vpn-client-address`: The VPN client IP. For example,
              `10.100.32.165`.
            example: 10.1.1.0/24
        mode:
          $ref: '#/components/schemas/Endpoint_Agent_Labels_API_LabelFilterMode'
    Endpoint_Agent_Labels_API_FilterType:
      type: string
      description: Type of filter - the data that will be used to filter.
      example: vpn-client-network
      enum:
        - agent-id
        - public-network
        - local-network
        - connection
        - gateway
        - platform
        - agent-type
        - vpn-vendor
        - vpn-gateway-address
        - vpn-client-network
        - vpn-client-address
        - ip-address-family
        - ssid
        - bssid
        - hostname
        - username
        - asn
    Endpoint_Agent_Labels_API_LabelFilterMode:
      type: string
      description: >
        Type of matching to be applied for the values:


        * `in`: The value on the agent must match one of the list of values
        provided.

        * `not-in`: The value on the agent must not match any of the list of
        values provided.
      enum:
        - in
        - not-in
    Endpoint_Agent_Labels_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Endpoint_Agent_Labels_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
