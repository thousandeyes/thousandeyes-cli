        '401':
          $ref: '#/components/responses/Agents_API_401'
        '403':
          $ref: '#/components/responses/Agents_API_403'
        '404':
          $ref: '#/components/responses/Agents_API_404'
        '429':
          $ref: '#/components/responses/Agents_API_429'
        '500':
          $ref: '#/components/responses/Agents_API_500'
        '502':
          $ref: '#/components/responses/Agents_API_502'
        default:
          $ref: '#/components/responses/Agents_API_GeneralError'
      security:
        - Agents_API_BearerAuth: []
    put:
      tags:
        - Cloud and Enterprise Agents
      summary: Update Enterprise Agent
      operationId: updateAgent
      description: >-
        Updates details for an Enterprise Agent. This operation can only be used
        for Enterprise Agents, and only for users in a role that permits
        modification of Enterprise Agents.


        Important notes related to agent modification on tests:

        * if an agent is removed from a test, the modification date for tests
        using that agent at the time it was removed will be changed.

        * If an agent is removed from an entire account group, then all tests
        using this agent in the removed account group will be updated to reflect
        the removed agent.

        * If a removed agent is the final remaining agent on a test, then the
        test will be disabled when the agent is removed.


        Users can update the following fields:

        * `agentName`: String representation of an agent. No two agents can have
        the same display name.

        * `enabled`: Boolean representation of agent state.

        * `accountGroups`: An array of account group ids. See
        `v7/account-groups` to pull a list of account IDs.

        * `tests`: An array of test Is. See `v7/tests` to retrieve a list tests
        available in the current account context.

        * `ipv6Policy`: Enum representation of the IP version policy.

        * `keepBrowserCache`: Boolean representation of the Keep browser cache
        state.

        * `targetForTests`: String representation of the target IP address or
        domain name. This represents the test destination when agent is acting
        as a test target in an agent-to-agent test.

        * `localResolutionPrefixes`: This array of strings represents the public
        IP ranges where the Enterprise Agent performs rDNS (Reverse DNS)
        lookups. The range should be in CIDR notation, such as `10.1.1.0/24`.
        Please note that a maximum of 5 prefixes is allowed. This only applies
        to Enterprise Agents and Enterprise Agent clusters.
      parameters:
        - $ref: '#/components/parameters/Agents_API_AgentId'
        - $ref: '#/components/parameters/Agents_API_AccountGroupId'
        - $ref: '#/components/parameters/Agents_API_ExpandAgentDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agents_API_AgentRequest'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Agents_API_AgentDetails'
        '400':
          $ref: '#/components/responses/Agents_API_400'
        '401':
          $ref: '#/components/responses/Agents_API_401'
        '403':
          $ref: '#/components/responses/Agents_API_403'
        '404':
          $ref: '#/components/responses/Agents_API_404'
        '429':
          $ref: '#/components/responses/Agents_API_429'
        '500':
          $ref: '#/components/responses/Agents_API_500'
        '502':
          $ref: '#/components/responses/Agents_API_502'
        default:
          $ref: '#/components/responses/Agents_API_GeneralError'
      security:
        - Agents_API_BearerAuth: []
    delete:
      tags:
        - Cloud and Enterprise Agents
      summary: Delete Enterprise Agent
      operationId: deleteAgent
      description: >-
        Deletes an Enterprise Agent.


        Important notes related to agent removal:

        * If an agent is deleted, the modification date for tests using that
        agent at the time it was deleted will be changed.

        * If a deleted agent is the final remaining agent on a test, then the
        test will be disabled when the agent is removed.

        * If an agent is removed, it must be re-initialized to use the same
        machine again in different context. Virtual Appliances can be updated
        using the Reset State button in the Advanced tab of the agent management
        interface. Users running packaged versions of Linux will need to remove
        /var/lib/te-agent/\*.sqlite in order to reinitialize an agent.
      parameters:
        - $ref: '#/components/parameters/Agents_API_AccountGroupId'
        - $ref: '#/components/parameters/Agents_API_AgentId'
      responses:
        '204':
          $ref: '#/components/responses/Agents_API_204'
        '401':
          $ref: '#/components/responses/Agents_API_401'
        '403':
          $ref: '#/components/responses/Agents_API_403'
        '404':
          $ref: '#/components/responses/Agents_API_404'
        '429':
          $ref: '#/components/responses/Agents_API_429'
        '500':
          $ref: '#/components/responses/Agents_API_500'
        '502':
          $ref: '#/components/responses/Agents_API_502'
        default:
          $ref: '#/components/responses/Agents_API_GeneralError'
      security:
        - Agents_API_BearerAuth: []
  /agents/{agentId}/cluster/assign:
    post:
      tags:
        - Enterprise Agent Cluster
      summary: Add member to Enterprise Agent cluster
      operationId: assignAgentToCluster
      description: >-
        Assigns agents to an Enterprise Agent cluster. If the agent specified by
        `agentId` in the URL path is not already part of a cluster, this
        operation creates a new cluster with that agent as the base member.


        This operation requires the `Edit agents in account group` permission.


        A JSON request body is required for this operation, even when creating a
        cluster with a single agent. To create a cluster from a single
        standalone agent, pass an empty `agents` array in the request body:


        ```

        { "agents": [] }

        ```


        If no body is provided, the server returns a 400 Bad Request error.


        The response is a single Enterprise Agent Cluster. The assigned agents
        become cluster members and can be returned using the
        `?expand=cluster-member` parameter.


        Upon successful cluster creation, the response includes:


        * Information about the new or updated cluster.


        * Each cluster member receives a unique `memberId` within the cluster.


        * The `memberId` is not linked to the original `agentId` used in the
        request URL or POST body.


        * The cluster name is based on the agent whose `agentId` is specified in
        the request URL.


        **Example: Creating a cluster from a single agent**


        ```

        curl -X POST https://api.thousandeyes.com/v7/agents/64965/cluster/assign
        \

        '{"agents":[]}' \

        -H "content-type:application/json" \

        -H "Authorization: Bearer $Bearer_token" 

        ````


        **Example: Adding multiple agents to a cluster**


        When adding multiple agents, the `{agentId}` specified in the URL path
        must not be included in the `agents` array. Only include additional
        agent IDs in the array.


        ```

        curl https://api.thousandeyes.com/v7/agents/64965/cluster/assign \

        '{"agents":[
          "2277",
          "1234"
        ]}' \

        -H "content-type:application/json" \

        -H "Authorization: Bearer $Bearer_token" 

        ````
      parameters:
        - $ref: '#/components/parameters/Agents_API_AssignAgentId'
        - $ref: '#/components/parameters/Agents_API_AccountGroupId'
        - $ref: '#/components/parameters/Agents_API_ExpandAgentDetails'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Agents_API_AgentClusterAssignRequest'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Agents_API_AgentDetails'
        '400':
          $ref: '#/components/responses/Agents_API_400'
        '401':
          $ref: '#/components/responses/Agents_API_401'
        '403':
          $ref: '#/components/responses/Agents_API_403'
        '404':
          $ref: '#/components/responses/Agents_API_404'
        '429':
          $ref: '#/components/responses/Agents_API_429'
        '500':
          $ref: '#/components/responses/Agents_API_500'
        '502':
          $ref: '#/components/responses/Agents_API_502'
        default:
          $ref: '#/components/responses/Agents_API_GeneralError'
      security:
        - Agents_API_BearerAuth: []
  /agents/{agentId}/cluster/unassign:
    post:
      tags:
        - Enterprise Agent Cluster
      summary: Remove member from Enterprise Agent cluster
      operationId: unassignAgentFromCluster
      description: >-
        Converts a cluster with a single or multiple Enterprise Agent members
        back to a standalone Enterprise Agent(s). This operation can also be
        used to remove one or more members from an Enterprise Agent cluster.
        Removed members revert to being standalone Enterprise Agents. If all
        members are removed from the cluster, the Enterprise Agent Cluster is
        deleted.


        The response is an list of agents, containing both the Enterprise Agent
        Cluster (if it still exists), and the removed members, now as standalone
        Enterprise Agents. This operation is exclusive to Enterprise Agent
        clusters and can be accessed only by users with the `Edit agents in
        account group` permission.


        On successful completion, the response contains the following
        information:


        * The updated cluster information is provided in the response body,
        unless all members are removed from the cluster.


        * Information about each removed member, now a standalone agent.


        * When a non-last member is removed from the cluster, it receives a new
        `agentId` value. This new `agentId` is different from the `agentId` the
        agent had before joining the cluster, and it is also unrelated to the
        `memberId` value the agent had while being a part of the cluster.


        * If all members are removed from the cluster, the cluster itself is
        converted back to a standalone Enterprise Agent too. Such standalone
        agent inherits the old cluster’s `agentId` value. The last `memberId`
        listed in the POST body inherits the cluster’s `agentId` value.


        **Example - removing a single member**

        ```

        curl -X POST
        https://api.thousandeyes.com/v7/agents/64965/cluster/unassign   \

        '{"members":["55974"]}' \

        -H "content-type:application/json" \

        -H "Authorization: Bearer $Bearer_token" 

        ```


        **Example - removing multiple members**

        ```

        curl https://api.thousandeyes.com/v7/agents/64965/cluster/unassign \

        '{"members":[
            "55974",
            "12313"]
         }' \
