      description: >
        Initiates the transfer of an agent from its current account, which must
        correspond to the provided aid, to the target account.


        **Note:** It is essential to ensure that the `aid` parameter matches the
        current account of the agent for this operation to succeed.
      requestBody:
        $ref: '#/components/requestBodies/Endpoint_Agents_API_AgentTransfer'
      parameters:
        - $ref: '#/components/parameters/Endpoint_Agents_API_EndpointAgentIdPath'
        - $ref: '#/components/parameters/Endpoint_Agents_API_AccountGroupId'
      responses:
        '202':
          description: Transfer initiated
        '401':
          $ref: '#/components/responses/Endpoint_Agents_API_401'
        '403':
          $ref: '#/components/responses/Endpoint_Agents_API_403'
        '404':
