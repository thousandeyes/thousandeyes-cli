        - type: object
          required:
            - type
          description: >-
            Displays horizontal histogram bars with multiple values, which are
            useful for composite metric data (such as HTTP response or fetch
            time) and for comparing values between multiple tests or for
            comparing values on a country-by-country basis. The bars can be
            aligned horizontally or vertically as columns.
