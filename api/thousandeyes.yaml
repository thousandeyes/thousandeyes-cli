              type: array
              items:
                $ref: >-
                  #/components/schemas/Endpoint_Test_Results_API_EndpointZtaMetrics
            isIcmpBlocked:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_IcmpBlocked'
