    Test_Results_API_Expand:
      type: string
      enum:
        - header
        - certificate
      example: header
    Test_Results_API_NetworkTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_NetworkTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        startDate:
          $ref: '#/components/schemas/Test_Results_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Test_Results_API_EndDate'
        _links:
          $ref: '#/components/schemas/Test_Results_API_PaginationLinks'
    Test_Results_API_NetworkTestResult:
      allOf:
        - type: object
          properties:
            availableBandwidth:
              type: number
              description: >-
                The bandwidth from the client to the server measured in Mbps.
                This value is not available if bandwidth testing is disabled, if
                no value could be calculated, or if the target is a proxy.
              example: 9.100464
              format: double
              readOnly: true
            avgLatency:
              type: number
              description: Average RTT for packets sent to destination
              example: 167.04
              format: double
              readOnly: true
            bandwidth:
              type: number
              example: 4.3313155
              format: double
              readOnly: true
            capacity:
              type: number
              description: >-
                The capacity from the client to the server measured in Mbps.
                This value is not available if bandwidth testing is disabled, if
                no value could be calculated, or if the target is a proxy.
              example: 210.10854
              format: double
              readOnly: true
            jitter:
              type: number
              description: Standard deviation of latency
              example: 0.076808
              format: double
              readOnly: true
            loss:
              type: number
              description: Percentage of packets not reaching destination
              example: 0
              format: double
              readOnly: true
            maxLatency:
              type: number
              description: Maximum RTT for packets sent to destination
              example: 168
              format: double
              readOnly: true
            minLatency:
              type: number
              description: Minimum RTT for packets sent to destination
              example: 167
              format: double
              readOnly: true
            proxyLoss:
              type: number
              description: Percentage of packets not reaching proxy.
              example: 2.5
              format: float
              readOnly: true
            proxyAverageLatency:
              type: number
              description: Average RTT for packets sent to proxy, in milliseconds.
              example: 45
              format: float
              readOnly: true
            proxyMinLatency:
              type: number
              description: Minimum RTT for packets sent to proxy, in milliseconds.
              example: 40
              format: float
              readOnly: true
            proxyMaxLatency:
              type: number
              description: Maximum RTT for packets sent to proxy, in milliseconds.
              example: 50
              format: float
              readOnly: true
            proxyJitter:
              type: number
              description: Standard deviation of proxy latency, in milliseconds.
              example: 1.2
              format: float
              readOnly: true
            packetsBySecond:
              type: array
              description: Number of packets sent and received in a second.
              example:
                - []
                - - 0
                - - 2
                - - 2
                  - 1
                - - 1
                  - 1
              items:
                type: array
                items:
                  type: integer
              readOnly: true
            agent:
              $ref: '#/components/schemas/Test_Results_API_TestResultAgent'
            date:
              type: string
              description: Data point date in UTC (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
              readOnly: true
            roundId:
              type: integer
              description: Epoch time (seconds) indicating the start time of the round
              example: 1384309800
              readOnly: true
            serverIp:
              type: string
              description: IP of target server
              example: 50.18.127.223
              readOnly: true
            server:
              type: string
              description: Target server, including port (if method used is TCP)
              example: www.thousandeyes.com:80
              readOnly: true
            healthScore:
              type: number
              description: >-
                A normalized value (0.0-1.0) representing the network connection
                health of the test target. Returns negative values as error
                codes. -1.0 indicates there was insufficient data to calculate
                the health score.
              example: 0.98
            direction:
              $ref: '#/components/schemas/Test_Results_API_TestDirection'
        - $ref: '#/components/schemas/Test_Results_API_TestResult'
        - $ref: '#/components/schemas/Test_Results_API_EpochTimeWindow'
    Test_Results_API_PathVisDetailTestResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_PathVisDetailTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        _links:
          $ref: '#/components/schemas/Test_Results_API_SelfLinks'
    Test_Results_API_PathVisDetailTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_PathVisBaseTestResult'
        - type: object
          properties:
            pathTraces:
              type: array
              description: >-
                Shows 3 iterations of path trace, with each iteration specified
                by a pathId
              items:
                $ref: '#/components/schemas/Test_Results_API_PathVisRoute'
    Test_Results_API_PathVisTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_PathVisTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        startDate:
          $ref: '#/components/schemas/Test_Results_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Test_Results_API_EndDate'
        _links:
          $ref: '#/components/schemas/Test_Results_API_PaginationLinks'
    Test_Results_API_PathVisTestResult:
      allOf:
        - type: object
          properties:
            pathTraces:
              type: array
              description: >-
                Shows all iterations of path trace, with each iteration
                specified by a pathId
              items:
                $ref: '#/components/schemas/Test_Results_API_PathTrace'
        - $ref: '#/components/schemas/Test_Results_API_PathVisBaseTestResult'
    Test_Results_API_PathVisBaseTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_TestResult'
        - $ref: '#/components/schemas/Test_Results_API_EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/Test_Results_API_TestResultAgent'
            server:
              type: string
              description: Target server, including port (if method used is TCP)
              example: www.google.com:443
              readOnly: true
            serverIp:
              type: string
              description: IP of target server
              example: 172.217.170.68
              readOnly: true
            sourceIp:
              type: string
              description: IP address of source agent
              example: 196.40.106.237
              readOnly: true
            sourcePrefix:
              type: string
              description: IP prefix of source agent
              example: 196.40.96.0/20
              readOnly: true
            targetIsProxy:
              type: boolean
              description: >-
                Specifies whether the traces are targeting a proxy. If not set,
                it is considered as false.
              example: true
              readOnly: true
            direction:
              $ref: '#/components/schemas/Test_Results_API_PathVisDirection'
    Test_Results_API_PathVisRoute:
      type: object
      properties:
        pathId:
          type: string
          description: Unique ID of path trace
          example: '4711301366345855606023718047703941305741293841502186803'
          readOnly: true
        hops:
          type: array
          description: Array of hop objects indicating each step in the traceroute
          items:
            $ref: '#/components/schemas/Test_Results_API_PathVisHop'
    Test_Results_API_PathVisHop:
      type: object
      properties:
        hop:
          type: integer
          description: Hop index
          example: 1
          readOnly: true
        ipAddress:
          type: string
          description: IP address of the hop
          example: 196.40.106.237
          readOnly: true
        prefix:
          type: string
          description: Prefix of IP address shown in CIDR
          example: 196.40.96.0/20
          readOnly: true
        rdns:
          type: string
          description: Reverse DNS entry of IP, if available
          example: core-router1.cpt2.host-h.net
          readOnly: true
        network:
          type: string
          description: Autonomous System originating the prefix
          example: HETZNER (Pty) Ltd (AS 37153)
          readOnly: true
        responseTime:
          type: integer
          description: RTT to the hop’s IP in milliseconds
          example: 1
          readOnly: true
        location:
          type: string
          description: Location information for the hop
          example: Cape Town, South Africa
          readOnly: true
        mpls:
          type: string
          description: Multiprotocol Label Switching information, if available
          readOnly: true
    Test_Results_API_PathTrace:
      type: object
      properties:
        ipAddress:
          type: string
          description: IP address of the hop
          example: 196.40.106.237
          readOnly: true
        mss:
          type: integer
          description: Maximum segment size in bytes
          example: 1460
          readOnly: true
        numberOfHops:
          type: integer
          description: Number of hops for path trace to destination
          example: 15
          readOnly: true
        pathId:
          type: string
          description: Unique ID of path trace
          example: '1230899668701775614109128428722974545787322404682781961521'
          readOnly: true
        pathMtu:
          type: integer
          description: MTU sizes on network from agents to the target
          example: 1500
          readOnly: true
        responseTime:
          type: integer
          description: RTT of the path trace to the destination in milliseconds
          example: 1500
          readOnly: true
    Test_Results_API_PathVisDirection:
      type: string
      enum:
        - to-target
        - from-target
      description: Direction of the path trace.
      example: to-target
    Test_Results_API_HttpTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_HttpTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        startDate:
          $ref: '#/components/schemas/Test_Results_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Test_Results_API_EndDate'
        _links:
          $ref: '#/components/schemas/Test_Results_API_PaginationLinks'
    Test_Results_API_HttpTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_TestResult'
        - $ref: '#/components/schemas/Test_Results_API_EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/Test_Results_API_TestResultAgent'
            serverIp:
              type: string
              description: IP address of destination server
              example: 193.2.1.88
              readOnly: true
            responseCode:
              type: integer
              description: HTTP response code
              example: 200
            numRedirects:
              type: integer
              description: Number of redirects
              example: 0
            redirectTime:
              type: integer
              description: Cumulative redirect timing in milliseconds
              example: 10
            dnsTime:
              type: integer
              description: Time required to resolve DNS in milliseconds
              example: 0
            sslTime:
              type: integer
              description: Time to negotiate SSL/TLS in milliseconds
              example: 9
            connectTime:
              type: integer
              description: Time required to establish a TCP connection to the server
              example: 2
            waitTime:
              type: integer
              description: >-
                Time elapsed between completion of request and first byte of
                response in milliseconds
              example: 3
            receiveTime:
              type: integer
              description: >-
                Elapsed time between first and last byte of response in
                milliseconds
              example: 1
            wireSize:
              type: integer
              description: Size of content in bytes
              example: 9993
            responseTime:
              type: integer
              description: Time to first byte in milliseconds
              example: 14
            throughput:
              type: number
              format: double
              description: WireSize divided by receiveTime in byter per second
              example: 123
            totalTime:
              type: integer
              description: response time + receive time
              example: 15
            headers:
              $ref: '#/components/schemas/Test_Results_API_HttpTestResultHeaders'
            errorType:
              type: string
              description: Type of error encountered; corresponds to phase of connection
              example: None
              readOnly: true
            errorDetails:
              $ref: '#/components/schemas/Test_Results_API_TestResultErrorDetails'
            sslCipher:
              type: string
              description: Cipher suite
            sslVersion:
              type: string
              description: TLS version
              example: TLSv1.3
            sslCertificates:
              type: array
              items:
                $ref: '#/components/schemas/Test_Results_API_SslCert'
            healthScore:
              type: number
              description: >-
                A normalized value (0.0-1.0) representing the web application
                connection health of the test target. Returns negative values as
                error codes. -1.0 indicates there was insufficient data to
                calculate the health score.
              example: 0.98
    Test_Results_API_HttpTestResultHeaders:
      type: object
      description: Expandable object containing both request and response headers
      properties:
        requestHeaders:
          type: string
          description: 'Crlf-delimited list of request headers in header: value format'
          example: "GET / HTTP/1.1\r\nHost: www.thousandeyes.com\r\nUser-Agent: curl/7.58.0-DEV\r\nAccept: */*\r\nAccept-Encoding: deflate, gzip\r\nX-ThousandEyes-Agent: yes\r\n"
        responseHeaders:
          type: string
          description: 'crlf-delimited list of response headers in header: value format'
          example: "HTTP/1.1 200 OK\r\nContent-Type: text/html;charset=UTF-8\r\nContent-Length: 9993\r\nConnection: keep-alive\r\nDate: Mon, 04 May 2020 16:13:00 GMT\r\nServer: Apache\r\nContent-Language: en-US\r\nContent-Encoding: gzip\r\nX-Frame-Options: sameorigin\r\nCache-Control: max-age=600, must-revalidate\r\nStrict-Transport-Security: max-age=31536000\r\nX-Content-Type-Options: nosniff\r\nX-XSS-Protection: 1; mode=block\r\nVary: Accept-Encoding\r\nX-Cache: Hit from cloudfront\r\nVia: 1.1 7ba3caf71ae7a52dd411d1a543e80cd8.cloudfront.net (CloudFront)\r\nX-Amz-Cf-Pop: SFO5-C3\r\nX-Amz-Cf-Id: w4h42tkoJD-rEpkRDZUvnQBmy26GVGe6pUsuRr1Dphf7oajYbjXaOA==\r\nAge: 132\r\n"
    Test_Results_API_SslCert:
      type: object
      properties:
        daysUntilExpiry:
          type: integer
          description: >-
            Days until certificate expires, rounded down. 0 is shown if there
            are less than 24 hours remaining. Calculated when the test was
            executed.
          example: 0
        isFetchDateInValidCertDateRange:
          type: boolean
          description: >-
            True when certificate fetch date is within the valid certificate
            date range, false otherwise
          example: true
        hasValidSigningCert:
          type: boolean
          description: >-
            This field is implicitly true; it is output only when false. false
            indicates this certificate was missing a valid signing certificate
            in the chain.
          example: false
        issuerName:
          type: string
          description: Certificate issuer
          example: DigiCert SHA2 Extended Validation Server CA
        validBefore:
          type: string
          format: date-time
          description: Certificate is not valid after this date
          example: '2020-05-12T12:00:00Z'
        validAfter:
          type: string
          format: date-time
          description: Certificate is not valid before this date
          example: '2018-03-27T00:00:00Z'
        subjectAlternativeNames:
          type: array
          description: >-
            Alternative name(s) of the certificate subject, extracted from the
            Subject Alternative Name (SAN) X.509 certificate extension, for
            example example.com, www2.example.com
          items:
            type: string
          example:
            - www.thousandeyes.com
            - thousandeyes.com
        subjectName:
          type: string
          description: >-
            certificate’s subject name - a value of the common name (CN) RDN
            from the certificate’s Subject attribute, for example
            www.example.com
          example: www.thousandeyes.com
