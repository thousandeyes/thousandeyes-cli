    Agents_API_AccountGroupId:
      name: aid
      in: query
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint. Note that you
        must be assigned to the target account group. Specifying this parameter
        without being assigned to the target account group will result in an
        error response.
      required: false
      schema:
        type: string
        example: '1234'
    Administrative_API_RoleId:
      name: id
      description: The ID of the desired role.
      required: true
      in: path
      schema:
        type: string
        example: '23'
    Administrative_API_ExpandAccountGroup:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Optional parameter that specifies whether or not account group related
        resources should be expanded. By default, no expansion takes place if
        the query parameter is not passed. For example, to expand the `users`
        resource, pass the `?expand=user` query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Administrative_API_ExpandAccountGroupOptions'
        example:
          - user
    Administrative_API_AccountGroupIdPath:
      name: id
      description: Identifier for the account group.
      required: true
      in: path
      schema:
        type: string
        example: '1234'
    Administrative_API_AccountGroupId:
      name: aid
      in: query
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint. Note that you
        must be assigned to the target account group. Specifying this parameter
        without being assigned to the target account group will result in an
        error response.
      required: false
      schema:
        type: string
        example: '1234'
    Administrative_API_UserIdPath:
      name: id
      description: Identifier for the user.
      required: true
      in: path
      schema:
        type: string
        example: '1234'
    Administrative_API_UseAllPermittedAids:
      name: useAllPermittedAids
      in: query
      required: false
      description: Set to `true` to load data from all accounts the user has access to.
      schema:
        type: boolean
        example: false
        default: false
    Administrative_API_Window:
      name: window
      in: query
      description: >-
        A dynamic time interval up to the current time of the request. Specify
        the interval as a number followed by an optional type: `s` for seconds
        (default if no type is specified), `m` for minutes, `h` for hours, `d`
        for days, and `w` for weeks.

        For a precise date range, use `startDate` and `endDate`.
      schema:
        type: string
        pattern: ^\d+(?:[smhdw]{1})?$
        example: 12h
    Administrative_API_StartDateParameter:
      name: startDate
      in: query
      description: >-
        Use with the `endDate` parameter. Include the complete time (hours,
        minutes, and seconds) in UTC time zone, following the ISO 8601 date-time
        format. See the example for reference. Please note that this parameter
        can't be used with `window`.
      schema:
        type: string
        format: date-time
        example: '2022-07-17T22:00:54Z'
    Administrative_API_EndDateParameter:
      name: endDate
      in: query
      description: >-
        Defaults to current time the request is made. Use with the `startDate`
        parameter. Include the complete time (hours, minutes, and seconds) in
        UTC time zone, following the ISO 8601 date-time format. See the example
        for reference. Please note that this parameter can't be used with
        `window`.
      schema:
        type: string
        format: date-time
        example: '2022-07-18T22:00:54Z'
    Administrative_API_PaginationCursor:
      name: cursor
      in: query
      example: null
      description: >-
        (Optional) Opaque cursor used for pagination. Clients should use `next`
        value from `_links` instead of this parameter.
      schema:
        type: string
        example: null
