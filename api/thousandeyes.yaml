  /cloud-insights/integration/aws:
    get:
      tags:
        - Cloud Insights Integrations
      summary: List AWS integrations
      operationId: getAllAWSMonitoringIntegrations
      description: >-
        Retrieves all AWS inventory and flow logs monitoring integrations
        configured for the authenticated account group in ThousandEyes.
      parameters:
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_AccountGroupId
      responses:
        '200':
          description: >
            The response is an array of integration objects, where each object
            represents either an Inventory Monitoring or Flow Logs Monitoring
            integration. Each integration includes metadata such as: id — the
            unique identifier of the integration; name — the user-defined name
            of the integration; roleArn — the AWS IAM role ARN that ThousandEyes
            assumes to access your AWS resources; externalId — the external
            identifier used for secure cross-account role assumption;
            monitoringType — specifies whether the integration monitors AWS
            inventory (inventory-monitoring) or flow logs
            (flow-logs-monitoring); snsTopicsArns — a list of SNS topic ARNs
            used for flow logs monitoring (only present for flow logs monitoring
            integrations); links — HAL-style link relations that provide the
            "self" URL for retrieving integration details. This endpoint can be
            used to: audit all existing AWS integrations configured for Cloud
            Insights, identify which integrations are set up for inventory
            versus flow logs monitoring, and retrieve integration IDs for
            further API operations such as inspection (GET
            /cloud-insights/integration/aws/{integrationId}) or deletion
            (DELETE). The response is returned as a JSON array conforming to the
            AwsMonitoringIntegration schema.
          content:
            application/hal+json:
              schema:
                $ref: >-
                  #/components/schemas/Cloud_Insights_Integrations_API_AwsMonitoringIntegrations
        '401':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_401'
        '403':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_403'
        '404':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_404'
        '429':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_429'
        '500':
