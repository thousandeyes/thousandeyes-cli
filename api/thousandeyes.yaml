        self:
          $ref: '#/components/schemas/Internet_Insights_API_Link'
    Tags_API_ExpandTagsOptions:
      enum:
        - assignments
      type: string
    Tags_API_TagInfo:
      type: object
      properties:
        assignments:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Tags_API_Assignment'
        accessType:
          $ref: '#/components/schemas/Tags_API_AccessType'
        aid:
          type: integer
          example: 1234
          format: int64
          description: The account group ID
          readOnly: true
        builtIn:
          type: boolean
          example: true
          description: >-
            Indicates whether it is a built-in tag or a user-created (custom)
            tag.
          readOnly: true
        color:
          type: string
          description: Tag color
          example: '#FF0000'
        createDate:
          type: string
          format: yyyy-MM-ddTHH:mm[:ss]Z
          example: '2022-03-01T23:31:11Z'
          readOnly: true
          description: Tag creation date
        icon:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
          description: The tag's description.
          example: To tag assets in San Francisco
        id:
          type: string
          example: 5aeab5d5-0d34-4d44-a7ac-fb440185295c
          description: The tag ID
          readOnly: true
          format: uuid
        key:
          type: string
          example: branch
          description: The tags's key
        legacyId:
          type: number
          nullable: true
          readOnly: true
        modifiedDate:
          type: string
          nullable: true
          format: date-time
          example: '2022-03-01T23:31:11Z'
          readOnly: true
          description: The date and time the tag was last modified.
        objectType:
          $ref: '#/components/schemas/Tags_API_ObjectType'
        type:
          $ref: '#/components/schemas/Tags_API_Type'
        value:
          type: string
          example: sfo
          description: The tag's value
        matchType:
          $ref: '#/components/schemas/Tags_API_TagMatchType'
        filters:
          description: >-
            The combination of filters (filter keys) dynamically assigned to an
            `endpoint-agent` as determined by the matching logic (`and` or
            `or`). For example, if you filter on `bssid` and `ssid` with a
            matching logic of `and`, both filters are assigned as tags to the
            `endpoint-agent`; `or` means either filter can be assigned.
            **Note:** filters currently only apply to `endpoint-agent` object
            types.
          type: array
          readOnly: false
          items:
            $ref: '#/components/schemas/Tags_API_TagFilter'
    Tags_API_TagFilter:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/Tags_API_TagFilterType'
        values:
          type: array
          example:
            - 10.1.1.0/24
            - 192.168.1.0/24
          items:
            type: string
            description: >
              Value depends on the key, and may change in the future.


              * `agent-id`: The agent identifiers.

              * `gateway`: The gateway IP to match.

              * `ssid`: A wildcard match on the SSID. Supports `*` for any
              characters and `?` for any single character.

              * `username`: A wildcard match on the users that use the agent.
              Supports `*` for any characters and `?` for any single character.

              * `hostname`: A wildcard match on the host name. Supports `*` for
              any characters

              and `?` for any single character.

              * `bssid`: BSSID for the wifi. Must be lower case, with colons.

              * `platform`: Type of operating system. Supports `Mac`, `Windows`,
              and `Linux`.

              * `asn`: Integer Autonomous System (AS) number.

              * `public-network`: Network for agent's public IP in CIDR format,
              or IP for single IP, for example, `192.45.32.0/22`.

              * `local-network`: Network for agent's local IP in CIDR format, or
              IP for single IP, for example, `10.100.64.0/20`.

              * `connection`: Type of connection. Supports `Ethernet` or
              `Wireless`.

              * `agent-type`: Type of agent. Supports `endpoint`,
              `endpoint-pulse` or `endpoint-csc`.

              * `ip-address-family`: `ipv4` or `ipv6`.

              * `vpn-vendor`: Vendor of the VPN software. 
                  Examples include: 

                  * `cisco-anyconnect`
                  * `palo-alto-globalprotect`
                  * `ivanti-connect-secure`
                  * `zscaler-internet-access`
                  * `f5-big-ip`
              * `vpn-gateway-address`: Server-side VPN connection IP address.

              * `vpn-client-network`: Network for the VPN client IP in CIDR
              format, for example, `10.100.32.128/25`.

              * `vpn-client-address`: The VPN client IP, for example,
              `10.100.32.165`.
            example: 10.1.1.0/24
        mode:
          $ref: '#/components/schemas/Tags_API_TagFilterMode'
    Tags_API_TagFilterType:
      type: string
      description: Type of filter key - the data that will be used to filter.
      example: vpn-client-network
      enum:
        - agent-id
        - public-network
        - local-network
        - connection
        - gateway
        - platform
        - agent-type
        - vpn-vendor
        - vpn-gateway-address
        - vpn-client-network
        - vpn-client-address
        - ip-address-family
        - ssid
        - bssid
        - hostname
        - username
        - asn
    Tags_API_TagFilterMode:
      type: string
      description: >
        Type of matching logic applied to the values:


        * `in`: The value on the agent must match one of the list of values
        provided.

        * `not-in`: The value on the agent must not match any of the list of
        values provided.
      enum:
        - in
        - not-in
      example: in
    Tags_API_ObjectType:
      type: string
      description: The object type associated with the tag
      enum:
        - test
        - dashboard
        - endpoint-test
        - v-agent
        - connected-devices-test
        - endpoint-agent
      example: test
    Tags_API_Type:
      type: string
      description: >-
        The nature of the tag - whether the tag is dynamically assigned to
        objects based on a filter rule or statically assigned to specified
        objects. Currently only `endpoint-agent` object types support dynamic
        assignment; all other object types (for example, `test`, `agent`)
        support only static assignment.
      enum:
        - static
        - dynamic
      example: static
    Tags_API_TagMatchType:
      description: >
        Specifies how filters (tag keys) are applied (matched) to objects for
        tag assignment.

        * `and`: All filters must be matched.

        * `or`: Any of the filters should match.


        Note: filtering and matching currently only apply to `endpoint-agent`
        object types, as these functions are used for dynamic tag assignment.
      type: string
      readOnly: false
      enum:
        - and
        - or
      example: and
    Tags_API_Tag:
      allOf:
        - $ref: '#/components/schemas/Tags_API_TagInfo'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Tags_API_SelfLinks'
    Tags_API_TagAssignment:
      type: object
      properties:
        assignments:
          type: array
          items:
            $ref: '#/components/schemas/Tags_API_Assignment'
    Tags_API_Assignment:
