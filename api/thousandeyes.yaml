        - $ref: '#/components/parameters/Test_Results_API_EndDateParameter'
        - $ref: '#/components/parameters/Test_Results_API_PaginationCursor'
        - $ref: '#/components/parameters/Test_Results_API_PathVisDirection'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Test_Results_API_PathVisTestResults'
        '400':
          $ref: '#/components/responses/Test_Results_API_400'
        '401':
          $ref: '#/components/responses/Test_Results_API_401'
        '403':
          $ref: '#/components/responses/Test_Results_API_403'
        '404':
          $ref: '#/components/responses/Test_Results_API_404'
        '429':
          $ref: '#/components/responses/Test_Results_API_429'
        '500':
          $ref: '#/components/responses/Test_Results_API_500'
        '502':
          $ref: '#/components/responses/Test_Results_API_502'
        default:
          $ref: '#/components/responses/Test_Results_API_GeneralError'
      security:
        - Test_Results_API_BearerAuth: []
