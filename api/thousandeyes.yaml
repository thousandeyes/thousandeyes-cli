        cardId:
          type: string
          description: Identifier of the card.
          example: lrxxr
        cardName:
          type: string
          description: Name of the card.
          example: Card Name
        startDate:
          type: string
          format: date-time
          description: >-
            UTC start date of the data shown in the API output (ISO date-time
