        userAgent:
          $ref: '#/components/schemas/Tests_API_TestUserAgent'
        username:
          $ref: '#/components/schemas/Tests_API_TestUsername'
        verifyCertificate:
          $ref: '#/components/schemas/Tests_API_TestVerifyCertificate'
        allowUnsafeLegacyRenegotiation:
