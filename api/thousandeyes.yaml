        type:
          type: string
          example: dns-server
          readOnly: true
    Instant_Tests_API_DnsServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsServerProperties'
    Instant_Tests_API_DnsTraceProperties:
      type: object
      required:
        - domain
      properties:
        dnsTransportProtocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestDnsTransportProtocol'
        domain:
          $ref: '#/components/schemas/Instant_Tests_API_TestDomain'
        dnsQueryClass:
          $ref: '#/components/schemas/Instant_Tests_API_DnsQueryClass'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        type:
          type: string
          example: dns-trace
          readOnly: true
    Instant_Tests_API_DnsTraceInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsTraceProperties'
    Instant_Tests_API_DnsSecProperties:
      type: object
      required:
        - domain
      properties:
        domain:
          $ref: '#/components/schemas/Instant_Tests_API_TestDomain'
        dnsQueryClass:
          $ref: '#/components/schemas/Instant_Tests_API_DnsQueryClass'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        type:
          type: string
          example: dnssec
          readOnly: true
    Instant_Tests_API_DnsSecInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsSecProperties'
    Instant_Tests_API_TestAuthType:
      type: string
      description: HTTP authentication type.
      enum:
        - none
        - basic
        - ntlm
        - kerberos
        - oauth
      default: none
      example: none
    Instant_Tests_API_AgentInterfaces:
      type: object
      properties:
        ipAddress:
          type: string
          example: 192.1.1.0
          description: IP address of the agent interface.
        agentId:
          type: string
          description: The agent ID of the enterprise agent for the test.
          example: '2954'
    Instant_Tests_API_TestClientCertificate:
      type: string
      description: >-
        String representation (containing newline characters) of client
        certificate, the private key must be placed first, then the certificate.
      example: |
        -----BEGIN PRIVATE KEY-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END PRIVATE KEY-----
        -----BEGIN CERTIFICATE-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END CERTIFICATE-----
    Instant_Tests_API_TestCustomHeaders:
      type: object
      properties:
        root:
          type: object
          description: Use these HTTP headers for root server request.
          additionalProperties:
            type: string
        domains:
          type: object
          description: Use these HTTP headers for the specified domains.
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        all:
          type: object
          description: Use these HTTP headers for all domains.
          additionalProperties:
            type: string
      example:
        root:
          header1: value1
        domains:
          domain1.com:
            header2: value2
        all:
          header3: value3
    Instant_Tests_API_TestDesiredStatusCode:
      type: string
      description: >-
        Specify the HTTP status code value that indicates a successful response.
        The default value accepts any 2xx or 3xx status code.
      default: default
      example: '200'
    Instant_Tests_API_TestDistributedTracing:
      type: boolean
      description: >-
        Adds distributed tracing headers to API requests using B3 and W3C
        standards.
      example: false
    Instant_Tests_API_TestHttpTargetTime:
      type: integer
      minimum: 100
      maximum: 5000
      description: Target time for HTTP server completion, specified in milliseconds.
      example: 100
    Instant_Tests_API_TestHttpTimeLimit:
      type: integer
      minimum: 5
      maximum: 60
      description: HTTP time limit in seconds.
      default: 5
      example: 5
    Instant_Tests_API_TestHttpVersion:
      type: integer
      minimum: 1
      maximum: 2
      description: >-
        HTTP protocol version. Set to '2' to prefer HTTP/2, or '1' to use only
        HTTP/1.1.
      default: 2
      example: 2
    Instant_Tests_API_TestIncludeHeaders:
      type: boolean
      description: >-
        Set to `true` to capture response headers for objects loaded by the
        test.
      default: true
      example: true
    Instant_Tests_API_TestUrl:
      type: string
      description: Target for the test.
      example: www.thousandeyes.com
    Instant_Tests_API_OAuthRequestMethod:
      type: string
      enum:
        - get
        - post
      description: HTTP request method used for the OAuth request.
      example: get
    Instant_Tests_API_OAuthAuthType:
      type: string
      description: HTTP authentication type used for the OAuth request.
      enum:
        - none
        - basic
        - ntlm
      default: none
      example: none
    Instant_Tests_API_OAuth:
      type: object
      properties:
        testUrl:
          $ref: '#/components/schemas/Instant_Tests_API_TestUrl'
        requestMethod:
          $ref: '#/components/schemas/Instant_Tests_API_OAuthRequestMethod'
        postBody:
          type: string
          description: >-
            Enter the OAuth body for the HTTP POST request in this field when
            using OAuth as the authentication mechanism. No special escaping is
            required. The value is saved only when `requestMethod` is set to
            `post`.
        headers:
          type: string
          description: Request headers used for OAuth.
        authType:
          $ref: '#/components/schemas/Instant_Tests_API_OAuthAuthType'
        username:
          type: string
          description: OAuth username
        password:
          type: string
          description: OAuth password
          writeOnly: true
      description: Use this only if you want to use OAuth as the authentication mechanism.
      example:
        testUrl: https://api.thousandeyes.com/v7/status
        requestMethod: post
        postBody: 'client_id: ************'
        headers: 'Authorization: Basic ************'
        authType: none
        username: user123
        password: '*******'
    Instant_Tests_API_TestPassword:
      type: string
      description: Password for Basic/NTLM authentication.
      example: password
      writeOnly: true
    Instant_Tests_API_TestSslVersion:
      type: string
      description: Reflects the verbose SSL protocol version used by a test.
      readOnly: true
      example: Auto
    Instant_Tests_API_TestSslVersionId:
      type: string
      description: |
        SSL version options:

        * Use '0' for automatic selection.
        * Use '3' for SSLv3.
        * Use '4' for TLS v1.0.
        * Use '5' for TLS v1.1.
        * Use '6' for TLS v1.2.
        * Use '7' for TLS v1.3.
      enum:
        - '0'
        - '3'
        - '4'
        - '5'
        - '6'
        - '7'
      default: '0'
      example: '0'
    Instant_Tests_API_TestUseNtlm:
      type: boolean
      description: >-
        Set to true to use NTLM, false to use Basic Authentication. Requires
        username and password to be set.
      example: false
    Instant_Tests_API_TestUserAgent:
      type: string
      description: User-agent string to be provided during the test.
      example: curl
    Instant_Tests_API_TestUsername:
      type: string
      description: Username for Basic/NTLM authentication.
      example: username
    Instant_Tests_API_TestVerifyCertificate:
      type: boolean
      description: >-
        Ignore or acknowledge certificate errors. Set to false to ignore
        certificate errors.
      default: false
      example: false
    Instant_Tests_API_TestAllowUnsafeLegacyRenegotiation:
      type: boolean
      description: >-
        Allows TLS renegotiation with servers not supporting RFC 5746. Default
        Set to true to allow unsafe legacy renegotiation.
      default: true
      example: true
    Instant_Tests_API_TestFollowRedirects:
      type: boolean
      description: >-
        To disable following HTTP/301 or HTTP/302 redirect directives, set this
        parameter to `false`.
      default: true
      example: true
    Instant_Tests_API_TestOverrideAgentProxy:
      type: boolean
      description: >-
        Flag indicating if a proxy other than the default should be used. To
        override the default proxy for agents, set to `true` and specify a value
        for `overrideProxyId`.
      default: false
      example: false
    Instant_Tests_API_TestOverrideProxyId:
      type: string
      description: ID of the proxy to be used if the default proxy is overridden.
      example: '281474976710706'
    Instant_Tests_API_TestCollectProxyNetworkData:
      type: boolean
      description: Indicates whether network data to the proxy should be collected.
      default: false
      example: false
    Instant_Tests_API_HttpServerBaseProperties:
      type: object
      properties:
        authType:
          $ref: '#/components/schemas/Instant_Tests_API_TestAuthType'
        agentInterfaces:
          $ref: '#/components/schemas/Instant_Tests_API_AgentInterfaces'
        bandwidthMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestBandwidthMeasurements'
        clientCertificate:
          $ref: '#/components/schemas/Instant_Tests_API_TestClientCertificate'
        contentRegex:
          type: string
          description: Content regex, this field does not require escaping.
          example: (regex)+
        customHeaders:
          $ref: '#/components/schemas/Instant_Tests_API_TestCustomHeaders'
        desiredStatusCode:
          $ref: '#/components/schemas/Instant_Tests_API_TestDesiredStatusCode'
        distributedTracing:
          $ref: '#/components/schemas/Instant_Tests_API_TestDistributedTracing'
        downloadLimit:
          type: integer
          description: >-
            Specifies maximum number of bytes to download from the target
            object.
          example: 2048
        dnsOverride:
          type: string
          format: ipv4
          description: IP address to use for DNS override.
          example: 8.8.8.8
        httpTargetTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestHttpTargetTime'
        httpTimeLimit:
          $ref: '#/components/schemas/Instant_Tests_API_TestHttpTimeLimit'
        httpVersion:
          $ref: '#/components/schemas/Instant_Tests_API_TestHttpVersion'
        includeHeaders:
          $ref: '#/components/schemas/Instant_Tests_API_TestIncludeHeaders'
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        oAuth:
          $ref: '#/components/schemas/Instant_Tests_API_OAuth'
        password:
          $ref: '#/components/schemas/Instant_Tests_API_TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestProtocol'
        sslVersion:
          $ref: '#/components/schemas/Instant_Tests_API_TestSslVersion'
        sslVersionId:
          $ref: '#/components/schemas/Instant_Tests_API_TestSslVersionId'
        url:
          $ref: '#/components/schemas/Instant_Tests_API_TestUrl'
        useNtlm:
          $ref: '#/components/schemas/Instant_Tests_API_TestUseNtlm'
        userAgent:
          $ref: '#/components/schemas/Instant_Tests_API_TestUserAgent'
        username:
          $ref: '#/components/schemas/Instant_Tests_API_TestUsername'
        verifyCertificate:
          $ref: '#/components/schemas/Instant_Tests_API_TestVerifyCertificate'
        allowUnsafeLegacyRenegotiation:
          $ref: >-
            #/components/schemas/Instant_Tests_API_TestAllowUnsafeLegacyRenegotiation
        followRedirects:
          $ref: '#/components/schemas/Instant_Tests_API_TestFollowRedirects'
        fixedPacketRate:
          $ref: '#/components/schemas/Instant_Tests_API_TestFixedPacketRate'
        overrideAgentProxy:
          $ref: '#/components/schemas/Instant_Tests_API_TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/Instant_Tests_API_TestOverrideProxyId'
        collectProxyNetworkData:
          $ref: '#/components/schemas/Instant_Tests_API_TestCollectProxyNetworkData'
    Instant_Tests_API_TestHeaders:
      type: array
      description: HTTP request headers used.
      items:
        type: string
      example:
        - 'header1: value1'
        - 'header2: value2'
    Instant_Tests_API_TestHttpType:
      type: string
      example: http-server
      readOnly: true
    Instant_Tests_API_HttpServerProperties:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerBaseProperties'
        - type: object
          required:
            - url
          properties:
            headers:
              $ref: '#/components/schemas/Instant_Tests_API_TestHeaders'
            downloadLimit:
              type: integer
              description: >-
                Specifies maximum number of bytes to download from the target
                object.
              example: 2048
            dnsOverride:
              type: string
              format: ipv4
              description: IP address to use for DNS override.
              example: 8.8.8.8
            randomizedStartTime:
              $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
            postBody:
              type: string
              description: >-
                Enter the body for the HTTP POST request in this field. No
                special escaping is necessary. If the post body is provided with
                content, the `requestMethod` is automatically set to POST.
              example: '{ "example" : "value"}'
            ipv6Policy:
              $ref: '#/components/schemas/Instant_Tests_API_TestIpv6Policy'
            type:
              $ref: '#/components/schemas/Instant_Tests_API_TestHttpType'
    Instant_Tests_API_HttpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerProperties'
    Instant_Tests_API_TestPageLoadTimeLimit:
      type: integer
      description: Page load time limit. Must be larger than the `httpTimeLimit`.
      minimum: 5
      maximum: 60
      default: 10
      example: 10
    Instant_Tests_API_TestBlockDomains:
      type: string
      description: >-
        Domains or full object URLs to be excluded from metrics and waterfall
        data for transaction tests.
      example: domain.com/
    Instant_Tests_API_TestDisableScreenshot:
      type: boolean
      description: Enables or disables screenshots on error. Set true to not capture
      default: false
      example: false
    Instant_Tests_API_TestAllowMicAndCamera:
      type: boolean
      description: Set true allow the use of a fake mic and camera in the browser.
      default: false
      example: false
    Instant_Tests_API_TestAllowGeolocation:
      type: boolean
      description: Set true to use the agent’s geolocation by the web page.
      default: false
      example: false
    Instant_Tests_API_TestBrowserLanguage:
      type: string
      description: >-
        Set one of the available browser language that you want to use to
        configure the browser.
      example: en-US
    Instant_Tests_API_TestChromeOptions:
      type: string
      description: Command-line options passed to Chrome when running the test.
      default: ''
      example: '--disable-gpu'
    Instant_Tests_API_TestChromePolicies:
      type: string
      description: JSON string of Chrome policy settings to apply.
      default: '{}'
      example: '{"ProxyMode":"direct"}'
    Instant_Tests_API_TestPageLoadingStrategy:
      type: string
      enum:
        - normal
        - eager
        - none
      description: >
        * `normal`: The test waits until the entire page is fully loaded,
        including the downloading and parsing of HTML content as well as all
        associated resources, before advancing to the next action in the
        transaction test script. 

        * `eager`: The test waits for the DOMContentLoaded event, indicating
        that HTML content is downloaded and parsed, and the document reaches the
        "interactive" readiness state, before proceeding to the next action in
        the test script.

        * `none`: The test only waits for the download of HTML content. Once the
        HTML is downloaded, the test continues to the next action in the
        transaction test script without waiting for additional resources.
      default: normal
      example: normal
    Instant_Tests_API_TestPageLoadType:
      type: string
      example: page-load
      readOnly: true
    Instant_Tests_API_TestIdentifyAgentTrafficWithUserAgent:
      type: boolean
      description: >
        Determines how agent traffic is identified:


        * `false`: Adds the `x-thousandeyes-agent: yes` header.

        * `true`: Appends `(ThousandEyes Agent)` to the `user-agent` header.


        For more information, see [Notes on Agent ID
        Strategy](https://docs.thousandeyes.com/product-documentation/browser-synthetics/test-settings-page-load-transaction#notes-on-agent-id-strategy).
      example: false
      default: false
    Instant_Tests_API_PageLoadProperties:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerBaseProperties'
        - type: object
          required:
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if one was given when the test was
                created.
              example: '2'
            pageLoadTargetTime:
              type: integer
              description: >-
                Target time for page load completion, specified in seconds and
                cannot exceed the `pageLoadTimeLimit`.
              minimum: 1
              maximum: 60
              example: 10
            pageLoadTimeLimit:
              $ref: '#/components/schemas/Instant_Tests_API_TestPageLoadTimeLimit'
            blockDomains:
              $ref: '#/components/schemas/Instant_Tests_API_TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/Instant_Tests_API_TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/Instant_Tests_API_TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/Instant_Tests_API_TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/Instant_Tests_API_TestBrowserLanguage'
            chromeOptions:
              $ref: '#/components/schemas/Instant_Tests_API_TestChromeOptions'
            chromePolicies:
              $ref: '#/components/schemas/Instant_Tests_API_TestChromePolicies'
            pageLoadingStrategy:
              $ref: '#/components/schemas/Instant_Tests_API_TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/Instant_Tests_API_TestPageLoadType'
            identifyAgentTrafficWithUserAgent:
              $ref: >-
                #/components/schemas/Instant_Tests_API_TestIdentifyAgentTrafficWithUserAgent
    Instant_Tests_API_PageLoadInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_PageLoadProperties'
    Instant_Tests_API_TestWebTransactionTimeLimit:
      type: integer
      description: Time limit for transaction in seconds.
      minimum: 5
      maximum: 180
      default: 30
      example: 30
    Instant_Tests_API_TestWebTransactionType:
      type: string
      example: web-transactions
      readOnly: true
    Instant_Tests_API_WebTransactionProperties:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerBaseProperties'
        - type: object
          required:
            - transactionScript
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if specified when the test was
                created.
              example: '2'
            targetTime:
              type: integer
              description: >-
                Target completion time, in seconds. Defaults to 10. Cannot
                exceed the `timeLimit` value.
              minimum: 1
              maximum: 180
              default: 10
              example: 1
            timeLimit:
              $ref: >-
                #/components/schemas/Instant_Tests_API_TestWebTransactionTimeLimit
            transactionScript:
              type: string
              description: >-
                JavaScript of a web transaction test. Quotes must be escaped
                (precede " characters with \ ).
              example: if (true) { return true; }
            blockDomains:
              $ref: '#/components/schemas/Instant_Tests_API_TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/Instant_Tests_API_TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/Instant_Tests_API_TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/Instant_Tests_API_TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/Instant_Tests_API_TestBrowserLanguage'
            chromeOptions:
              $ref: '#/components/schemas/Instant_Tests_API_TestChromeOptions'
            chromePolicies:
              $ref: '#/components/schemas/Instant_Tests_API_TestChromePolicies'
            pageLoadingStrategy:
              $ref: '#/components/schemas/Instant_Tests_API_TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/Instant_Tests_API_TestWebTransactionType'
            identifyAgentTrafficWithUserAgent:
              $ref: >-
                #/components/schemas/Instant_Tests_API_TestIdentifyAgentTrafficWithUserAgent
    Instant_Tests_API_TestCredentials:
      type: array
      description: >-
        Contains a list of credential IDs (get `credentialId` from
        `/credentials` endpoint).
      items:
        type: string
      example:
        - '3247'
        - '1051'
    Instant_Tests_API_WebTransactionInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_WebTransactionProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Instant_Tests_API_TestCredentials'
    Instant_Tests_API_ApiPredefinedVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name. Must be unique.
          example: myUsername
        value:
          type: string
          description: Variable value, will be treated as string.
          example: ThousandEyesAccountUserName
    Instant_Tests_API_ApiRequestAssertionName:
      type: string
      enum:
        - status-code
        - response-body
      description: >-
        Set to `status-code` to assert the response status code. Set to
        `response-body` to assert data is present in the response body. Use
        `ApiRequestAssertion` to set the value for the assertion.
      example: status-code
    Instant_Tests_API_ApiRequestAssertionOperator:
      type: string
      enum:
        - is
        - is-not
        - includes
        - not-includes
        - matches
        - not-matches
      description: >-
        If `name = status-code``, accepted values are [is, is-not]. If `name =
        response-body``, accepted values are [includes, not-includes, matches,
        not-matches]`.
      example: is
    Instant_Tests_API_ApiRequestAssertion:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Instant_Tests_API_ApiRequestAssertionName'
        operator:
          $ref: '#/components/schemas/Instant_Tests_API_ApiRequestAssertionOperator'
        value:
          type: string
          description: >-
            The value of the assertion. If name = `status-code`, the status code
            to assert. If name = `response-body`, the lookup value to assert.
          example: 200
    Instant_Tests_API_ApiRequestAuthType:
      type: string
      enum:
        - none
        - basic
        - bearer-token
        - oauth2
      description: Will override the Authorization request header.
      default: none
      example: none
    Instant_Tests_API_ApiClientAuthentication:
      type: string
      description: The OAuth2 client authentication location type.
      enum:
        - basic-auth-header
        - in-body
      example: basic-auth-header
    Instant_Tests_API_ApiRequestHeader:
      type: object
      properties:
        key:
          type: string
          description: Request header key.
          example: x-custom-header
        value:
          type: string
          description: Request header value. Supports variables `{{variableName}}`.
          example: keep-alive
    Instant_Tests_API_ApiRequestMethod:
      type: string
      description: HTTP request method.
      enum:
        - get
        - post
        - put
        - delete
        - patch
      example: get
    Instant_Tests_API_ApiRequestVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name
          example: myTestName
        value:
          type: string
          description: >-
            The JSON path of data within the Response Body to assign to this
            variable.
          example: tests[0].name
    Instant_Tests_API_ApiRequest:
      type: object
      required:
        - name
        - url
      properties:
        assertions:
          type: array
          description: List of assertion objects.
          items:
            $ref: '#/components/schemas/Instant_Tests_API_ApiRequestAssertion'
        authType:
          $ref: '#/components/schemas/Instant_Tests_API_ApiRequestAuthType'
        bearerToken:
          type: string
          writeOnly: true
          description: The bearer token if `authType = bearer-token`.
          example: abcd-1234-...
        body:
          type: string
          description: POST/PUT request body. Must be in JSON format.
        clientAuthentication:
          $ref: '#/components/schemas/Instant_Tests_API_ApiClientAuthentication'
        clientId:
          type: string
          description: The application ID used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-id
        clientSecret:
          type: string
          description: The private client secret used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-secret
        collectApiResponse:
          type: boolean
          description: >-
            Set to `true` if API response body should be collected and saved.
            Set to `false` if API response body should not be saved.
          default: true
          example: true
        headers:
          type: array
          description: Array of API Request Header objects.
          items:
            $ref: '#/components/schemas/Instant_Tests_API_ApiRequestHeader'
        method:
          $ref: '#/components/schemas/Instant_Tests_API_ApiRequestMethod'
        name:
          type: string
          description: API step name, must be unique.
          example: Step 1
        password:
          type: string
          writeOnly: true
          description: The password if `authType = basic`.
          example: basic_pw123
        scope:
          type: string
          description: >-
            Application-specific scope values for the access token when
            `authType` is "oauth2".
          example: read, write, deploy
        tokenUrl:
          type: string
          description: >-
            The endpoint used to request the access token when `authType` is
            "oauth2".
          example: https://id.cisco.com/oauth2/default/v1/token
        url:
          type: string
          description: Request url. Supports variables in the format `{{variableName}}`.
          example: https://api.thousandeyes.com/v7/status
        username:
          type: string
          description: The username if `authType = basic`.
          example: ThousandEyesUserName
        variables:
          type: array
          description: Array of API post request variable objects.
          items:
            $ref: '#/components/schemas/Instant_Tests_API_ApiRequestVariable'
        verifyCertificate:
          $ref: '#/components/schemas/Instant_Tests_API_TestVerifyCertificate'
        waitTimeMs:
          type: integer
          description: >-
            Post request delay before executing the next API requests, in
            milliseconds.
          example: 0
    Instant_Tests_API_ApiProperties:
      type: object
      required:
        - requests
        - url
      properties:
        clientCertificate:
          $ref: '#/components/schemas/Instant_Tests_API_TestClientCertificate'
        clientCertDomainsAllowList:
          type: string
          example: www.thousandeyes.com
          description: Comma separated list of domains to send the client certificate.
        collectProxyNetworkData:
          $ref: '#/components/schemas/Instant_Tests_API_TestCollectProxyNetworkData'
        distributedTracing:
          $ref: '#/components/schemas/Instant_Tests_API_TestDistributedTracing'
        followRedirects:
          $ref: '#/components/schemas/Instant_Tests_API_TestFollowRedirects'
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        overrideAgentProxy:
          $ref: '#/components/schemas/Instant_Tests_API_TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/Instant_Tests_API_TestOverrideProxyId'
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        predefinedVariables:
          type: array
          items:
            $ref: '#/components/schemas/Instant_Tests_API_ApiPredefinedVariable'
        probeMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        requests:
          type: array
          items:
            $ref: '#/components/schemas/Instant_Tests_API_ApiRequest'
        sslVersionId:
          $ref: '#/components/schemas/Instant_Tests_API_TestSslVersionId'
        targetTime:
          type: integer
          description: >-
            Target time for completion metric, defaults to 50% of time limit
            specified in seconds. (0 means default behavior)
          minimum: 0
          maximum: 60
          example: 1
        timeLimit:
          type: integer
          description: >-
            Time limit for transaction in seconds. Exceeding this limit will
            result in a Timeout error.
          minimum: 5
          maximum: 180
          default: 30
        type:
          type: string
          example: api
          readOnly: true
        url:
          $ref: '#/components/schemas/Instant_Tests_API_TestUrl'
    Instant_Tests_API_ApiInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_ApiProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Instant_Tests_API_TestCredentials'
    Instant_Tests_API_FtpServerRequestType:
      type: string
      enum:
        - download
        - upload
        - list
      description: Set the type of activity for the test.
      example: download
    Instant_Tests_API_FtpServerProperties:
      type: object
      required:
        - requestType
        - url
        - username
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestBandwidthMeasurements'
        downloadLimit:
          type: integer
          description: Specify maximum number of bytes to download from the target object.
          example: 1048576
        ftpTargetTime:
          type: integer
          description: Target time for operation completion; specified in milliseconds.
          minimum: 1000
          maximum: 6000
        ftpTimeLimit:
          type: integer
          description: Set the time limit for the test in seconds.
          minimum: 10
          maximum: 60
          default: 10
          example: 10
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        password:
          $ref: '#/components/schemas/Instant_Tests_API_TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        requestType:
          $ref: '#/components/schemas/Instant_Tests_API_FtpServerRequestType'
        url:
          $ref: '#/components/schemas/Instant_Tests_API_TestUrl'
        useActiveFtp:
          type: boolean
          description: Explicitly set the flag to use active FTP.
          default: false
          example: false
        useExplicitFtps:
          type: boolean
          description: >-
            Use explicit FTPS (ftp over SSL). By default, tests will autodetect
            when it is appropriate to use FTPS.
          example: false
        username:
          $ref: '#/components/schemas/Instant_Tests_API_TestUsername'
        fixedPacketRate:
          $ref: '#/components/schemas/Instant_Tests_API_TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/Instant_Tests_API_TestIpv6Policy'
        type:
          type: string
          example: ftp-server
          readOnly: true
    Instant_Tests_API_FtpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_FtpServerProperties'
    Instant_Tests_API_SipServerProperties:
      type: object
      required:
        - port
        - targetSipCredentials
      properties:
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        optionsRegex:
          type: string
          description: Options regex, this field does not require escaping.
          example:
            - a-z
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestProbeMode'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        registerEnabled:
          type: boolean
          description: >-
            Set to true to perform SIP registration on the test target with the
            SIP REGISTER command.
          default: false
          example: false
        sipTargetTime:
          type: integer
          minimum: 100
          maximum: 5000
          description: Target time for test completion in milliseconds.
          example: 1000
        sipTimeLimit:
          type: integer
          minimum: 5
          maximum: 10
          description: Time limit in milliseconds.
          default: 5
          example: 5
        fixedPacketRate:
          $ref: '#/components/schemas/Instant_Tests_API_TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/Instant_Tests_API_TestIpv6Policy'
        type:
          type: string
          example: sip-server
          readOnly: true
    Instant_Tests_API_TestSipAuthUser:
      type: string
      description: Username for authentication with SIP server.
      example: username
    Instant_Tests_API_SipTestProtocol:
      type: string
      enum:
        - tcp
        - tls
        - udp
      description: Transport layer for SIP communication.
      default: tcp
      example: tcp
    Instant_Tests_API_TestSipRegistrar:
      type: string
      description: SIP server to be tested, specified by domain name or IP address.
      example: voice.thousandeyes.com
    Instant_Tests_API_TestSipUser:
      type: string
      description: >-
        Username for SIP registration, should be unique within a ThousandEyes
        account group.
      example: username
    Instant_Tests_API_TestSipCredentials:
      type: object
      required:
        - port
      properties:
        authUser:
          $ref: '#/components/schemas/Instant_Tests_API_TestSipAuthUser'
        password:
          $ref: '#/components/schemas/Instant_Tests_API_TestPassword'
        port:
          $ref: '#/components/schemas/Instant_Tests_API_TestPort'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_SipTestProtocol'
        sipRegistrar:
          $ref: '#/components/schemas/Instant_Tests_API_TestSipRegistrar'
        user:
          $ref: '#/components/schemas/Instant_Tests_API_TestSipUser'
    Instant_Tests_API_SipServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_SipServerProperties'
    Instant_Tests_API_VoiceProperties:
      type: object
      required:
        - targetAgentId
      properties:
        codec:
          type: string
          description: Codec label
          example: G.711 @ 64 Kbps
          readOnly: true
        codecId:
          type: string
          description: >-
            Coded ID, [see the list of acceptable
            values](https://docs.thousandeyes.com/product-documentation/internet-and-wan-monitoring/tests/working-with-test-settings#rtp-stream-advanced-settings-tab)
          example: '0'
        dscp:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscp'
        dscpId:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscpId'
        duration:
          type: integer
          minimum: 5
          maximum: 30
          description: Duration of the test in seconds.
          default: 5
          example: 5
        jitterBuffer:
          type: integer
          minimum: 0
          maximum: 150
          description: De-jitter buffer size in seconds.
          default: 40
          example: 40
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        port:
          type: integer
          minimum: 1024
          maximum: 65535
          description: Port number for the chosen protocol.
          example: 1024
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        targetAgentId:
          type: string
          description: Agent ID of the target agent for the test.
          example: '281474976710706'
        type:
          type: string
          example: voice
          readOnly: true
    Instant_Tests_API_VoiceInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_VoiceProperties'
    ThousandEyes_for_OpenTelemetry_API_StreamType:
      description: |-
        The type of data stream to configure.
        When using `splunk-hec`:
          - `endpointType` must be `http`.
          - `exporterConfig.splunkHec.token` must contain the *Splunk HEC Token*.
      type: string
      enum:
        - opentelemetry
        - splunk-hec
      example: opentelemetry
    ThousandEyes_for_OpenTelemetry_API_DataModelVersion:
      description: |-
        The version of the data model used in the data stream.
        When using `v1`:
          - The `signal` cannot be `trace`.
      default: v2
      type: string
      enum:
        - v1
        - v2
      example: v2
    ThousandEyes_for_OpenTelemetry_API_AuditOperation:
      type: object
      properties:
        createdBy:
          type: integer
          format: int64
          description: ID of the user who created the integration
          example: 3962
        createdDate:
          type: integer
          format: int64
          description: Creation date of the integration
          example: 1679677853573
    ThousandEyes_for_OpenTelemetry_API_AuditOperationWithUpdate:
      allOf:
        - $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_AuditOperation
        - type: object
          properties:
            updatedBy:
              type: integer
              format: int64
              description: ID of the user who last updated the integration
              example: 3962
              nullable: true
            updatedDate:
              type: integer
              format: int64
              description: Date of the last update to the integration
              example: 1679677853573
              nullable: true
    ThousandEyes_for_OpenTelemetry_API_StreamStatus:
      type: object
      properties:
        lastSuccess:
          type: integer
          format: int64
          description: >-
            Last timestamp when data was successfully sent to the stream
            endpoint.
          example: 1679677853573
          nullable: true
        lastFailure:
          type: integer
          format: int64
          description: Last timestamp when data failed to send the stream endpoint.
          example: 1679677853573
          nullable: true
        status:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamStatusType
    ThousandEyes_for_OpenTelemetry_API_StreamStatusType:
      type: string
      description: >-
        The status of the stream integration. pending: No data is currently
        being sent to the stream endpoint. failing: Data is being sent but not
        successfully reaching the stream endpoint. connected: Data is being sent
        successfully to the stream endpoint.
      example: connected
      enum:
        - connected
        - pending
        - failing
    ThousandEyes_for_OpenTelemetry_API_PutStream:
      type: object
      properties:
        customHeaders:
          description: Custom headers.
          type: object
          additionalProperties:
            type: string
          example:
            Authorization: '*****'
            Content-Type: '*****'
        streamEndpointUrl:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamEndpointUrl
        tagMatch:
          description: >-
            A collection of tags that determine what tests are included in the
            data stream. These tag values are also included as attributes in the
            data stream metrics. Tags are invalid if the tag key includes
            characters that are not allowed by the [OpenTelemetry naming
            recommendations for
            attributes](https://opentelemetry.io/docs/specs/semconv/general/naming/#recommendations-for-application-developers).
          type: array
          items:
            $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_TagMatch'
          example:
            - key: keyA
              value: valueA
            - key: keyB
              value: valueB
        testMatch:
          description: A collection of tests to be included in the data stream.
          type: array
          items:
            $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_TestMatch'
          example:
            - id: '1234'
              domain: cea
            - id: '5678'
              domain: endpoint
        enabled:
          description: Flag to enable or disable the stream integration.
          type: boolean
          example: true
        filters:
          $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_Filters'
        exporterConfig:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_ExporterConfig
        endpointAgentLabel:
          description: >-
            A collection of Endpoint Agent label IDs that determines what local
            network data is included in the data stream.
          type: array
          items:
            $ref: >-
              #/components/schemas/ThousandEyes_for_OpenTelemetry_API_EndpointAgentLabel
    ThousandEyes_for_OpenTelemetry_API_TagMatch:
      type: object
      properties:
        key:
          type: string
          description: >-
            The name of the tag key to match. The key is invalid if it includes
            characters that are not allowed by the [OpenTelemetry naming
            recommendations for
            attributes](https://opentelemetry.io/docs/specs/semconv/general/naming/#recommendations-for-application-developers).
          example: keyA
        value:
          type: string
          description: The value of the tag to match
          example: valueA
    ThousandEyes_for_OpenTelemetry_API_Filters:
      type: object
      description: >-
        Provides the ability to filter data points based on the specified test
        types.
      properties:
        testTypes:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_FiltersTestTypes
    ThousandEyes_for_OpenTelemetry_API_FiltersTestTypes:
      type: object
      description: Test types that can be used for filtering data points.
      properties:
        values:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_FiltersTestTypesValues
    ThousandEyes_for_OpenTelemetry_API_FiltersTestTypesValues:
      type: array
      description: A list of test types to filter data points.
      items:
        $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_TestType'
      example:
        - agent-to-server
        - bgp
        - http-server
    ThousandEyes_for_OpenTelemetry_API_TestMatch:
      type: object
      properties:
        id:
          type: string
          description: The ID of the test to match.
          example: '1234'
        domain:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_TestMatchDomain
    ThousandEyes_for_OpenTelemetry_API_TestMatchDomain:
      type: string
      description: |-
        The domain of the test to match.
         `cea` - Cloud and Enterprise Agent
         `endpoint` - Endpoint Agent
      example: cea
      enum:
        - cea
        - endpoint
    ThousandEyes_for_OpenTelemetry_API_ExporterConfig:
      type: object
      description: Capability to set exporter configuration.
      properties:
        splunkHec:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_ExporterConfigSplunkHec
        authorization:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_ExporterConfigAuthorization
    ThousandEyes_for_OpenTelemetry_API_EndpointAgentLabel:
      type: object
      description: Endpoint Agent label configuration.
      properties:
        id:
          type: string
          description: The label ID of Endpoint Agent labels.
          example: '1234'
    ThousandEyes_for_OpenTelemetry_API_ExporterConfigAuthorization:
      type: object
      description: Authentication configuration type.
      properties:
        oAuth2:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_ExporterConfigOAuth2
    ThousandEyes_for_OpenTelemetry_API_ExporterConfigOAuth2:
      type: object
      description: OAuth2 authentication configuration.
      properties:
        clientId:
          type: string
          description: The OAuth2 client ID.
          example: '1234567890'
        clientSecret:
          type: string
          description: The OAuth2 client secret.
          example: '1234567890'
        tokenUrl:
          type: string
          description: The OAuth2 token URL.
          example: https://example.com/token
        scopes:
          type: array
          description: The OAuth2 scopes.
          items:
            type: string
          example:
            - read
            - write
    ThousandEyes_for_OpenTelemetry_API_ExporterConfigSplunkHec:
      type: object
      description: >-
        Splunk HEC configuration. This can only be configured when the `type` is
        `splunk-hec`.
      properties:
        token:
          type: string
          description: The Splunk HEC `token`. This is a required field.
          example: d0a91307-be2f-4218-a9f8-71c02d98846b
        source:
          type: string
          description: The Splunk HEC `source`. This field is optional.
          example: ThousandEyesOTel
          default: ThousandEyesOTel
        sourceType:
          type: string
          description: The Splunk HEC `sourceType`. This field is optional.
          example: ThousandEyesOTel
          default: ThousandEyesOTel
        index:
          type: string
          description: >-
            The name of the Splunk HEC index where the event data will be
            stored.  This field is optional.
          example: thousandeyes_otel_events_index
    ThousandEyes_for_OpenTelemetry_API_Stream:
      allOf:
        - type: object
          properties:
            type:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamType
            signal:
              $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_Signal'
            endpointType:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_EndpointType
            streamEndpointUrl:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamEndpointUrl
            dataModelVersion:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_DataModelVersion
        - $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_PutStream'
    ThousandEyes_for_OpenTelemetry_API_Signal:
      type: string
      description: |-
        The OpenTelemetry signal of the stream integration.
        When using `trace` or `log`:
          - `dataModelVersion` must be `v2`.
      default: metric
      example: metric
      enum:
        - metric
        - trace
        - log
    ThousandEyes_for_OpenTelemetry_API_EndpointType:
      type: string
      description: >-
        The type of connection used to send data to the endpoint.

        **Note**: When using the `splunk-hec` 'type', the `EndpointType` must be
        `http`.
      default: grpc
      example: grpc
      enum:
        - grpc
        - http
    ThousandEyes_for_OpenTelemetry_API_StreamResponse:
      type: object
      properties:
        id:
          type: string
          example: 342ieu09
          description: The data stream ID
          readOnly: true
        enabled:
          type: boolean
          example: true
          description: Flag to indicate if the stream integration is currently enabled.
          readOnly: true
        _links:
          $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamLinks'
    ThousandEyes_for_OpenTelemetry_API_StreamEndpointUrl:
      type: string
      description: >-
        The URL ThousandEyes sends data stream to.

        For a URL to be valid, it needs to: - Be syntactically correct. - Be
        reachable. - Use the HTTPS protocol. - When using the `grpc`
        endpointType, streamEndpointUrl cannot contain paths:
            - Valid . `grpc` - `https://example.com`
            - Invalid . `grpc` - `https://example.com/collector`.
            - Valid . `http` - `https://example.com/collector`.

        - When using the `http` endpointType, the operation must match the exact
        final full URL (including the path if there is one) to which the data
        will be sent. Examples below:
            - `https://api.honeycomb.io:443/v1/metrics`
            - `https://ingest.eu0.signalfx.com/v2/datapoint/otlp`
      example: https://api.thousandeyes.otel-collector
    ThousandEyes_for_OpenTelemetry_API_GetStreamResponse:
      allOf:
        - $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamResponse
        - $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_Stream'
        - type: object
          properties:
            auditOperation:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_AuditOperationWithUpdate
            streamStatus:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamStatus
    ThousandEyes_for_OpenTelemetry_API_CreateStreamResponse:
      allOf:
        - $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamResponse
        - $ref: '#/components/schemas/ThousandEyes_for_OpenTelemetry_API_Stream'
        - type: object
          properties:
            auditOperation:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_AuditOperation
            streamStatus:
              $ref: >-
                #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamStatus
    ThousandEyes_for_OpenTelemetry_API_StreamCollection:
      type: array
      items:
        $ref: >-
          #/components/schemas/ThousandEyes_for_OpenTelemetry_API_GetStreamResponse
    ThousandEyes_for_OpenTelemetry_API_BadRequestError:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          example: 1679677853573
        httpStatus:
          type: string
          example: BAD_REQUEST
        errors:
          type: array
          items:
            type: string
            example: 'JSON parse error: invalid type'
        path:
          type: string
          format: url
          example: https://api.thousandeyes.com/v7/streams
    ThousandEyes_for_OpenTelemetry_API_ApiErrorIntegrationLimits:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          example: 1679677853573
        httpStatus:
          type: string
          example: PRECONDITION_FAILED
        errors:
          type: array
          items:
            type: string
            example: User cannot create more than 5 integrations
        path:
          type: string
          format: url
          example: https://api.thousandeyes.com/v7/streams
    ThousandEyes_for_OpenTelemetry_API_StreamSelfLink:
      type: object
      properties:
        href:
          type: string
          format: url
          example: >-
            https://api.thousandeyes.com/v7/streams/575766da-9664-4e85-94fe-facbe1154799
    ThousandEyes_for_OpenTelemetry_API_StreamLinks:
      type: object
      readOnly: true
      properties:
        self:
          $ref: >-
            #/components/schemas/ThousandEyes_for_OpenTelemetry_API_StreamSelfLink
    ThousandEyes_for_OpenTelemetry_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    ThousandEyes_for_OpenTelemetry_API_ApiError:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          example: 1679677853573
        status:
          type: integer
          example: 500
        errors:
          type: string
          example: Internal Server Error
        path:
          type: string
          format: url
          example: https://api.thousandeyes.com/v7/request/path
    ThousandEyes_for_OpenTelemetry_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Test_Snapshots_API_SnapshotRequest:
      type: object
      required:
        - displayName
        - startDate
        - endDate
      properties:
        displayName:
          type: string
          description: Snapshot title.
          example: Snapshot created through API
        startDate:
          type: string
          format: date-time
          description: >-
            The start date for the snapshot in UTC time, formatted in ISO
            date-time.
          example: '2023-06-06T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: >-
            The end date for the snapshot in UTC time, formatted in ISO
            date-time.
          example: '2023-06-06T01:00:00Z'
        isPublic:
          type: boolean
          description: >-
            Set to `true` for saved events and `false` for share links. Its
            default value is `false`.

            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          example: false
    Test_Snapshots_API_SnapshotResponse:
      type: object
      properties:
        id:
          type: string
          description: Snapshot ID.
          example: wdiac
        startRoundId:
          type: integer
          description: >-
            The start time of the test snapshot, represented in epoch time
            format (in seconds).
          example: 1538784000
          readOnly: true
        endRoundId:
          type: integer
          description: >-
            The end time of the test snapshot, represented in epoch time format
            (in seconds).
          example: 1538787600
          readOnly: true
        roundId:
          type: integer
          description: >-
            The selected time of the test snapshot, represented in epoch time
            format (in seconds).
          example: 1538784000
          readOnly: true
        shareDate:
          type: string
          format: date-time
          description: >-
            The date when the test snapshot was created in UTC time, formatted
            in ISO date-time.
          example: '2023-06-06T00:00:00Z'
        sourceTestId:
          type: string
          description: Snapshot test ID.
          example: '281474976710706'
        testId:
          type: string
          description: Snapshot test ID.
          example: '281474976710801'
        uid:
          type: string
          description: User ID.
          example: '281474976810911'
        displayName:
          type: string
          description: Snapshot title.
          example: Snapshot created through API
        extraParams:
          type: string
          description: Extra parameters.
          example: params
        test:
          $ref: '#/components/schemas/Test_Snapshots_API_SnapshotTest'
        _links:
          $ref: '#/components/schemas/Test_Snapshots_API_SnapshotLinks'
    Test_Snapshots_API_SnapshotTest:
      allOf:
        - $ref: '#/components/schemas/Test_Snapshots_API_UnexpandedTest'
        - $ref: '#/components/schemas/Test_Snapshots_API_UnexpandedInstantTest'
    Test_Snapshots_API_SnapshotLinks:
      allOf:
        - $ref: '#/components/schemas/Test_Snapshots_API_AppAndSelfLinks'
        - example:
            self:
              href: http://api.thousandeyes.com/v7/tests/227103/snapshot
            appLink:
              href: >-
                https://app.stg.thousandeyes.com/view/tests/?testId=227103&__a=105
    Test_Snapshots_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Test_Snapshots_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Test_Snapshots_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Test_Snapshots_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Test_Snapshots_API_ValidationErrorItem'
    Test_Snapshots_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Test_Snapshots_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Test_Snapshots_API_Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    Test_Snapshots_API_UnexpandedTest:
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Test_Snapshots_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Test_Snapshots_API_Enabled'
    Test_Snapshots_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Test_Snapshots_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Test_Snapshots_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Test_Snapshots_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Test_Snapshots_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Test_Snapshots_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Test_Snapshots_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Test_Snapshots_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Test_Snapshots_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Test_Snapshots_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Test_Snapshots_API_TestResults'
      readOnly: true
    Test_Snapshots_API_UnexpandedInstantTest:
      type: object
      properties:
        createdBy:
          $ref: '#/components/schemas/Test_Snapshots_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Test_Snapshots_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Test_Snapshots_API_TestType'
        _links:
          $ref: '#/components/schemas/Test_Snapshots_API_TestLinks'
    Test_Snapshots_API_AppAndSelfLinks:
      type: object
      description: A links object containing the ThousandEyes App link
      readOnly: true
      properties:
        appLink:
          $ref: '#/components/schemas/Test_Snapshots_API_Link'
        self:
          $ref: '#/components/schemas/Test_Snapshots_API_Link'
    Usage_API_ExpandUsageOptions:
      type: string
      enum:
        - test
        - enterprise-agent
        - enterprise-agent-unit
        - endpoint-agent
        - endpoint-agent-essential
        - endpoint-agent-embedded
    Usage_API_OrganizationQuota:
      type: object
      required:
        - value
      properties:
        value:
          type: integer
          format: int64
          description: Value of the quota for the given Organization.
          example: 22500
        orgId:
          type: string
          description: Unique ID of the organization.
          example: '10'
    Usage_API_AccountGroupQuota:
      type: object
      properties:
        value:
          type: integer
          format: int64
          description: Value of the quota for the given Account Group.
          example: 12000
        aid:
          type: string
          description: Unique ID of the account group.
          example: '1234'
    Usage_API_Quota:
      type: object
      properties:
        organizationQuota:
          $ref: '#/components/schemas/Usage_API_OrganizationQuota'
        accountGroupQuotas:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_AccountGroupQuota'
          example:
            - value: 12000
              aid: '1234'
            - value: 10000
              aid: '12345'
    Usage_API_Quotas:
      type: object
      properties:
        quotas:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_Quota'
        _links:
          $ref: '#/components/schemas/Usage_API_SelfLinks'
    Usage_API_UsageQuota:
      type: object
      properties:
        monthStart:
          type: string
          format: date-time
          description: Beginning of usage period in UTC (ISO date-time format).
          example: '2020-01-05T08:00:00Z'
        monthEnd:
          type: string
          format: date-time
          description: End of usage period in UTC (ISO date-time format)..
          example: '2020-02-05T08:00:00Z'
        cloudUnitsIncluded:
          type: integer
          format: int64
          example: 4320000000
          description: Monthly number of cloud units allocated, as part of the contract.
        deviceAgentsIncluded:
          type: integer
          format: int64
          example: 100
          description: >-
            Number of device agents (connected devices product) allocated
            monthly, as specified in the contract.
        endpointAgentsIncluded:
          type: integer
          format: int64
          example: 200
          description: >-
            Monthly number of endpoint agents allocated, as part of the
            contract.
        endpointAgentsEssentialsIncluded:
          type: integer
          format: int64
          example: 10
          description: >-
            Monthly number of endpoint agents essentials allocated, as part of
            the contract.
        endpointAgentsEmbeddedIncluded:
          type: integer
          format: int64
          example: 10
          description: >-
            Number of embedded endpoint agents allocated monthly, as specified
            in the contract.
        enterpriseAgentsIncluded:
          type: integer
          format: int64
          example: 25
          description: >-
            Monthly number of enterprise agents allocated, as part of the
            contract. Returns non-zero value only for organizations with legacy
            billing.
    Usage_API_Usage:
      type: object
      properties:
        usage:
          $ref: '#/components/schemas/Usage_API_UsageDetails'
        _links:
          $ref: '#/components/schemas/Usage_API_SelfLinks'
    Usage_API_UsageDetails:
      type: object
      properties:
        quota:
          $ref: '#/components/schemas/Usage_API_UsageQuota'
        cloudUnitsUsed:
          type: integer
          format: int64
          example: 8500489
          description: Number of cloud units consumed thus far in the usage period.
        cloudUnitsProjected:
          type: integer
          format: int64
          example: 20993812
          description: >-
            Number of cloud units projected in the current usage period, based
            on units consumed to date and configuration of enabled tests. This
            value is updated hourly.
        cloudUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 25123456
          description: >-
            Number of cloud units projected in the upcoming usage period, based
            on configuration of enabled tests. This value is updated hourly.
        enterpriseUnitsUsed:
          type: integer
          format: int64
          example: 79640902
          description: >-
            Number of enterprise units consumed in the usage period. Returns
            non-zero value only for organizations with metered billing.
        enterpriseUnitsProjected:
          type: integer
          format: int64
          example: 108016317
          description: >-
            Number of enterprise units projected in the current usage period,
            based on units consumed to date and configuration of enabled tests.
            This value is updated hourly. Returns non-zero value only for
            organizations with metered billing.
        enterpriseUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 0
          description: >-
            Projected number of enterprise units for the upcoming usage period,
            based on the configuration of enabled tests. This value is updated
            hourly and returns a non-zero value only for organizations with
            metered billing.
        connectedDevicesUnitsUsed:
          type: integer
          format: int64
          example: 79640902
          description: Number of connected device units consumed in the usage period.
        connectedDevicesUnitsProjected:
          type: integer
          format: int64
          example: 108016317
          description: >-
            Projected number of connected device units for the current usage
            period. This projection is based on the units consumed to date and
            the configuration of enabled tests. The value is updated hourly.
        connectedDevicesUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 0
          description: >-
            Projected number of connected device units for the upcoming usage
            period. This projection is based on the configuration of enabled
            tests and is updated hourly.
        endpointAgentsUsed:
          type: integer
          format: int64
          example: 42
          description: >-
            Number of endpoint agents used in the current usage period. This
            number is calculated by taking the maximum number of agents enabled
            for any one-hour period in the usage period. Disabled agents are
            excluded from this calculation.
        endpointAgentsEssentialsUsed:
          type: integer
          format: int64
          example: 5
          description: >-
            Number of endpoint agents essentials used in the current usage
            period. This number is calculated by taking the maximum number of
            agents enabled for any one-hour period in the usage period. Disabled
            agents are excluded from this calculation.
        endpointAgentsEmbeddedUsed:
          type: integer
          format: int64
          example: 5
          description: >-
            Number of embedded endpoint agents used in the current usage period.
            This number is calculated by taking the maximum number of agents
            enabled for any one-hour period in the usage period. Disabled agents
            are excluded from this calculation.
        enterpriseAgentsUsed:
          type: integer
          format: int64
          example: 58
          description: >-
            Number of enterprise agents used in the current usage period. This
            number is calculated by taking the maximum number of agents enabled
            for any one-hour period in the usage period. Disabled agents are
            excluded from this calculation.
        enterpriseAgentUnits:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_EnterpriseAgentUnits'
          example:
            - aid: '1234'
              agentId: '123456'
              accountGroupName: Support
              agentName: TEVA-test-agent
              enterpriseUnitsUsed: 599878
              enterpriseUnitsProjected: 597808
            - aid: '315'
              agentId: '789'
              accountGroupName: Documentation
              agentName: lab-physical-appliance-1
              enterpriseUnitsUsed: 597123
              enterpriseUnitsProjected: 597808
          description: >-
            A breakdown of enterprise unit consumption for each agent during the
            current monthly period. Each entry provides data for both the
            current actual usage and the projected usage. Returns non-zero
            values for organizations with metered billing.
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_TestUsage'
          example:
            - aid: '1234'
              testId: '1158'
              accountGroupName: Documentation
              testName: https://app.thousandeyes.com
              testType: Web-Page Load
              cloudUnitsUsed: 14050
              cloudUnitsProjected: 340674
            - aid: '12345'
              testId: '1159'
              accountGroupName: Documentation
              testName: https://support.thousandeyes.com
              testType: Web - HTTP Server
              cloudUnitsUsed: 64390
              cloudUnitsProjected: 164457
          description: >-
            A breakdown of unit consumption for each test during the current
            monthly period. Each entry provides information about both the
            current actual usage and the projected usage.
        endpointAgents:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_EndpointAgentsUsage'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsUsed: 22
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsUsed: 14
          description: Endpoint agents used by account group.
        endpointAgentsEssentials:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_EndpointAgentsEssentials'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsEssentialsUsed: 2
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsEssentialsUsed: 3
          description: Endpoint agents essentials used by account group.
        endpointAgentsEmbedded:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_EndpointAgentsEmbedded'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsEmbeddedUsed: 2
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsEmbeddedUsed: 3
          description: Endpoint agents embedded used by account group.
        enterpriseAgents:
          type: array
          items:
            $ref: '#/components/schemas/Usage_API_EnterpriseAgents'
          example:
            - aid: '1234'
              accountGroupName: Support
