  /alerts:
    get:
      tags:
        - Alerts
      summary: List alerts
      operationId: getAlerts
      description: >-
        Returns a list of alerts. Only active (triggered) alerts are returned by
        default. 

        To retrieve cleared alerts, specify `clear` in the optional `state`
        parameter. Note that the `state` parameter only accepts a single value,
        so to get both active and cleared alerts within a time range, two
        separate requests are needed.

        Time filters (`window`, `startDate`, `endDate`) are applied differently
        depending on state: - For `state=trigger`: filters by when the alert
        started. - For `state=clear`: filters by when the alert cleared. - When
        state is not specified: returns cleared alerts within the time range
        plus any currently active alerts that started before the end of the
        range.
      parameters:
        - $ref: '#/components/parameters/Alerts_API_AccountGroupId'
        - $ref: '#/components/parameters/Alerts_API_Window'
        - $ref: '#/components/parameters/Alerts_API_StartDateParameter'
        - $ref: '#/components/parameters/Alerts_API_EndDateParameter'
        - $ref: '#/components/parameters/Alerts_API_PaginationMax'
        - $ref: '#/components/parameters/Alerts_API_PaginationCursor'
        - $ref: '#/components/parameters/Alerts_API_State'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Alerts_API_Alerts'
        '401':
          $ref: '#/components/responses/Alerts_API_401'
        '403':
          $ref: '#/components/responses/Alerts_API_403'
        '404':
          $ref: '#/components/responses/Alerts_API_404'
        '429':
