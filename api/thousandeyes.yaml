    Cloud_Insights_Integrations_API_AwsIntegrationPolicySetting:
      type: object
      required:
        - enabledResourceGroupTypes
        - enabledRegions
        - enabledCloudtrail
      description: >-
        AWS integration policy configuration that controls which resource groups
        and regions ThousandEyes inventories, and whether CloudTrail is enabled.
      properties:
        enabledResourceGroupTypes:
          type: array
          description: >-
            The set of AWS resource group types included in inventory
            monitoring.
          items:
            $ref: >-
              #/components/schemas/Cloud_Insights_Integrations_API_AwsResourceGroupType
          example:
            - ec2
            - s3-bucket
            - global-network
        enabledRegions:
          type: array
          description: The AWS regions that ThousandEyes inventories for the account group.
          items:
            $ref: '#/components/schemas/Cloud_Insights_Integrations_API_AwsRegion'
          example:
            - us-east-1
            - eu-west-1
            - ap-southeast-2
        enabledCloudtrail:
          type: boolean
          description: >-
            Indicates whether CloudTrail integration is enabled for AWS
            inventory monitoring.
          example: true
        _links:
          $ref: '#/components/schemas/Cloud_Insights_Integrations_API_SelfLinks'
    Cloud_Insights_Integrations_API_AwsResourceGroupType:
      type: string
      description: >-
        Supported AWS resource group types that can be toggled within policy
        settings. Note that ec2 is a mandatory resource group type and will be
        enabled regardless of user configuration.
      enum:
        - cloudfront
        - ec2
        - eks-ecs
        - global-accelerator
        - direct-connect
        - s3-bucket
        - network-firewall
        - global-network
      example: ec2
    Cloud_Insights_Integrations_API_AwsRegion:
      type: string
      description: >-
        AWS region identifier that can be enabled for Cloud Insights inventory
        monitoring.
      enum:
        - us-east-1
        - us-east-2
        - us-west-1
        - us-west-2
        - ca-central-1
        - ca-west-1
        - mx-central-1
        - sa-east-1
        - eu-central-1
        - eu-west-1
        - eu-west-2
        - eu-south-1
        - eu-west-3
        - eu-south-2
        - eu-north-1
        - eu-central-2
        - il-central-1
        - me-south-1
        - me-central-1
        - af-south-1
        - ap-east-1
        - ap-south-2
        - ap-southeast-3
        - ap-southeast-5
        - ap-southeast-4
        - ap-southeast-7
        - ap-south-1
        - ap-northeast-3
        - ap-northeast-2
        - ap-southeast-1
        - ap-southeast-2
        - ap-northeast-1
      example: us-east-1
    Cloud_Insights_Integrations_API_AzureIntegrationPolicySetting:
      type: object
      required:
        - enabledResourceGroupTypes
        - subscriptionsPolicy
      description: >-
        Azure integration policy configuration that defines the monitored Azure
        resource groups and the subscription policy that ThousandEyes enforces.
      properties:
        enabledResourceGroupTypes:
          type: array
          description: >-
            The set of Azure resource group types included in inventory
            monitoring.
          items:
            $ref: >-
              #/components/schemas/Cloud_Insights_Integrations_API_AzureResourceGroupType
          example:
            - networking
            - virtual-wan
            - traffic-manager
        subscriptionsPolicy:
          $ref: >-
            #/components/schemas/Cloud_Insights_Integrations_API_SubscriptionsPolicy
        _links:
          $ref: '#/components/schemas/Cloud_Insights_Integrations_API_SelfLinks'
    Cloud_Insights_Integrations_API_AzureResourceGroupType:
      type: string
      description: >-
        Supported Azure resource group types that can be toggled within policy
        settings. Note that networking is a mandatory resource group type and
        will be enabled regardless of user configuration.
      enum:
        - afd
        - security
        - express-route
        - virtual-wan
        - traffic-manager
        - networking
      example: networking
    Cloud_Insights_Integrations_API_SubscriptionsPolicy:
      type: object
      required:
        - rules
        - defaultAction
      description: >
        Policy document that controls which Azure subscriptions are inventoried.
        Up to 10 rules can be provided. Rules are evaluated in order; if none
        match, the defaultAction is applied.
      properties:
        rules:
          type: array
          description: Ordered list of subscription policy rules. Maximum of 10 entries.
          maxItems: 10
          items:
            $ref: >-
              #/components/schemas/Cloud_Insights_Integrations_API_SubscriptionsPolicyRule
        defaultAction:
          $ref: >-
            #/components/schemas/Cloud_Insights_Integrations_API_SubscriptionsPolicyRuleAction
      example:
        rules:
          - field: subscription-name
            pattern: ^prod-.*$
            action: include
          - field: subscription-id
            pattern: 3145d332-e1c9-4670-a672-12e17d4f627e
            action: exclude
        defaultAction: exclude
    Cloud_Insights_Integrations_API_SubscriptionsPolicyRule:
      type: object
      required:
        - field
        - pattern
        - action
      description: A single subscription rule consisting of a field, pattern, and action.
      properties:
        field:
          $ref: >-
            #/components/schemas/Cloud_Insights_Integrations_API_SubscriptionsPolicyRuleField
        pattern:
          type: string
          description: >-
            String or regular expression used to match subscription identifiers
            or names.
          example: ^prod-.*$
        action:
          $ref: >-
            #/components/schemas/Cloud_Insights_Integrations_API_SubscriptionsPolicyRuleAction
    Cloud_Insights_Integrations_API_SubscriptionsPolicyRuleField:
      type: string
      description: >-
        Identifies whether the rule evaluates subscription IDs or subscription
        names.
      enum:
        - subscription-id
        - subscription-name
      example: subscription-id
    Cloud_Insights_Integrations_API_SubscriptionsPolicyRuleAction:
      type: string
      description: Action applied when a subscriptions policy rule matches.
      enum:
        - include
        - exclude
      example: include
