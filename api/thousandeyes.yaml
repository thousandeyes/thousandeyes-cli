          properties:
            score:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_EndpointHttpDataPointScore
            connectTime:
              type: integer
              description: >-
                Time required to establish a TCP connection to the server in
                milliseconds.
              example: 2
              readOnly: true
            dnsTime:
              type: integer
              description: Time required to resolve DNS in milliseconds.
              example: 0
              readOnly: true
            errorType:
              $ref: '#/components/schemas/Endpoint_Test_Results_API_HttpErrorType'
            errorDetails:
              type: string
              description: Error details, if an error were encountered.
              readOnly: true
            headers:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_HttpEndpointTestResultHeaders
            numRedirects:
              type: integer
              description: Number of redirects.
              example: 0
              readOnly: true
            receiveTime:
              type: integer
              description: >-
                Elapsed time between first and last byte of response in
                milliseconds.
              example: 1
              readOnly: true
            redirectTime:
              type: integer
              description: Cumulative redirect timing in milliseconds.
              example: 10
              readOnly: true
            responseCode:
              type: integer
              description: HTTP response code.
              example: 200
              readOnly: true
            responseTime:
              type: integer
              description: Time to first byte in milliseconds.
              example: 14
              readOnly: true
            serverIp:
              type: string
              description: IP address of destination server.
              example: 193.2.1.88
              readOnly: true
            sslTime:
              type: integer
              description: Time to negotiate SSL/TLS in milliseconds.
              example: 9
              readOnly: true
            totalTime:
              type: integer
              description: Total time is the response time + receive time.
              example: 15
              readOnly: true
            waitTime:
              type: integer
              description: >-
                Time elapsed between completion of request and first byte of
                response in milliseconds.
              example: 3
              readOnly: true
            wireSize:
              type: integer
              description: Size of content in bytes.
              example: 9993
              readOnly: true
            throughput:
              type: integer
              description: Amount of data transmitted, in bytes.
              example: 190
              readOnly: true
