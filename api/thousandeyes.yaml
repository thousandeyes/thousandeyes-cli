    Internet_Insights_API_ApiOutageFilter:
      description: >-
        Advanced filter query used to filter the response. Can filter on: -
        outageScope (all, affected tests (e.g. my tests only)). - providerName -
        interfaceNetwork - applicationName - startDate, endDate - window
      type: object
      properties:
        startDate:
          type: string
          description: Start of the time range. Must be paired with `endDate`.
          format: yyyy-MM-ddTHH:mm[:ss]Z
          example: '2022-03-01T01:30:00Z'
        endDate:
          type: string
          description: End of the time range. Must be paired with `startDate`.
          format: yyyy-MM-ddTHH:mm[:ss]Z
          example: '2022-03-01T23:30:15Z'
        window:
          type: string
          description: >-
            Specify a time period in the past for which to retrieve data.
            Alternative to specifying `startDate` and `endDate`.
          format: ^[0-9]+[smhdw]?
          example: 1d
        outageScope:
          $ref: '#/components/schemas/Internet_Insights_API_OutageScope'
        providerName:
          type: array
          description: The name used to identify the provider.
          example:
            - Telia
            - Amazon
          items:
            type: string
        applicationName:
          type: array
          description: The name to identify the application.
          example:
            - slack
            - facebook
          items:
            type: string
        interfaceNetwork:
          type: array
          description: The name of the ASN (Interface Network).
          items:
            type: string
      example:
        startDate: '2022-03-01T01:30:00Z'
        endDate: '2022-03-01T23:30:15Z'
        outageScope: all
        providerName:
          - Telia
          - Amazon
        interfaceNetwork:
          - Telianet
          - Cloudflare
        applicationName:
          - slack
          - facebook
