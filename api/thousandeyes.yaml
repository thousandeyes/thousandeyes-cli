              example: 167.04
              format: double
              readOnly: true
            errorDetails:
              type: string
              description: Error details, if an error was encountered.
              example: Error
              readOnly: true
            jitter:
              type: number
              description: Standard deviation of latency.
              example: 0.076808
              format: double
              readOnly: true
            score:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_EndpointPingDataPointScore
