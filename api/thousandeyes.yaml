            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Templates_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Templates_API_Link'
    Templates_API_TagConfigurationOverride:
      type: object
      description: >
        Partial override for a tag configuration defined in a template. All
        fields are optional;

        only the fields you specify will override the corresponding values in
        the base template tag.
      properties:
        key:
          description: The tag's key.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        value:
          description: The tag's value.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        objectType:
          description: The type of object the tag is associated with.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagObjectTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        accessType:
          description: The access type of the tag.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_AccessType'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        color:
          description: The tag color as a hex code.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        assignments:
          description: Override the tag assignments for this tag.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagAssignmentListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
