      properties:
        alertId:
          type: string
          description: Identifier of the alert.
          example: '2004945'
        testId:
          type: string
          description: Identifier of the test.
          example: '56512'
        ruleId:
          type: string
          description: Identifier of the rule.
          example: '281724'
        alertSource:
          type: string
          description: Name of the agent, monitor or device producing the alert.
          example: Http Test
        alertRule:
          type: string
          description: Name of the alert rule that this alert belongs to.
          example: Http Test Rule
        alertType:
          $ref: '#/components/schemas/Dashboards_API_AlertListAlertType'
        startTime:
          type: string
          format: date-time
          description: UTC date when the alert was first active.
          example: '2023-06-02T08:54:00Z'
        durationInSeconds:
          type: integer
          format: int64
          description: >-
            Number of seconds the alert was active. If it’s still active, this
            number will increase every second.
          example: 25
        active:
          type: boolean
          description: Set to `true` if alert is active, `false` otherwise.
          example: true
    Dashboards_API_ApiDashboardAsw:
      type: object
      description: Alert suppression window shown in a widget.
      properties:
        id:
          type: string
          description: Identifier of the alert suppression window.
          example: '281474976710662'
        name:
          type: string
          description: Name of the alert suppression window.
          example: Test dashboards
        testIds:
          uniqueItems: true
          type: array
          items:
            type: string
          example:
            - '281474976710661'
        startTimes:
          type: array
          items:
            type: string
            format: date-time
          example:
            - '2023-05-16T10:14:28Z'
        durationInSeconds:
          type: integer
          format: int64
          example: 7200
        repeat:
          $ref: '#/components/schemas/Dashboards_API_AswRepeat'
        repeatEvery:
          type: integer
          format: int32
          example: 5
        repeatUnit:
          $ref: '#/components/schemas/Dashboards_API_AswRepeatUnit'
    Dashboards_API_AswRepeat:
      type: string
      enum:
        - none
        - every-day
        - alt-every-day
        - every-week
        - every-two-week
        - every-month
        - every-three-month
        - custom
      example: custom
    Dashboards_API_AswRepeatUnit:
      type: string
      enum:
        - day
        - week
        - month
      example: week
    Dashboards_API_ApiDataPointGroup:
      type: object
      description: Group of data points.
      properties:
        groupProperty:
          type: string
          description: >-
            Defines the criterion used to aggregate data points under specific
            group values.
          example: COUNTRY
        groupValue:
          type: string
          description: The value of a group.
          example: US
    Dashboards_API_ApiGraphletPoint:
      type: object
