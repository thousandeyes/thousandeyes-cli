    Usage_API_TestUsage:
      type: object
      properties:
        aid:
          type: string
          description: Unique identifier of the account group which owns the test.
          example: '1234'
        accountGroupName:
          type: string
          description: Name of the account group which owns the test.
          example: Account A
        testId:
          type: string
          description: Unique identifier of the test generating usage.
        testName:
          type: string
          description: Name of the test generating usage.
        testType:
          type: string
          description: >-
            The type of test that generated the usage data. Note that this
            parameter provides a user-friendly description of the test type and
            should not be parsed to determine the endpoint for querying
            configuration details.
        cloudUnitsUsed:
          type: integer
          format: int64
          description: >-
            Number of cloud units that the test has consumed in the usage
            period.
        cloudUnitsProjected:
          type: integer
          format: int64
          description: >-
            The estimated number of cloud units that the test is expected to
            consume during the usage period. This estimate is determined by
            considering the units consumed up to the current time and the test's
            configuration. It's important to note that this value is updated
            every hour. For new tests, the `cloudUnitsProjected` parameter is
            absent until the projection is calculated.
