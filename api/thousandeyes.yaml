    Dashboards_API_DashboardSnapshotRateLimit:
      schema:
        type: integer
        example: 100
      description: >-
        The maximum number of dashboard snapshot requests allowed within a
        specified time frame. The limit is 100 requests per hour.
    Dashboards_API_DashboardSnapshotRateLimitRemaining:
      schema:
        type: integer
        example: 45
      description: >-
        The number of remaining dashboard snapshot requests that can be made
        within the current time frame. This value indicates how many of the
        allowed 100 requests per hour are still available.
    Dashboards_API_DashboardSnapshotRateLimitReset:
      schema:
        type: integer
        example: 160
      description: >-
        The amount of time remaining until the rate limit resets and the full
        quota of requests is available again. If the value is 0, it means the
        rate limit currently allows access.
    Dashboards_API_Location:
      schema:
        type: string
        format: uri
        example: https://api.thousandeyes.com/v7/link/to/resource/id
