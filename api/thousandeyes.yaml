  /endpoint/test-results/real-user-tests/networks/filter:
    post:
      tags:
        - Real User Endpoint Test Results
      summary: List endpoint real user tests networks
      description: >
        Returns a list of all endpoint real user tests. 

        Sessions from the last round are provided unless an explicit start and
        end is provided with `startDate`, `endDate` or `window` optional
        parameters.


        ## Request body filters

        This endpoint supports complex filtering using the request body.

        It is important these filters remain unaltered when making use of
        pagination, otherwise the results will not be coherent with the original
        request.


        ### Multiple filter fields

        When multiple filter fields are provided, a logical `AND` is applied
        between the filters.
         ```
        curl --location --request POST
        'https://api.thousandeyes.com/v7/endpoint/test-results/real-user-tests/networks/filter'

        --header 'Authorization: Bearer $token'

        --header 'Content-Type: application/json'

        --data-raw '{
           "searchFilters": {
            "platform": [ "mac" ],
            "domain": [ "thousandeyes.com" ]
          }}'
        ```


        ### Filter field with multiple values

        When a filter field contains multiple values, a logical `OR` is applied
        between the filter values.
         ```
        curl --location --request POST
        'https://api.thousandeyes.com/v7/endpoint/test-results/real-user-tests/networks/filter'

        --header 'Authorization: Bearer $token'

        --header 'Content-Type: application/json'

        --data-raw '{
          "searchFilters": {
            "networkId": [ "660b34109d12", "660b34109d15" ]
          }}'
        ```


        ### Combination of request parameters and body filters

        ```

        curl --location --request POST
        'https://api.thousandeyes.com/v7/endpoint/test-results/real-user-tests/networks/filter?window=1w'

        --header 'Authorization: Bearer $token'

        --header 'Content-Type: application/json'

        --data-raw '{
          "searchFilters": {
            "platform": [ "mac" ],
            "domain": [ "thousandeyes.com" ],
            "networkId": [ "660b34109d12", "660b34109d15" ]
          }}'
        ```


        Returns a `results` array of endpoint real user tests. 

        Network sessions shown are from the latest round, or based on the time
        range specified.
      operationId: filterRealUserTestsNetworkResults
      parameters:
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_AccountGroupId'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_Window'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_StartDateParameter'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_EndDateParameter'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_PaginationCursor'
      requestBody:
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_RealUserEndpointTestResultsRequest
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: >-
                  #/components/schemas/Endpoint_Test_Results_API_RealUserEndpointTestNetworkResults
        '400':
          $ref: '#/components/responses/Endpoint_Test_Results_API_400'
        '401':
          $ref: '#/components/responses/Endpoint_Test_Results_API_401'
        '403':
          $ref: '#/components/responses/Endpoint_Test_Results_API_403'
        '404':
          $ref: '#/components/responses/Endpoint_Test_Results_API_404'
        '429':
          $ref: '#/components/responses/Endpoint_Test_Results_API_429'
        '500':
          $ref: '#/components/responses/Endpoint_Test_Results_API_500'
        '502':
          $ref: '#/components/responses/Endpoint_Test_Results_API_502'
      security:
        - Endpoint_Test_Results_API_BearerAuth: []
