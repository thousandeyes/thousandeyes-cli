      type: object
      description: Determines how to aggregate the the metric.
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_WidgetMeasureType'
        percentileValue:
          type: number
          description: The percentile value to use when `type == NTH_PERCENTILE`.
          format: float
          example: 95
    Templates_API_LegacyDurationUnit:
      type: string
