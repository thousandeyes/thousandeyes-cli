    Tests_API_TestPageLoadTimeLimit:
      type: integer
      description: Page load time limit. Must be larger than the `httpTimeLimit`.
      minimum: 5
      maximum: 60
      default: 10
      example: 10
    Tests_API_TestBlockDomains:
      type: string
      description: >-
        Domains or full object URLs to be excluded from metrics and waterfall
        data for transaction tests.
      example: domain.com/
    Tests_API_TestDisableScreenshot:
      type: boolean
      description: Enables or disables screenshots on error. Set true to not capture
      default: false
      example: false
    Tests_API_TestAllowMicAndCamera:
      type: boolean
      description: Set true allow the use of a fake mic and camera in the browser.
      default: false
      example: false
    Tests_API_TestAllowGeolocation:
      type: boolean
      description: Set true to use the agent’s geolocation by the web page.
      default: false
      example: false
    Tests_API_TestBrowserLanguage:
      type: string
      description: >-
        Set one of the available browser language that you want to use to
        configure the browser.
      example: en-US
    Tests_API_TestChromeOptions:
      type: string
      description: Command-line options passed to Chrome when running the test.
      default: ''
      example: '--disable-gpu'
    Tests_API_TestChromePolicies:
      type: string
      description: JSON string of Chrome policy settings to apply.
      default: '{}'
      example: '{"ProxyMode":"direct"}'
    Tests_API_TestPageLoadingStrategy:
      type: string
      enum:
        - normal
        - eager
        - none
      description: >
        * `normal`: The test waits until the entire page is fully loaded,
        including the downloading and parsing of HTML content as well as all
        associated resources, before advancing to the next action in the
        transaction test script. 

        * `eager`: The test waits for the DOMContentLoaded event, indicating
        that HTML content is downloaded and parsed, and the document reaches the
        "interactive" readiness state, before proceeding to the next action in
        the test script.

        * `none`: The test only waits for the download of HTML content. Once the
        HTML is downloaded, the test continues to the next action in the
        transaction test script without waiting for additional resources.
      default: normal
      example: normal
    Tests_API_TestPageLoadType:
      type: string
      example: page-load
      readOnly: true
    Tests_API_TestIdentifyAgentTrafficWithUserAgent:
      type: boolean
      description: >
        Determines how agent traffic is identified:


        * `false`: Adds the `x-thousandeyes-agent: yes` header.

        * `true`: Appends `(ThousandEyes Agent)` to the `user-agent` header.


        For more information, see [Notes on Agent ID
        Strategy](https://docs.thousandeyes.com/product-documentation/browser-synthetics/test-settings-page-load-transaction#notes-on-agent-id-strategy).
      example: false
      default: false
    Tests_API_PageLoadProperties:
      allOf:
        - $ref: '#/components/schemas/Tests_API_HttpServerBaseProperties'
        - type: object
          required:
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if one was given when the test was
                created.
              example: '2'
            pageLoadTargetTime:
              type: integer
              description: >-
                Target time for page load completion, specified in seconds and
                cannot exceed the `pageLoadTimeLimit`.
              minimum: 1
              maximum: 60
              example: 10
            pageLoadTimeLimit:
              $ref: '#/components/schemas/Tests_API_TestPageLoadTimeLimit'
            blockDomains:
              $ref: '#/components/schemas/Tests_API_TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/Tests_API_TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/Tests_API_TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/Tests_API_TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/Tests_API_TestBrowserLanguage'
            chromeOptions:
              $ref: '#/components/schemas/Tests_API_TestChromeOptions'
            chromePolicies:
              $ref: '#/components/schemas/Tests_API_TestChromePolicies'
            pageLoadingStrategy:
              $ref: '#/components/schemas/Tests_API_TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/Tests_API_TestPageLoadType'
            identifyAgentTrafficWithUserAgent:
              $ref: >-
                #/components/schemas/Tests_API_TestIdentifyAgentTrafficWithUserAgent
    Tests_API_TestHttpInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: >-
        HTTP test run interval. The interval between HTTP test runs in seconds
        cannot exceed the specified interval value and defaults to the same
        value as the interval if not set.
      example: 120
    Tests_API_TestSubInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1200
        - 1800
        - 3600
      description: >-
        Subinterval for round-robin testing (in seconds). Must be less than or
        equal to interval and must evenly divide interval.
      example: 60
    Tests_API_UnexpandedPageLoadTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_PageLoadProperties'
        - type: object
          required:
            - interval
          properties:
            httpInterval:
              $ref: '#/components/schemas/Tests_API_TestHttpInterval'
            subinterval:
              $ref: '#/components/schemas/Tests_API_TestSubInterval'
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_PageLoadInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_PageLoadProperties'
    Tests_API_PageLoadTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_PageLoadInstantTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - type: object
          required:
            - interval
          properties:
            httpInterval:
              $ref: '#/components/schemas/Tests_API_TestHttpInterval'
            subinterval:
              $ref: '#/components/schemas/Tests_API_TestSubInterval'
    Tests_API_TestWebTransactionTimeLimit:
      type: integer
      description: Time limit for transaction in seconds.
      minimum: 5
      maximum: 180
      default: 30
      example: 30
    Tests_API_TestWebTransactionType:
      type: string
      example: web-transactions
      readOnly: true
    Tests_API_WebTransactionProperties:
      allOf:
        - $ref: '#/components/schemas/Tests_API_HttpServerBaseProperties'
        - type: object
          required:
            - transactionScript
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if specified when the test was
                created.
              example: '2'
            targetTime:
              type: integer
              description: >-
                Target completion time, in seconds. Defaults to 10. Cannot
                exceed the `timeLimit` value.
              minimum: 1
              maximum: 180
              default: 10
              example: 1
            timeLimit:
              $ref: '#/components/schemas/Tests_API_TestWebTransactionTimeLimit'
            transactionScript:
              type: string
              description: >-
                JavaScript of a web transaction test. Quotes must be escaped
                (precede " characters with \ ).
              example: if (true) { return true; }
            blockDomains:
              $ref: '#/components/schemas/Tests_API_TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/Tests_API_TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/Tests_API_TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/Tests_API_TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/Tests_API_TestBrowserLanguage'
            chromeOptions:
              $ref: '#/components/schemas/Tests_API_TestChromeOptions'
            chromePolicies:
              $ref: '#/components/schemas/Tests_API_TestChromePolicies'
            pageLoadingStrategy:
              $ref: '#/components/schemas/Tests_API_TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/Tests_API_TestWebTransactionType'
            identifyAgentTrafficWithUserAgent:
              $ref: >-
                #/components/schemas/Tests_API_TestIdentifyAgentTrafficWithUserAgent
    Tests_API_UnexpandedWebTransactionTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_WebTransactionProperties'
        - type: object
          required:
            - interval
          properties:
            subinterval:
              $ref: '#/components/schemas/Tests_API_TestSubInterval'
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_TestCredentials:
      type: array
      description: >-
        Contains a list of credential IDs (get `credentialId` from
        `/credentials` endpoint).
      items:
        type: string
      example:
        - '3247'
        - '1051'
    Tests_API_WebTransactionInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_WebTransactionProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Tests_API_TestCredentials'
    Tests_API_WebTransactionTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_WebTransactionInstantTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - type: object
          required:
            - interval
          properties:
            subinterval:
              $ref: '#/components/schemas/Tests_API_TestSubInterval'
    Tests_API_ApiPredefinedVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name. Must be unique.
          example: myUsername
        value:
          type: string
          description: Variable value, will be treated as string.
          example: ThousandEyesAccountUserName
    Tests_API_ApiRequestAssertionName:
      type: string
      enum:
        - status-code
        - response-body
      description: >-
        Set to `status-code` to assert the response status code. Set to
        `response-body` to assert data is present in the response body. Use
        `ApiRequestAssertion` to set the value for the assertion.
      example: status-code
    Tests_API_ApiRequestAssertionOperator:
      type: string
      enum:
        - is
        - is-not
        - includes
        - not-includes
        - matches
        - not-matches
      description: >-
        If `name = status-code``, accepted values are [is, is-not]. If `name =
        response-body``, accepted values are [includes, not-includes, matches,
        not-matches]`.
      example: is
    Tests_API_ApiRequestAssertion:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Tests_API_ApiRequestAssertionName'
        operator:
          $ref: '#/components/schemas/Tests_API_ApiRequestAssertionOperator'
        value:
          type: string
          description: >-
            The value of the assertion. If name = `status-code`, the status code
            to assert. If name = `response-body`, the lookup value to assert.
          example: 200
    Tests_API_ApiRequestAuthType:
      type: string
      enum:
        - none
        - basic
        - bearer-token
        - oauth2
      description: Will override the Authorization request header.
      default: none
      example: none
    Tests_API_ApiClientAuthentication:
      type: string
      description: The OAuth2 client authentication location type.
      enum:
        - basic-auth-header
        - in-body
      example: basic-auth-header
    Tests_API_ApiRequestHeader:
      type: object
      properties:
        key:
          type: string
          description: Request header key.
          example: x-custom-header
        value:
          type: string
          description: Request header value. Supports variables `{{variableName}}`.
          example: keep-alive
    Tests_API_ApiRequestMethod:
      type: string
      description: HTTP request method.
      enum:
        - get
        - post
        - put
        - delete
        - patch
      example: get
    Tests_API_ApiRequestVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name
          example: myTestName
        value:
          type: string
          description: >-
            The JSON path of data within the Response Body to assign to this
            variable.
          example: tests[0].name
    Tests_API_ApiRequest:
      type: object
      required:
        - name
        - url
      properties:
        assertions:
          type: array
          description: List of assertion objects.
          items:
            $ref: '#/components/schemas/Tests_API_ApiRequestAssertion'
        authType:
          $ref: '#/components/schemas/Tests_API_ApiRequestAuthType'
        bearerToken:
          type: string
          writeOnly: true
          description: The bearer token if `authType = bearer-token`.
          example: abcd-1234-...
        body:
          type: string
          description: POST/PUT request body. Must be in JSON format.
        clientAuthentication:
          $ref: '#/components/schemas/Tests_API_ApiClientAuthentication'
        clientId:
          type: string
          description: The application ID used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-id
        clientSecret:
          type: string
          description: The private client secret used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-secret
        collectApiResponse:
          type: boolean
          description: >-
            Set to `true` if API response body should be collected and saved.
            Set to `false` if API response body should not be saved.
          default: true
          example: true
        headers:
          type: array
          description: Array of API Request Header objects.
          items:
            $ref: '#/components/schemas/Tests_API_ApiRequestHeader'
        method:
          $ref: '#/components/schemas/Tests_API_ApiRequestMethod'
        name:
          type: string
          description: API step name, must be unique.
          example: Step 1
        password:
          type: string
          writeOnly: true
          description: The password if `authType = basic`.
          example: basic_pw123
        scope:
          type: string
          description: >-
            Application-specific scope values for the access token when
            `authType` is "oauth2".
          example: read, write, deploy
        tokenUrl:
          type: string
          description: >-
            The endpoint used to request the access token when `authType` is
            "oauth2".
          example: https://id.cisco.com/oauth2/default/v1/token
        url:
          type: string
          description: Request url. Supports variables in the format `{{variableName}}`.
          example: https://api.thousandeyes.com/v7/status
        username:
          type: string
          description: The username if `authType = basic`.
          example: ThousandEyesUserName
        variables:
          type: array
          description: Array of API post request variable objects.
          items:
            $ref: '#/components/schemas/Tests_API_ApiRequestVariable'
        verifyCertificate:
          $ref: '#/components/schemas/Tests_API_TestVerifyCertificate'
        waitTimeMs:
          type: integer
          description: >-
            Post request delay before executing the next API requests, in
            milliseconds.
          example: 0
    Tests_API_ApiProperties:
      type: object
      required:
        - requests
        - url
      properties:
        clientCertificate:
          $ref: '#/components/schemas/Tests_API_TestClientCertificate'
        clientCertDomainsAllowList:
          type: string
          example: www.thousandeyes.com
          description: Comma separated list of domains to send the client certificate.
        collectProxyNetworkData:
          $ref: '#/components/schemas/Tests_API_TestCollectProxyNetworkData'
        distributedTracing:
          $ref: '#/components/schemas/Tests_API_TestDistributedTracing'
        followRedirects:
          $ref: '#/components/schemas/Tests_API_TestFollowRedirects'
        mtuMeasurements:
          $ref: '#/components/schemas/Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Tests_API_TestNumPathTraces'
        overrideAgentProxy:
          $ref: '#/components/schemas/Tests_API_TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/Tests_API_TestOverrideProxyId'
        pathTraceMode:
          $ref: '#/components/schemas/Tests_API_TestPathTraceMode'
        predefinedVariables:
          type: array
          items:
            $ref: '#/components/schemas/Tests_API_ApiPredefinedVariable'
        probeMode:
          $ref: '#/components/schemas/Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
        requests:
          type: array
          items:
            $ref: '#/components/schemas/Tests_API_ApiRequest'
        sslVersionId:
          $ref: '#/components/schemas/Tests_API_TestSslVersionId'
        targetTime:
          type: integer
          description: >-
            Target time for completion metric, defaults to 50% of time limit
            specified in seconds. (0 means default behavior)
          minimum: 0
          maximum: 60
          example: 1
        timeLimit:
          type: integer
          description: >-
            Time limit for transaction in seconds. Exceeding this limit will
            result in a Timeout error.
          minimum: 5
          maximum: 180
          default: 30
        type:
          type: string
          example: api
          readOnly: true
        url:
          $ref: '#/components/schemas/Tests_API_TestUrl'
    Tests_API_UnexpandedApiTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_ApiProperties'
        - type: object
          required:
            - interval
          properties:
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_ApiInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_ApiProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Tests_API_TestCredentials'
    Tests_API_ApiTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_ApiInstantTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - type: object
          required:
            - interval
    Tests_API_FtpServerRequestType:
      type: string
      enum:
        - download
        - upload
        - list
      description: Set the type of activity for the test.
      example: download
    Tests_API_FtpServerProperties:
      type: object
      required:
        - requestType
        - url
        - username
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/Tests_API_TestBandwidthMeasurements'
        downloadLimit:
          type: integer
          description: Specify maximum number of bytes to download from the target object.
          example: 1048576
        ftpTargetTime:
          type: integer
          description: Target time for operation completion; specified in milliseconds.
          minimum: 1000
          maximum: 6000
        ftpTimeLimit:
          type: integer
          description: Set the time limit for the test in seconds.
          minimum: 10
          maximum: 60
          default: 10
          example: 10
        mtuMeasurements:
          $ref: '#/components/schemas/Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Tests_API_TestNumPathTraces'
        password:
          $ref: '#/components/schemas/Tests_API_TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
        requestType:
          $ref: '#/components/schemas/Tests_API_FtpServerRequestType'
        url:
          $ref: '#/components/schemas/Tests_API_TestUrl'
        useActiveFtp:
          type: boolean
          description: Explicitly set the flag to use active FTP.
          default: false
          example: false
        useExplicitFtps:
          type: boolean
          description: >-
            Use explicit FTPS (ftp over SSL). By default, tests will autodetect
            when it is appropriate to use FTPS.
          example: false
        username:
          $ref: '#/components/schemas/Tests_API_TestUsername'
        fixedPacketRate:
          $ref: '#/components/schemas/Tests_API_TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/Tests_API_TestIpv6Policy'
        type:
          type: string
          example: ftp-server
          readOnly: true
    Tests_API_UnexpandedFtpServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_FtpServerProperties'
        - type: object
          required:
            - interval
          properties:
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_FtpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_FtpServerProperties'
    Tests_API_FtpServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_FtpServerInstantTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - type: object
          required:
            - interval
    Tests_API_SipServerProperties:
      type: object
      required:
        - port
        - targetSipCredentials
      properties:
        mtuMeasurements:
          $ref: '#/components/schemas/Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Tests_API_TestNumPathTraces'
        optionsRegex:
          type: string
          description: Options regex, this field does not require escaping.
          example:
            - a-z
        pathTraceMode:
          $ref: '#/components/schemas/Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Tests_API_TestProbeMode'
        randomizedStartTime:
          $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
        registerEnabled:
          type: boolean
          description: >-
            Set to true to perform SIP registration on the test target with the
            SIP REGISTER command.
          default: false
          example: false
        sipTargetTime:
          type: integer
          minimum: 100
          maximum: 5000
          description: Target time for test completion in milliseconds.
          example: 1000
        sipTimeLimit:
          type: integer
          minimum: 5
          maximum: 10
          description: Time limit in milliseconds.
          default: 5
          example: 5
        fixedPacketRate:
          $ref: '#/components/schemas/Tests_API_TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/Tests_API_TestIpv6Policy'
        type:
          type: string
          example: sip-server
          readOnly: true
    Tests_API_TestSipAuthUser:
      type: string
      description: Username for authentication with SIP server.
      example: username
    Tests_API_SipTestProtocol:
      type: string
      enum:
        - tcp
        - tls
        - udp
      description: Transport layer for SIP communication.
      default: tcp
      example: tcp
    Tests_API_TestSipRegistrar:
      type: string
      description: SIP server to be tested, specified by domain name or IP address.
      example: voice.thousandeyes.com
    Tests_API_TestSipUser:
      type: string
      description: >-
        Username for SIP registration, should be unique within a ThousandEyes
        account group.
      example: username
    Tests_API_UnexpandedSipServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_SipServerProperties'
        - type: object
          required:
            - interval
            - port
          properties:
            authUser:
              $ref: '#/components/schemas/Tests_API_TestSipAuthUser'
            password:
              $ref: '#/components/schemas/Tests_API_TestPassword'
            port:
              $ref: '#/components/schemas/Tests_API_TestPort'
            protocol:
              $ref: '#/components/schemas/Tests_API_SipTestProtocol'
            sipRegistrar:
              $ref: '#/components/schemas/Tests_API_TestSipRegistrar'
            user:
              $ref: '#/components/schemas/Tests_API_TestSipUser'
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_TestSipCredentials:
      type: object
      required:
        - port
      properties:
        authUser:
          $ref: '#/components/schemas/Tests_API_TestSipAuthUser'
        password:
          $ref: '#/components/schemas/Tests_API_TestPassword'
        port:
          $ref: '#/components/schemas/Tests_API_TestPort'
        protocol:
          $ref: '#/components/schemas/Tests_API_SipTestProtocol'
        sipRegistrar:
          $ref: '#/components/schemas/Tests_API_TestSipRegistrar'
        user:
          $ref: '#/components/schemas/Tests_API_TestSipUser'
    Tests_API_SipServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_SipServerProperties'
    Tests_API_SipServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - $ref: '#/components/schemas/Tests_API_SipServerInstantTest'
