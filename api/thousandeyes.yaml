          description: The name of the AWS flow logs monitoring integration.
          example: integration name
        roleArn:
          type: string
          description: The ARN of the AWS role to be monitored.
          example: arn:aws:iam::01234567890:role/aws-flow-logs-ro
        snsTopicsArns:
