      minimum: 100
      maximum: 5000
      description: Target time for HTTP server completion, specified in milliseconds.
      example: 100
    Endpoint_Instant_Scheduled_Tests_API_TestHttpVersion:
      type: integer
      minimum: 1
      maximum: 2
      description: >-
        HTTP protocol version. Set to '2' to prefer HTTP/2, or '1' to use only
        HTTP/1.1.
      default: 2
      example: 2
    Endpoint_Instant_Scheduled_Tests_API_TestSslVersion:
      type: string
      description: Reflects the verbose SSL protocol version used by a test.
      readOnly: true
      example: Auto
    Endpoint_Instant_Scheduled_Tests_API_TestUseNtlm:
      type: boolean
      description: >-
        Set to true to use NTLM, false to use Basic Authentication. Requires
        username and password to be set.
      example: false
    Endpoint_Instant_Scheduled_Tests_API_EndpointHttpServerTest:
      allOf:
        - $ref: >-
            #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_EndpointTest
        - $ref: >-
            #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_EndpointHttpServerBaseTest
        - type: object
          properties:
            type:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_EndpointHttpServerType
            followRedirects:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestFollowRedirects
            httpTargetTime:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestHttpTargetTime
            httpVersion:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestHttpVersion
            isPrioritized:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestIsPrioritized
            interval:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestInterval
            sslVersion:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestSslVersion
            useNtlm:
              $ref: >-
                #/components/schemas/Endpoint_Instant_Scheduled_Tests_API_TestUseNtlm
    Endpoint_Instant_Scheduled_Tests_API_EndpointRunScheduledInstantTestResult:
      type: object
      properties:
        message:
          type: string
          example: Successfully reran the instant scheduled test with testId=765231567
    Endpoint_Agents_API_ExpandEndpointAgentOptions:
      type: string
      enum:
        - clients
        - vpnProfiles
        - networkInterfaceProfiles
    Endpoint_Agents_API_FilterEndpointAgentsResponse:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgents'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Endpoint_Agents_API_PaginationNextLink'
    Endpoint_Agents_API_ListEndpointAgentsResponse:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgents'
        - type: object
          properties:
            _links:
              $ref: >-
                #/components/schemas/Endpoint_Agents_API_PaginationNextAndSelfLink
    Endpoint_Agents_API_EndpointAgents:
      description: A list of `EndpointAgents`.
      type: object
      properties:
        totalAgents:
          type: integer
          example: 1
          description: The total number of agents.
        agents:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgent'
    Endpoint_Agents_API_AgentSearchRequest:
      description: Parameters for filtering a list of agents.
      type: object
      properties:
        searchFilters:
          $ref: '#/components/schemas/Endpoint_Agents_API_AgentSearchFilters'
        thresholdFilter:
          $ref: '#/components/schemas/Endpoint_Agents_API_AgentThresholdFilters'
        searchSort:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentSearchSort'
    Endpoint_Agents_API_AgentSearchFilters:
      type: object
      properties:
        id:
          description: >-
            Returns only agents that are an exact match of the provided
            identifiers.
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgentId'
        agentName:
          description: |
            Returns only agents with the given name. 
            This is an exact match only.
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentName'
        computerName:
          description: |
            Returns only agents with the given computer name.
            This is an exact match only.
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_ComputerName'
        username:
          description: >
            Returns only agents that have at least one user with a name.

            starting with the provided string. This is a case-insensitive prefix
            match.
          type: array
          items:
            type: string
          example:
            - picard
        userPrincipalName:
          description: >
            Returns only agents that have at least one user principal name,
            starting with one of the provided strings. This is a
            case-insensitive prefix match. User principle name is the user login
            name in an Internet-style format, typically used in Active Directory
            environments.
          type: array
          items:
            type: string
          example:
            - picard@c.com
        platform:
          description: |
            Filter on the platform on which the agent is running.
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_Platform'
        osVersion:
          description: Case-insensitive prefix filter on the OS version.
          type: array
          items:
            type: string
            example: Version 10.15.2
        serialNumber:
          description: Case-insensitive prefix filter on the serial number.
          type: array
          maxItems: 50
          items:
            type: string
            example: xaab2ba4-d40f-4e80-9363-7e4826556055
        locationCountryISO:
          description: |
            Filter using the ISO country code of the location.
          type: array
          items:
            type: string
            example: FR
        locationSubdivision1Code:
          description: >
            Filter using the code for the first level administrative division
            within 

            the country. In US/Canada this is the State, in UK it's the country
            e.g. `ENG`
          type: array
          items:
            type: string
            example: ENG
        locationCity:
          description: >
            This is a prefix match on the city name field. The endpoint expects
            this to contain the 

            name of the city in English. e.g. 'Paris' or ''
          type: array
          items:
            type: string
            example: Paris
        licenseType:
          description: |
            Filter on the agent's license type
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentLicenseType'
        anyConnectDeviceId:
          description: >
            IDs of devices that has the Cisco Secure Client deployed with the
            Internet Security module.

            Returns only agents that have at least one matching
            `anyConnectDeviceId`.
          type: array
          items:
            type: string
          example:
            - JDLKSLFEIJER004334F
    Endpoint_Agents_API_AgentSearchSort:
      type: object
      properties:
        sort:
          $ref: '#/components/schemas/Endpoint_Agents_API_AgentSearchSortKey'
        order:
          $ref: '#/components/schemas/Endpoint_Agents_API_SortOrder'
    Endpoint_Agents_API_AgentSearchSortKey:
      type: string
      enum:
        - platform
        - osVersion
        - name
        - userName
        - city
        - serialNumber
    Endpoint_Agents_API_AgentThresholdFilters:
      type: object
      description: All filters are applied based on the conditional operator (and/or).
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentThresholdFilter'
        conditionalOperator:
          $ref: '#/components/schemas/Endpoint_Agents_API_ConditionalOperator'
    Endpoint_Agents_API_AgentThresholdFilter:
      type: object
      description: >-
        The metric is filtered based on the threshold value and operator
        provided.
      properties:
        name:
          type: string
          enum:
            - last-seen-ms
        value:
          type: number
          description: The threshold value.
          format: double
        operator:
          $ref: '#/components/schemas/Endpoint_Agents_API_ThresholdFilterOperator'
    Endpoint_Agents_API_ComputerName:
      description: |
        Returns only agents with the specified computer name.
        This is an exact match only.
      type: string
      example: DESKTOP-45AE8
    Endpoint_Agents_API_AgentName:
      description: |
        Returns only agents with the specified name. 
        This is an exact match only.
      type: string
      example: myagent-1234
    Endpoint_Agents_API_AgentTransferRequest:
      type: object
      properties:
        toAid:
          $ref: '#/components/schemas/Endpoint_Agents_API_AccountId'
      example:
        toAid: '1234'
    Endpoint_Agents_API_BulkAgentTransferRequest:
      type: object
      properties:
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentTransfer'
    Endpoint_Agents_API_BulkAgentTransferResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AgentTransferStatus'
          example:
            - status: 200
              detail: Initiated
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d4-39fc53edccba
                fromAid: '1234'
                toAid: '12345'
            - status: 400
              detail: Missing from-account id
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d5-39fc53ed1234
                fromAid: xxx
                toAid: '12345'
            - status: 403
              detail: User does not have permission on 'to' aid
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d5-39fc53ed7890
                fromAid: '1234'
                toAid: '12345'
    Endpoint_Agents_API_AgentTransfer:
      example:
        agentId: 5d0764ac-7e42-4ec8-a0d4-39fc53edccba
        fromAid: '1234'
        toAid: '12345'
      allOf:
        - type: object
          properties:
            agentId:
              $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgentId'
            fromAid:
              $ref: '#/components/schemas/Endpoint_Agents_API_AccountId'
            toAid:
              $ref: '#/components/schemas/Endpoint_Agents_API_AccountId'
    Endpoint_Agents_API_AgentTransferStatus:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Agents_API_Error'
        - type: object
          properties:
            request:
              $ref: '#/components/schemas/Endpoint_Agents_API_AgentTransfer'
    Endpoint_Agents_API_AccountId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Endpoint_Agents_API_AddressProfile:
      type: object
      description: A description of the IPs assigned to this machine.
      properties:
        addressType:
          $ref: '#/components/schemas/Endpoint_Agents_API_AddressType'
        ipAddress:
          type: string
          format: ip
          example: 2001:db8:3333:4444:5555:6666:7777:8888
          description: >-
            IP address of this interface in the network it's currently connected
            to.
        prefixLength:
          type: integer
          format: int32
          example: 24
          description: The number of bits representing the network part of the `ipAddress`.
        gateway:
          type: string
          format: ip
          example: 192.168.0.254
          description: The default gateway for this interface.
        routerHardwareAddress:
          type: string
          format: macaddress
          example: 5c:b1:3e:46:1c:84
          description: The router's MAC address resolved from an ARP request.
    Endpoint_Agents_API_AddressType:
      type: string
      example: unique-local
      enum:
        - loopback
        - unspecified
        - unique-local
        - link-local
        - unique-global
    Endpoint_Agents_API_EndpointAgentLocation:
      description: Approximate location of the agent.
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 51.51279
          readOnly: true
        longitude:
          type: number
          format: double
          example: -0.09184
          readOnly: true
        locationName:
          type: string
          example: London
          readOnly: true
    Endpoint_Agents_API_EndpointAsnDetails:
      required:
        - asNumber
      type: object
      readOnly: true
      properties:
        asNumber:
          type: integer
          format: int64
          example: 5089
          description: Autonomous system number.
        asName:
          type: string
          example: Virgin Media Limited
          description: Name of autonomous system.
    Endpoint_Agents_API_EndpointBrowserExtension:
      type: object
      properties:
        browser:
          $ref: '#/components/schemas/Endpoint_Agents_API_BrowserType'
        profile:
          type: string
          description: Name of the browser profile where this extension is stored.
          example: Profile 1
        version:
          type: string
          description: Endpoint agent browser extension version.
          example: 0.123.0
        enabled:
          type: boolean
          description: >-
            Indicates if the extension is disabled or enabled in the web
            browser.
        active:
          type: boolean
          description: >
            Flag indicating if there is communication between the extension and
            ThousandEyes portal.
        error:
          type: string
          description: Contains any errors encountered while getting extension status.
          example: ''
    Endpoint_Agents_API_EndpointClient:
      description: Information about the user who has the agent installed.
      type: object
      properties:
        userProfile:
          $ref: '#/components/schemas/Endpoint_Agents_API_EndpointUserProfile'
        browserExtensions:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_EndpointBrowserExtension'
    Endpoint_Agents_API_EndpointUserProfile:
      required:
        - userName
      type: object
      properties:
        userName:
          type: string
          example: joeblogs32
        userPrincipalName:
          type: string
          example: joeblogs32@c.com
    Endpoint_Agents_API_EndpointVpnProfile:
      required:
        - vpnClientAddresses
        - vpnClientNetworkRange
      type: object
      properties:
        interfaceName:
          type: string
          description: Interface name associated with `interfaceProfile`.
        vpnType:
          $ref: '#/components/schemas/Endpoint_Agents_API_VpnType'
        vpnGatewayAddress:
          type: string
          description: IP address of the VPN gateway.
        vpnClientAddresses:
          type: array
          description: >-
            List of private IP addresses assigned to the device, by the VPN
            server.
          example:
            - 10.100.0.10
          items:
            type: string
            format: ip
        vpnClientNetworkRange:
          type: array
          description: List of private networks assigned to the device, by the VPN server.
          example:
            - 10.100.0.0/22
          items:
            type: string
    Endpoint_Agents_API_EndpointAgentEthernetProfile:
      type: object
      description: |
        Information about the ethernet connectivity of this device.
        Only present if the hardware type is `ethernet`.
      properties:
        linkSpeed:
          type: integer
          description: Link speed in Mbps.
          format: int32
    Endpoint_Agents_API_ExternalMetadata:
      type: array
      items:
        $ref: '#/components/schemas/Endpoint_Agents_API_ExternalMetadataItem'
      description: >
        List of external metadata assigned to the endpoint agent. 

        Visible only if the `expandAgent=externalMetadata` query parameter is
        included.
    Endpoint_Agents_API_ExternalMetadataItem:
      properties:
        key:
          type: string
          example: anyConnectDeviceId
          description: >-
            ID of the device that has the Cisco Secure Client deployed with the
            Internet Security module.
        value:
          type: string
          example: DF434343D
          description: Value of the external metadata property.
      example:
        key: anyConnectDeviceId
        value: DF434343D
    Endpoint_Agents_API_InterfaceProfile:
      type: object
      properties:
        interfaceName:
          type: string
          example: en0
        addressProfiles:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_AddressProfile'
        hardwareType:
          $ref: '#/components/schemas/Endpoint_Agents_API_InterfaceHardwareType'
        ethernetProfile:
          $ref: >-
            #/components/schemas/Endpoint_Agents_API_EndpointAgentEthernetProfile
        wirelessProfile:
          $ref: '#/components/schemas/Endpoint_Agents_API_WirelessProfile'
    Endpoint_Agents_API_EndpointAgent:
      description: The `EndpointAgent` object, which may include multiple clients.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgentId'
        aid:
          allOf:
            - $ref: '#/components/schemas/Endpoint_Agents_API_AccountId'
            - readOnly: true
        name:
          description: The name of the agent.
          type: string
          readOnly: false
          example: Office Printer
        computerName:
          type: string
          example: DESKJET-123
          readOnly: true
        osVersion:
          type: string
          example: Version 10.15.2 (Build 19C57)
          readOnly: true
        platform:
          $ref: '#/components/schemas/Endpoint_Agents_API_Platform'
        kernelVersion:
          type: string
          example: Darwin 19.2.0
          readOnly: true
        manufacturer:
          type: string
          example: Apple, Inc.
          readOnly: true
        model:
          type: string
          example: MacBookAir7,2
          readOnly: true
        serialNumber:
          type: string
          example: xaab2ba4-d40f-4e80-9363-7e4826556055
          readOnly: true
        lastSeen:
          description: The last time the agent checked-in.
          type: string
          format: date-time
          example: '2022-05-26T23:37:16Z'
          readOnly: true
        status:
          $ref: '#/components/schemas/Endpoint_Agents_API_Status'
        deleted:
          type: boolean
          readOnly: true
        version:
          description: Version of the agent software running.
          type: string
          example: 0.123.4
          readOnly: true
        targetVersion:
          description: >-
            The latest available version of the agent. This field is populated
            only if expand includes `targetVersion`.
          type: string
          example: 0.123.4
          readOnly: true
        createdAt:
          type: string
          format: date-time
          example: '2022-05-26T23:37:16Z'
          readOnly: true
        numberOfClients:
          type: integer
          format: int64
          example: 3
          readOnly: true
        publicIP:
          type: string
          format: ip
          example: 88.45.2.123
          readOnly: true
        location:
          $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAgentLocation'
        clients:
          type: array
          readOnly: true
          description: |
            List of clients (user accounts) that the agent works with.
            Not populated by default.
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_EndpointClient'
        totalMemory:
          type: string
          example: 16384 MB
          readOnly: true
        agentType:
          type: string
          example: endpoint
          readOnly: true
        vpnProfiles:
          type: array
          readOnly: true
          description: |
            List of VPN connections on the agent.
            Not populated by default.
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_EndpointVpnProfile'
        externalMetadata:
          $ref: '#/components/schemas/Endpoint_Agents_API_ExternalMetadata'
        networkInterfaceProfiles:
          description: |
            List of network interfaces on the agent.
            Not populated by default.
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Endpoint_Agents_API_InterfaceProfile'
        asnDetails:
          $ref: '#/components/schemas/Endpoint_Agents_API_EndpointAsnDetails'
        licenseType:
          $ref: '#/components/schemas/Endpoint_Agents_API_AgentLicenseType'
        tcpDriverAvailable:
          type: boolean
          readOnly: true
          description: Status of TCP test support on the agent.
        npcapVersion:
          type: string
          readOnly: true
          description: >-
            For Windows agents, the version of the NPCAP driver that the agent
            has loaded.
        batteryMetrics:
          $ref: '#/components/schemas/Endpoint_Agents_API_BatteryMetrics'
        cellularProfile:
          $ref: '#/components/schemas/Endpoint_Agents_API_CellularProfile'
        _links:
          $ref: '#/components/schemas/Endpoint_Agents_API_SelfLinks'
    Endpoint_Agents_API_Status:
      description: >-
        Status of the endpoint agent in ThousandEyes. Disabled agents don't
        report data.
      type: string
      example: enabled
      enum:
        - enabled
        - disabled
      readOnly: true
    Endpoint_Agents_API_EndpointAgentUpdate:
      description: The `EndpointAgentUpdate` object contains supported fields for updates.
      type: object
      properties:
        name:
          description: New agent name.
          type: string
          example: Office Printer
        licenseType:
          $ref: '#/components/schemas/Endpoint_Agents_API_AgentLicenseType'
    Endpoint_Agents_API_WirelessProfile:
      type: object
      properties:
        bssid:
          type: string
          format: macaddress
          example: 00:11:22:aa:bb:cc
        ssid:
          type: string
          example: GuestWiFi
        rssi:
          type: integer
          format: int32
          example: -36
        channel:
          type: integer
          format: int32
          example: 48
        phyMode:
          type: string
          example: 802.11ac
    Endpoint_Agents_API_BrowserType:
      type: string
      example: edge
      enum:
        - chrome
        - chrome-canary
        - chromium
        - ie
        - edge
        - unknown
    Endpoint_Agents_API_AgentLicenseType:
      type: string
      example: essentials
      enum:
        - essentials
        - advantage
        - embedded
    Endpoint_Agents_API_ConnectionString:
      type: object
      properties:
        connectionString:
          type: string
          description: >
            The connection string is used for some integrations and other client
            types.
          example: D2xZSLlqo64Xe2EnYisklA==
        _links:
          $ref: '#/components/schemas/Endpoint_Agents_API_SelfLinks'
    Endpoint_Agents_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Endpoint_Agents_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Endpoint_Agents_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Endpoint_Agents_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Endpoint_Agents_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Endpoint_Agents_API_ValidationErrorItem'
    Endpoint_Agents_API_EndpointAgentId:
      type: string
      format: uuid
      description: Unique ID of endpoint agent, from `/endpoint/agents` endpoint.
      example: 861b7557-cd57-4bbb-b648-00bddf88ef49
      readOnly: true
    Endpoint_Agents_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Endpoint_Agents_API_PaginationNextLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Endpoint_Agents_API_Link'
    Endpoint_Agents_API_PaginationNextAndSelfLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Endpoint_Agents_API_Link'
        self:
          $ref: '#/components/schemas/Endpoint_Agents_API_Link'
    Endpoint_Agents_API_Platform:
      description: OS platform types. Platform "linux" was recently renamed to "roomos".
      type: string
      enum:
        - windows
        - roomos
        - phoneos
        - elux
        - cisco-wireless
        - linux
        - mac
        - android
        - unknown
      example: mac
    Endpoint_Agents_API_SortOrder:
      type: string
      example: desc
      description: >-
        Parameter indicates the ascending/descending  order of the sorting,
        using either the asc or desc values.
      enum:
        - asc
        - desc
    Endpoint_Agents_API_ConditionalOperator:
      type: string
      enum:
        - and
        - or
      example: and
    Endpoint_Agents_API_ThresholdFilterOperator:
      type: string
      enum:
        - gte
        - lte
      example: gte
    Endpoint_Agents_API_VpnType:
      type: string
      description: Name of the VPN provider.
      enum:
        - cisco-anyconnect
        - palo-alto-globalprotect
        - ivanti-connect-secure
        - zscaler-internet-access
        - f5-big-ip
      example: cisco-anyconnect
    Endpoint_Agents_API_InterfaceHardwareType:
      type: string
      example: wireless
      enum:
        - unknown
        - wireless
        - ethernet
        - modem
        - virtual
        - loopback
        - other
    Endpoint_Agents_API_BatteryLevel:
      description: Battery level indicator.
      type: string
      example: medium
      enum:
        - high
        - medium
        - low
    Endpoint_Agents_API_BatteryMetrics:
      description: Battery metrics for the endpoint agent.
      type: object
      readOnly: true
      properties:
        batteryLevel:
          $ref: '#/components/schemas/Endpoint_Agents_API_BatteryLevel'
        batteryLevelNormalizedPercent:
          type: number
          format: double
          description: Battery level as a normalized percentage (0-1).
          example: 0.3
          minimum: 0
          maximum: 1
      required:
        - batteryLevel
        - batteryLevelNormalizedPercent
    Endpoint_Agents_API_CellularNetworkGen:
      description: Cellular network generation.
      type: string
      example: 2g, 3g, 4g, 5g
    Endpoint_Agents_API_CellularProfile:
      description: Cellular network profile information for a mobile endpoint agent.
      type: object
      readOnly: true
      properties:
        carrierName:
          type: string
          description: Carrier name
          example: T-Mobile
        networkGen:
          $ref: '#/components/schemas/Endpoint_Agents_API_CellularNetworkGen'
        networkSubtype:
          type: string
          description: >-
            A real network subtype. It may be different from an advertised
            network type.
          example: LTE/HSPA
        advertisedNetworkGen:
          $ref: '#/components/schemas/Endpoint_Agents_API_CellularNetworkGen'
        advertisedNetworkSubtype:
          type: string
          description: Advertised Network subtype
          example: LTE/HSPA
        rssi:
          type: number
          format: double
          description: >-
            Received Signal Strength Indicator in dBm. Values are always
            negative.
          example: -10
        rsrp:
          type: number
          format: double
          description: Reference Signal Received Power in dBm. Values are always negative.
          example: -30
        rscp:
          type: number
          format: double
          description: >-
            Received Signal Code Power in dBm. Values are always negative or
            zero.
          example: -30
        rsrq:
          type: number
          format: double
          description: >-
            Reference Signal Received Quality in dBm. Values are always
            negative.
          example: -30
        sinr:
          type: number
          format: double
          description: >-
            Signal to Interference and Noise Ratio in dBm. It can be negative or
            positive.
          example: 20
    Endpoint_Agents_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Endpoint_Agents_API_Link'
    Emulation_API_UserAgents:
      type: object
      properties:
        userAgents:
          type: array
