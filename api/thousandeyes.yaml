        The unique identifier for a specific version of the test settings. If
        provided, returns the test configuration as it existed at that version.
        To retrieve available version IDs, use the `/tests/{testId}/history`
        endpoint. If not specified, the current version of the test settings is
        returned.
      required: false
      schema:
        type: string
        example: '1234'
    Test_Results_API_PrefixIdPath:
      name: prefixId
