  /cloud-insights/integration/aws/inventory/policies:
    get:
      tags:
        - Cloud Insights Integrations
      summary: Get AWS inventory monitoring IAM policies
      operationId: getAWSInventoryMonitoringIntegrationPolicies
      description: >-
        Retrieves the AWS IAM policies required to configure an AWS inventory
        monitoring integration in JSON string format for the authenticated
        account group.
      parameters:
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_AccountGroupId
      responses:
        '200':
          description: >
            The response includes a JSON object containing two key policy
            documents: 1) Trusted Policy — defines the trust relationship that
            allows ThousandEyes to assume a specified AWS IAM role through
            sts:AssumeRole. This policy includes the Principal ARN for
            ThousandEyes and the required ExternalId condition; 2) Permissions
            Policy — lists the AWS service-level read permissions needed by
            ThousandEyes Cloud Insights to inventory network resources. These
            permissions cover services such as EC2, VPC, Transit Gateway, Direct
            Connect, CloudFront, ELB, CloudTrail, ECS/EKS, and S3. Use these
            policies when creating or updating the IAM role that ThousandEyes
            will use for inventory monitoring. The response is returned as a
            JSON string in the policies object.
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/Cloud_Insights_Integrations_API_AwsMonitoringPoliciesJsonString
        '401':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_401'
        '403':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_403'
        '404':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_404'
        '500':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_500'
      security:
        - Cloud_Insights_Integrations_API_BearerAuth: []
  /cloud-insights/integration/aws/flow-logs/policies:
    get:
      tags:
        - Cloud Insights Integrations
      summary: Get AWS flow logs monitoring IAM policies
      operationId: getAWSFlowlogsMonitoringIntegrationPolicies
      description: >-
        Retrieves the AWS IAM policies required to configure an AWS flow logs
        monitoring integration in JSON string format for the authenticated
        account group.
      parameters:
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_AccountGroupId
      responses:
        '200':
          description: >
            The response contains a JSON object with the following policy
            documents under the policies key: 1) Trusted Policy — defines the
            trust relationship that allows ThousandEyes to assume a specified
            AWS IAM role via sts:AssumeRole. This includes the Principal ARN for
            ThousandEyes and the required ExternalId condition for secure
            cross-account access; 2) Permissions Policy — grants ThousandEyes
            read-only access to the Amazon S3 buckets where flow logs are
            stored. The policy includes permissions such as s3:GetObject and
            s3:ListBucket, scoped to the relevant flow log S3 bucket ARNs; 3)
            SNS Topic Access Policy — allows ThousandEyes to subscribe to Amazon
            SNS topics that receive flow log delivery notifications. It also
            enables the S3 service to publish events to those topics, ensuring
            ThousandEyes can be notified of new log data. This policy includes
            permissions for both SNS:Subscribe (for ThousandEyes) and
            SNS:Publish (for S3 event notifications). Use these policies when
            configuring the IAM role and SNS topic permissions required by
            ThousandEyes Cloud Insights to collect and monitor AWS flow logs
            data across your account. The response is returned as a JSON string
            in the policies object.
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/Cloud_Insights_Integrations_API_AwsMonitoringPoliciesJsonString
        '401':
          $ref: '#/components/responses/Cloud_Insights_Integrations_API_401'
        '403':
