      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter lets you decide if you want to see more details about
        test results. By default, no extra information is shown unless you use
        the query parameter. For instance, if you want more info about the
        "header," add ?expand=header to the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Test_Results_API_Expand'
        example:
          - certificate
    Test_Results_API_Direction:
      name: direction
      in: query
      style: form
      description: >-
        Choose the direction for the metrics you want: [`from-target`,
        `to-target`, `bidirectional`]. This applies when you're doing
        bidirectional Agent-to-Agent tests. For bidirectional data, you'll get
        combined results; otherwise, you'll get data for one direction. If you
        try to get unidirectional test data with an incorrect direction
        parameter, it will trigger an error response.
      schema:
        $ref: '#/components/schemas/Test_Results_API_TestDirection'
    Test_Results_API_PathVisDirection:
      name: direction
      in: query
      style: form
      description: >-
        Choose the direction for the metrics you want: [`from-target`,
        `to-target`]. This applies when you're doing bidirectional
        Agent-to-Agent tests. Omitting the parameter will default the results to
        both `from-target` and `to-target` values (bidirectional); otherwise,
        you'll get data for one direction. If you try to get unidirectional test
        data with an incorrect direction parameter, it will trigger an error
        response.
      schema:
        $ref: '#/components/schemas/Test_Results_API_PathVisDirection'
