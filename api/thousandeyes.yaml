              example: "SIP/2.0 401 Unauthorized\r\nVia: SIP/2.0/TCP 38.140.61.68:55431;rport=55431;received=38.140.61.68;branch=z9hG4bKRTzPzMoVh0\r\nCall-ID: oO9WaL3av8@38.140.61.68\r\nFrom: <sip:6054@voice.sfo2.notarealco.com>;tag=cGaJDNKQFE\r\nTo: <sip:6054@voice.sfo2.notarealco.com>;tag=z9hG4bKRTzPzMoVh0\r\nCSeq: 3 OPTIONS\r\nWWW-Authenticate: Digest  realm=\"asterisk\",nonce=\"1598728080/4e3bef2c789bdfa45ce9123221e08c8f\",opaque=\"748ffa241d840721\",algorithm=md5,qop=\"auth\"\r\nServer: Asterisk PBX 16.4.0\r\nContent-Length:  0\r\n\r\n\nSIP/2.0 200 OK\r\nVia: SIP/2.0/TCP 38.140.61.68:55431;rport=55431;received=38.140.61.68;branch=z9hG4bKRTzPzMoVh0\r\nCall-ID: oO9WaL3av8@38.140.61.68\r\nFrom: <sip:6054@voice.sfo2.notarealco.com>;tag=cGaJDNKQFE\r\nTo: <sip:6054@voice.sfo2.notarealco.com>;tag=z9hG4bKRTzPzMoVh0\r\nCSeq: 4 OPTIONS\r\nAccept: application/xpidf+xml, application/cpim-pidf+xml, application/simple-message-summary, application/pidf+xml, application/dialog-info+xml, application/simple-message-summary, application/pidf+xml, application/dialog-info+xml, application/sdp, message/sipfrag;version=2.0\r\nAllow: OPTIONS, REGISTER, SUBSCRIBE, NOTIFY, PUBLISH, INVITE, ACK, BYE, CANCEL, UPDATE, PRACK, MESSAGE, REFER\r\nSupported: 100rel, timer, replaces, norefersub\r\nAccept-Encoding: text/plain\r\nAccept-Language: en\r\nServer: Asterisk PBX 16.4.0\r\nContent-Length:  0\r\n\r\n"
              readOnly: true
            registerTime:
              type: integer
              description: Time to complete REGISTER in milliseconds
              example: 21
              readOnly: true
            responseCode:
              type: integer
              description: SIP server response code
              example: 200
              readOnly: true
            responseTime:
              type: integer
              description: Time to first byte
              example: 12
              readOnly: true
            totalTime:
              type: integer
              description: Total time
              example: 40
              readOnly: true
            waitTime:
              type: integer
              description: >-
                Time elapsed between completion of request and first byte of
                response
              example: 5
              readOnly: true
            errorType:
              $ref: '#/components/schemas/Test_Results_API_SipServerErrorType'
            problemDetail:
              type: string
              description: Error details, if an error was encountered
              readOnly: true
    Test_Results_API_SipServerErrorType:
      type: string
      enum:
        - none
        - dns
        - connect
        - register
        - invite
        - option
        - server
        - ssl
      description: Error type, none if there is no error
      example: none
      readOnly: true
    Test_Results_API_RtpStreamTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_RtpStreamTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        startDate:
          $ref: '#/components/schemas/Test_Results_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Test_Results_API_EndDate'
        _links:
          $ref: '#/components/schemas/Test_Results_API_PaginationLinks'
    Test_Results_API_RtpStreamTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_TestResult'
        - $ref: '#/components/schemas/Test_Results_API_EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/Test_Results_API_TestResultAgent'
            serverIp:
              type: string
              description: Target agent IP address
              example: 172.97.102.37
              readOnly: true
            dscp:
              type: string
              description: DSCP value received by the server from the agent
              example: '46'
              readOnly: true
            dscpName:
              type: string
              description: Name of DSCP value received by the server from the agent
              example: EF (DSCP 46)
              readOnly: true
            mos:
              type: number
              format: float
              description: Mean opinion score for agent’s stream
              example: 4.351024
              readOnly: true
            codecName:
              type: string
              description: Name of codec used by agen
              example: G.711 @ 64 Kbps
              readOnly: true
            codecMaxMos:
              type: number
              format: float
              description: Maximum value of Mean Opinion Score based on codec selection
              example: 4.41
              readOnly: true
            loss:
              type: number
              format: float
              description: >-
                Percentage value of packets sent from agent not received by
                server
              example: 0
              readOnly: true
            discards:
              type: number
              format: float
              description: Percentage of packets discarded
              example: 0
              readOnly: true
            latency:
              type: integer
              description: Time to send packets from source to server in milliseconds
              example: 103
              readOnly: true
            pdv:
              type: integer
              description: Variation in packet delay in milliseconds
              example: 1
              readOnly: true
            errorDetail:
              type: string
              description: Error details, if an error was encountered
              example: Connection error
              readOnly: true
    Test_Results_API_TestResultAgent:
      type: object
      properties:
        agentId:
          type: string
          description: Unique agent ID
          example: '281474976710706'
          readOnly: true
        agentName:
          type: string
          description: Agent name
          example: thousandeyes-stg-va-254
          readOnly: true
        countryId:
          type: string
          description: 2-digit ISO country code
          example: US
          readOnly: true
        location:
          type: string
          description: Location of the agent.
          example: San Francisco Bay Area
          readOnly: true
    Test_Results_API_TestResultErrorDetails:
      type: string
      description: Error details, if an error were encountered
      example: Connection error
      readOnly: true
    Test_Results_API_StartTime:
      type: integer
      description: Epoch time (seconds) indicating the start time of the round
      example: 1384309800
      readOnly: true
    Test_Results_API_EndTime:
      type: integer
      description: Epoch time (seconds) indicating the end time of the round
      example: 1384309800
      readOnly: true
    Test_Results_API_EpochTimeWindow:
      type: object
      properties:
        startTime:
          $ref: '#/components/schemas/Test_Results_API_StartTime'
        endTime:
          $ref: '#/components/schemas/Test_Results_API_EndTime'
    Test_Results_API_BgpTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Test_Results_API_BgpTestResult'
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        startDate:
          $ref: '#/components/schemas/Test_Results_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Test_Results_API_EndDate'
        _links:
          $ref: '#/components/schemas/Test_Results_API_PaginationLinks'
    Test_Results_API_BgpTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_BgpBasicTestResult'
        - $ref: '#/components/schemas/Test_Results_API_EpochTimeWindow'
        - type: object
          properties:
            updates:
              type: number
              format: double
              description: Number of updates tracked against this prefix by this monitor.
              example: 0
            pathChanges:
              type: number
              format: double
              description: >-
                Number of path changes tracked against this prefix by this
                monitor.
              example: 0
            reachability:
              type: number
              format: double
              description: Percentage reachability
              example: 0
    Test_Results_API_BgpBasicTestResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_TestResult'
        - type: object
          properties:
            monitor:
              $ref: '#/components/schemas/Test_Results_API_TestResultMonitor'
            prefixId:
              type: string
              description: Internally tracked prefix ID.
              example: '215'
            prefix:
              type: string
              description: Prefix being tracked.
              example: 99.128.0.0/11
    Test_Results_API_TestResultMonitor:
      type: object
      properties:
        monitorId:
          type: string
          description: Unique monitor ID.
          example: '281474976710706'
          readOnly: true
        monitorName:
          type: string
          description: The name of the Monitor.
          example: Vancouver, Canada - Bell Canada (AS 6539)
          readOnly: true
        countryId:
          type: string
          description: 2-digit ISO country code.
          example: US
          readOnly: true
    Test_Results_API_BgpTestRouteInformationResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: >-
              #/components/schemas/Test_Results_API_BgpTestRouteInformationResult
        test:
          $ref: '#/components/schemas/Test_Results_API_SimpleTest'
        _links:
          $ref: '#/components/schemas/Test_Results_API_SelfLinks'
    Test_Results_API_BgpTestRouteInformationResult:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_BgpBasicTestResult'
        - type: object
          properties:
            isActive:
              type: boolean
              description: >-
                Represents whether the route is active or inactive. An inactive
                route was an active route in the previous test round and is now
                superseded by another active (preferred) route. When requesting
                data for the test round in which a route change happened, both
                routes (active and inactive one) are included in the response.
              example: true
            hops:
              type: array
              items:
                $ref: '#/components/schemas/Test_Results_API_BgpHop'
    Test_Results_API_BgpHop:
      type: object
      properties:
        asn:
          type: integer
          description: ASN of transit autonomous system
          readOnly: true
          example: 852
        asName:
          type: string
          description: Name of autonomous system.
          readOnly: true
          example: Telus Advanced Communications
    Test_Results_API_TestResult:
      type: object
      properties:
        date:
          type: string
          description: Data point date UTC (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        roundId:
          type: integer
          description: Epoch time (seconds) indicating the start time of the round
          example: 1384309800
          readOnly: true
        _links:
          $ref: '#/components/schemas/Test_Results_API_TestResultAppLinks'
    Test_Results_API_TestResultAppLinks:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_AppLinks'
        - example:
            appLink:
              href: >-
                https://app.thousandeyes.com/view/tests?__a=105&testId=195&roundId=1692916680&agentId=125
    Test_Results_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Test_Results_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Test_Results_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Test_Results_API_ValidationErrorItem'
    Test_Results_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Test_Results_API_TestDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: Direction of the test, which affects how results are shown.
      default: to-target
      example: to-target
    Test_Results_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Test_Results_API_Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    Test_Results_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Test_Results_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Test_Results_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Test_Results_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Test_Results_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Test_Results_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Test_Results_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Test_Results_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Test_Results_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Test_Results_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Test_Results_API_TestResults'
      readOnly: true
    Test_Results_API_SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Test_Results_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Test_Results_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Test_Results_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Test_Results_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Test_Results_API_TestType'
        _links:
          $ref: '#/components/schemas/Test_Results_API_TestLinks'
    Test_Results_API_StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Test_Results_API_EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Test_Results_API_PaginationLinks:
      type: object
      description: A links object containing pagination related link(s).
      properties:
        previous:
          $ref: '#/components/schemas/Test_Results_API_Link'
        next:
          $ref: '#/components/schemas/Test_Results_API_Link'
        self:
          $ref: '#/components/schemas/Test_Results_API_Link'
    Test_Results_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Test_Results_API_Link'
    Test_Results_API_AppLinks:
      type: object
      description: A links object containing the ThousandEyes App link
      readOnly: true
      properties:
        appLink:
          $ref: '#/components/schemas/Test_Results_API_Link'
    Instant_Tests_API_TestAgent:
      type: object
      properties:
        agentId:
          type: string
          description: Identifier for the agent (get `agentId` from `/agents` endpoint).
        sourceIpAddress:
          type: string
          description: >-
            IP address from the agent's `ipAddresses` field (get `ipAddresses`
            from `/agents` endpoint). Used for interface selection.
      example:
        agentId: '125'
        sourceIpAddress: 1.1.1.1
    Instant_Tests_API_InstantTestRequest:
      type: object
      properties:
        labels:
          type: array
          description: >-
            A list of test label identifiers (get `labelId` from `/labels`
            endpoint).
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - '9842'
            - '1283'
        tags:
          type: array
          description: A list of test tag identifiers (get `id` from `/tags` endpoint).
          writeOnly: true
          readOnly: false
          items:
            type: string
            example: c6b78e57-81a2-4c5f-a11a-d96c3c664d55
        sharedWithAccounts:
          type: array
          description: >-
            A list of account group identifiers that the test is shared with
            (get `aid` from `/account-groups` endpoint).
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - '1234'
            - '12345'
        agents:
          type: array
          description: >-
            A list of objects with `agentId` (required) and `sourceIpAddress`
            (optional).
          items:
            $ref: '#/components/schemas/Instant_Tests_API_TestAgent'
      required:
        - agents
    Instant_Tests_API_AgentToAgentInstantTestRequest:
