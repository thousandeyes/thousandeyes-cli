      properties:
        value:
          type: integer
          format: int32
          description: Timespan value.
          example: 10
        unit:
          $ref: '#/components/schemas/Templates_API_LegacyDurationUnit'
    Templates_API_DashboardWidgetTemplate:
      type: object
      description: Configuration of a dashboard widget.
      properties:
        title:
          description: The title of the widget.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        type:
          description: The type of widget.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_WidgetType'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        visualMode:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_VisualMode'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        metricGroup:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_MetricGroup'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        direction:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_DashboardMetricDirection'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        metric:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_DashboardMetric'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        filters:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_WidgetFilters'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        measure:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_ApiWidgetMeasure'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        fixedTimespan:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_ApiDurationTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        shouldExcludeAlertSuppressionWindows:
          description: Excludes alert suppression window data if set to `true`.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_DashboardRefreshRateTemplate:
      type: string
      description: The refresh rate of the dashboard.
      default: 'OFF'
      example: 'OFF'
      enum:
        - 'OFF'
        - 2M
        - 5M
        - 10M
        - 15M
        - 30M
        - 60M
    Templates_API_DashboardConfigurationTemplate:
      type: object
      description: >-
        Configuration of a dashboard that will be created when template is
        deployed.
      properties:
        title:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: The title of the dashboard that will be displayed in UI.
        description:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: The description of the dashboard that will be displayed in UI.
        globalFilterId:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: >-
            The ID of a global dashboard filter to associate with this
            dashboard.
          example: 65babd9bb90bf55b17c96c8d
        widgets:
          description: The widgets that will be included in the dashboard.
          type: array
          items:
            $ref: '#/components/schemas/Templates_API_DashboardWidgetTemplate'
        refreshRate:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_DashboardRefreshRateTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
      example:
        title: My Dashboard
        description: A dashboard for displaying test information.
        widgets:
          - type: 'Bar Chart: Stacked'
            title: 'A Bar Chart: Stacked widget'
            filters:
              Test Labels: '[{{labels.templateLabel.groupId}}]'
            metricGroup: Web - HTTP Server
            measure:
              type: Median
            metric: Response Time
            axisGroupBy: Continents
            dataSource: Cloud & Enterprise Agents
      externalDocs:
        url: https://developer.thousandeyes.com/v7/dashboards/#/dashboard-detail
    Templates_API_FilterContextDataSourceTemplate:
      description: Type of data source for dashboard global filter.
      type: string
      example: VIRTUAL_AGENT
      enum:
        - ALERT
        - APPDYNAMICS_SERVICE_HEALTH
        - DEVICES
        - DNSP
        - ENDPOINT_AGENTS
        - INTERNET_INSIGHTS
        - ROUTING
        - THIRD_PARTY_APPLICATIONS
        - VIRTUAL_AGENT
    Templates_API_ApiDataSourceFilterTemplate:
      type: object
      description: List of different filter properties for a single datasource.
      properties:
        filterId:
          description: Data source property to filter by. Example `TEST_LABEL`.
          example: TEST_LABEL
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        values:
          description: Values to filter by based on the specified `filterId`.
          anyOf:
            - type: array
              uniqueItems: true
              example:
                - '45862'
                - '59749'
              items:
                type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        metricIds:
          description: Dashboard metric associated with the filter property.
          anyOf:
            - type: array
              uniqueItems: true
              example:
                - WEB_PAGE_LOAD_COMPLETION_RATE
                - WEB_TTFB
                - WEB_AVAILABILITY
              items:
                type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
      required:
        - filterId
        - values
        - metricIds
    Templates_API_DashboardFilterContextTemplate:
      type: object
      description: List of dashboard filter contexts.
      properties:
        dataSourceId:
          description: Type of data source for dashboard global filter.
          anyOf:
            - $ref: >-
                #/components/schemas/Templates_API_FilterContextDataSourceTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        filters:
          description: List of filter properties.
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/Templates_API_ApiDataSourceFilterTemplate'
      required:
        - dataSourceId
        - filters
    Templates_API_DashboardFilterListTemplate:
      type: array
      description: List of filters to be applied to a dashboard.
      uniqueItems: true
      items:
        $ref: '#/components/schemas/Templates_API_DashboardFilterContextTemplate'
    Templates_API_DashboardFilterConfigurationTemplate:
      type: object
      description: >-
        A dashboard filter object. See [V7 API
        Documentation](https://developer.cisco.com/docs/thousandeyes/v7/list-dashboard-filters/)
        for more details on dashboard filters.
      properties:
        name:
          description: The name of the dashboard filter.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        description:
          description: An optional description of the filter.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        context:
          description: The context of the dashboard filter.
          anyOf:
