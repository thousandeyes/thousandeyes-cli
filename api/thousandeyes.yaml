    Instant_Tests_API_AgentToServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_AgentToServerProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_AgentToServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_AgentToServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_DnsServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsServerRequestProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_DnsServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_DnsServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_DnsTraceInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsTraceProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_DnsTraceInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_DnsTraceInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_DnsSecInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_DnsSecProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_DnsSecInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_DnsSecInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_HttpServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_HttpServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_HttpServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_PageLoadInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_PageLoadProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_PageLoadInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_PageLoadInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_WebTransactionInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_WebTransactionProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Instant_Tests_API_TestCredentials'
    Instant_Tests_API_WebTransactionInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_WebTransactionInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_ApiInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_ApiProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/Instant_Tests_API_TestCredentials'
    Instant_Tests_API_ApiInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_ApiInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_FtpServerInstantTestRequest:
      required:
        - password
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_FtpServerProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_FtpServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_FtpServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_SipServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_SipServerProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
        - type: object
          required:
            - targetSipCredentials
          properties:
            targetSipCredentials:
              $ref: '#/components/schemas/Instant_Tests_API_TestSipCredentials'
    Instant_Tests_API_SipServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_SipServerInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_TestSipCredentials'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_VoiceInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_VoiceProperties'
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTestRequest'
    Instant_Tests_API_VoiceInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_VoiceInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/Instant_Tests_API_TestAgentsResponse'
    Instant_Tests_API_ExpandInstantTestOptions:
      type: string
      enum:
        - agent
        - label
        - tag
        - shared-with-account
      example: agent
    Instant_Tests_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Instant_Tests_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Instant_Tests_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Instant_Tests_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Instant_Tests_API_ValidationErrorItem'
    Instant_Tests_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Instant_Tests_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Instant_Tests_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Instant_Tests_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Instant_Tests_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Instant_Tests_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Instant_Tests_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Instant_Tests_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Instant_Tests_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Instant_Tests_API_TestResults'
      readOnly: true
    Instant_Tests_API_UnexpandedInstantTest:
      type: object
      properties:
        createdBy:
          $ref: '#/components/schemas/Instant_Tests_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Instant_Tests_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Instant_Tests_API_TestType'
        _links:
          $ref: '#/components/schemas/Instant_Tests_API_TestLinks'
    Instant_Tests_API_TestDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: Direction of the test, which affects how results are shown.
      default: to-target
      example: to-target
    Instant_Tests_API_TestDscp:
      type: string
      description: DSCP label.
      readOnly: true
      example: Best Effort (DSCP 0)
    Instant_Tests_API_TestDscpId:
      type: string
      enum:
        - '0'
        - '8'
        - '16'
        - '24'
        - '32'
        - '40'
        - '48'
        - '56'
        - '10'
        - '12'
        - '14'
        - '18'
        - '20'
        - '22'
        - '26'
        - '28'
        - '30'
        - '34'
        - '36'
        - '38'
        - '46'
        - '44'
      description: >-
        DSCP ID [to see list for acceptable
        values](https://docs.thousandeyes.com/product-documentation/tests/dscp-options-in-network-tests)
      default: '0'
      example: '0'
    Instant_Tests_API_TestNumPathTraces:
      type: integer
      minimum: 1
      maximum: 10
      description: Number of path traces executed by the agent.
      default: 3
      example: 3
    Instant_Tests_API_TestPathTraceMode:
      type: string
      enum:
        - classic
        - in-session
      description: Select `inSession` to perform the path trace within a TCP session.
      default: classic
      example: classic
    Instant_Tests_API_TestPort:
      type: integer
      minimum: 1
      maximum: 65535
      description: Target port.
      default: 49153
      example: 49153
    Instant_Tests_API_AgentToAgentTestProtocol:
      type: string
      enum:
        - tcp
        - udp
      default: tcp
      example: tcp
    Instant_Tests_API_TestRandomizedStartTime:
      type: boolean
      description: >-
        Indicates whether agents should randomize the start time in each test
        round.
      default: false
      example: false
    Instant_Tests_API_TestFixedPacketRate:
      type: integer
      minimum: 0
      maximum: 100
      description: Sets packets rate sent to measure the network in packets per second.
      example: 50
    Instant_Tests_API_AgentToAgentProperties:
      type: object
      required:
        - targetAgentId
      properties:
        direction:
          $ref: '#/components/schemas/Instant_Tests_API_TestDirection'
        dscp:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscp'
        dscpId:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscpId'
        mss:
          type: integer
          minimum: 20
          maximum: 1400
          description: Maximum segment size, in bytes.
          example: 100
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        port:
          $ref: '#/components/schemas/Instant_Tests_API_TestPort'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_AgentToAgentTestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        targetAgentId:
          type: string
          description: '`agentId` of the target agent for the test.'
          example: '2954'
        throughputMeasurements:
          type: boolean
          description: >-
            Enable or disable throughput measurements. Throughput measurements
            cannot be enabled when the source or target of the test is a cloud
            agent.
          default: false
          example: false
        throughputDuration:
          type: integer
          minimum: 5000
          maximum: 30000
          description: The throughput duration.
          default: 10000
          example: 10000
        throughputRate:
          type: integer
          minimum: 8
          maximum: 1000
          description: The throughput rate, only applicable for UDP protocol.
          example: 10
        fixedPacketRate:
          $ref: '#/components/schemas/Instant_Tests_API_TestFixedPacketRate'
        type:
          type: string
          example: agent-to-agent
          readOnly: true
    Instant_Tests_API_TestLabel:
      type: object
      properties:
        labelId:
          type: string
          description: Label ID.
        name:
          type: string
          description: Name of the label.
        isBuiltin:
          type: boolean
          description: >-
            Value indicating if the label in question is BuiltIn (Account Admin,
            Organization Admin, Regular User).
      example:
        labelId: '961'
        name: Artem label
        isBuiltin: false
    Instant_Tests_API_TestLabels:
      type: array
      description: >-
        Labels to which the test is assigned. This field is not returned for
        Instant Tests.
      readOnly: true
      items:
        $ref: '#/components/schemas/Instant_Tests_API_TestLabel'
    Instant_Tests_API_SharedWithAccount:
      type: object
      properties:
        aid:
          type: string
          description: Account group ID.
          example: '1234'
        name:
          type: string
          description: Account group name.
          example: Account name
    Instant_Tests_API_TestSharedAccounts:
      type: array
      readOnly: true
      items:
        $ref: '#/components/schemas/Instant_Tests_API_SharedWithAccount'
    Instant_Tests_API_InstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_UnexpandedInstantTest'
        - type: object
          properties:
            labels:
              $ref: '#/components/schemas/Instant_Tests_API_TestLabels'
            sharedWithAccounts:
              $ref: '#/components/schemas/Instant_Tests_API_TestSharedAccounts'
    Instant_Tests_API_AgentToAgentInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_AgentToAgentProperties'
    Instant_Tests_API_CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    Instant_Tests_API_AgentBase:
      type: object
      properties:
        ipAddresses:
          type: array
          description: Array of private IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 99.139.65.220
            - 9bbd:8a0a:a257:5876:288b:6cb2:3f36:64ce
        publicIpAddresses:
          type: array
          description: Array of public IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 192.168.1.78
            - f9b2:3a21:f25c:d300:03f4:586d:f8d6:4e1c
        network:
          type: string
          description: Network (including ASN) of agent’s public IP.
          example: AT&T Services, Inc. (AS 7018)
          readOnly: true
    Instant_Tests_API_Coordinates:
      type: object
      description: Geographic coordinates for agent location.
      properties:
        latitude:
          type: number
          format: double
          description: The latitude of the agent location in decimal degrees
          example: 37.77493
          readOnly: true
        longitude:
          type: number
          format: double
          description: The longitude of the agent location in decimal degrees
          example: -122.41942
          readOnly: true
    Instant_Tests_API_SimpleAgent:
      type: object
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_AgentBase'
        - type: object
          properties:
            agentId:
              type: string
              description: Unique ID of the agent.
              example: '281474976710706'
              readOnly: true
            agentName:
              type: string
              description: Name of the agent.
              example: thousandeyes-stg-va-254
            location:
              type: string
              description: Location of the agent.
              example: San Francisco Bay Area
              readOnly: true
            countryId:
              type: string
              description: 2-digit ISO country code
              example: US
              readOnly: true
            coordinates:
              $ref: '#/components/schemas/Instant_Tests_API_Coordinates'
            enabled:
              type: boolean
              description: Flag indicating if the agent is enabled.
              example: true
            verifySslCertificates:
              type: boolean
              description: >-
                Flag indicating if has normal SSL operations or  if instead it's
                set to ignore SSL errors on browserbot-based tests.
              example: true
              readOnly: true
            prefix:
              type: string
              description: Prefix containing agents public IP address.
              example: 99.128.0.0/11
              readOnly: true
    Instant_Tests_API_AgentResponse:
      allOf:
        - required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Instant_Tests_API_CloudEnterpriseAgentType'
        - $ref: '#/components/schemas/Instant_Tests_API_SimpleAgent'
    Instant_Tests_API_TestAgentsResponse:
      type: array
      description: Contains list of agents.
      items:
        $ref: '#/components/schemas/Instant_Tests_API_AgentResponse'
    Instant_Tests_API_TestBandwidthMeasurements:
      type: boolean
      description: >-
        Set to `true` to enable bandwidth measurements, only applies to
        Enterprise agents assigned to the test.
      example: true
    Instant_Tests_API_TestMtuMeasurements:
      type: boolean
      description: Set `true` to measure MTU sizes on network from agents to the target.
      example: false
    Instant_Tests_API_TestProbeMode:
      type: string
      enum:
        - auto
        - sack
        - syn
      description: >-
        Probe mode used by network test, only valid when the protocol is set to
        TCP.
      default: auto
      example: auto
    Instant_Tests_API_TestProtocol:
      type: string
      enum:
        - tcp
        - icmp
        - udp
      description: >-
        Protocol used by dependent network tests (end-to-end, path trace,
        PMTUD).
      default: tcp
      example: tcp
    Instant_Tests_API_TestIpv6Policy:
      type: string
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
        - use-agent-policy
      description: >-
        IP version policy. Overrides the IPv6 policy configured at the agent
        level.
      default: use-agent-policy
      example: use-agent-policy
    Instant_Tests_API_AgentToServerWritablePropertyFields:
      type: object
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestBandwidthMeasurements'
        continuousMode:
          type: boolean
          description: |
            To enable continuous monitoring, set this parameter to `true` to. 
            When continuous monitoring is enabled, the following actions occur:
            * `fixedPacketRate` is enforced
            * `bandwidthMeasurements` are disabled
            * If the `protocol` is set to `tcp`, `probeMode` is set to `syn`.
          example: false
        fixedPacketRate:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            If continuousMode is `false`, set the fixedPacketRate to a value
            between 10-100. If `continuousMode` is `true`, set the
            `fixedPacketRate` to `1`
          example: 25
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Instant_Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Instant_Tests_API_TestRandomizedStartTime'
        server:
          type: string
          description: >-
            The target name or IP address. If a port is set for the test, it is
            appended to the target name or IP address using a colon.
          example: www.thousandeyes.com:80
        dscp:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscp'
        dscpId:
          $ref: '#/components/schemas/Instant_Tests_API_TestDscpId'
        ipv6Policy:
          $ref: '#/components/schemas/Instant_Tests_API_TestIpv6Policy'
        pingPayloadSize:
          type: integer
          minimum: 0
          maximum: 1400
          description: >-
            Payload size (not total packet size) for the end-to-end metric's
            probes, ping payload size allows values from 0 to 1400 bytes. When
            set to null, payload sizes are 0 bytes for ICMP-based tests and 1
            byte for TCP-based tests.
        networkMeasurements:
          type: boolean
          description: >-
            View packet loss in 1-second intervals. This is only available for
            1-minute interval tests. Set to `true` to enable network
            measurements.
          default: false
          example: false
    Instant_Tests_API_AgentToServerTestType:
      type: string
      example: agent-to-server
      readOnly: true
    Instant_Tests_API_AgentToServerProperties:
      allOf:
        - $ref: >-
            #/components/schemas/Instant_Tests_API_AgentToServerWritablePropertyFields
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/Instant_Tests_API_AgentToServerTestType'
          required:
            - server
    Instant_Tests_API_AgentToServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Instant_Tests_API_InstantTest'
        - $ref: '#/components/schemas/Instant_Tests_API_AgentToServerProperties'
    Instant_Tests_API_TestDnsTransportProtocol:
      type: string
      enum:
        - udp
        - tcp
      description: Transport protocol used for DNS requests.
      default: udp
      example: udp
    Instant_Tests_API_TestDomain:
      type: string
      description: >-
        The target record for the test, with the record type suffixed. If no
        record type is specified, the test defaults to an ANY record.
      example: www.thousandeyes.com
    Instant_Tests_API_TestNetworkMeasurements:
      type: boolean
      description: >-
        Enable or disable network measurements. Set to true to enable or false
        to disable network measurements.
      default: true
      example: true
    Instant_Tests_API_DnsQueryClass:
      type: string
      enum:
        - in
        - ch
      description: >-
        Domain class used by this test. 'in' stands for Internet, while 'ch'
        stands for Chaos.
      example: in
    Instant_Tests_API_DnsServerRequestProperties:
      type: object
      required:
        - domain
        - dnsServers
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestBandwidthMeasurements'
        dnsServers:
          type: array
          description: A list of DNS server FQDN.
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - dns-example.net
            - 8.8.8.8
        dnsTransportProtocol:
          $ref: '#/components/schemas/Instant_Tests_API_TestDnsTransportProtocol'
        domain:
          $ref: '#/components/schemas/Instant_Tests_API_TestDomain'
        mtuMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Instant_Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Instant_Tests_API_TestNumPathTraces'
        pathTraceMode:
