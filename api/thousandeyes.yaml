        - name
        - status
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: cb1b8033-ea2d-4e9b-a920-fe87850693cf
        name:
          type: string
          example: My operation
        enabled:
          type: boolean
          example: true
        category:
          $ref: '#/components/schemas/Integrations_API_OperationCategory'
        status:
          $ref: '#/components/schemas/Integrations_API_OperationStatus'
        path:
          type: string
          example: /custom/path
        payload:
          type: string
          description: Handlebars template for the payload.
          example: '{"property1": {{numericVar}}, "property2": "{{stringVar}}"}'
        headers:
          type: array
          items:
            $ref: '#/components/schemas/Integrations_API_Header'
        queryParams:
          type: string
          description: >-
            Handlebars template for the query params. Most compile into a proper
            JSON object where each object property will define the query param
            name and the object property value define the corresponding query
            param value.
          example: '{"queryParam1":"{{stringVar}}"}'
        type:
          $ref: '#/components/schemas/Integrations_API_OperationType'
        _links:
          $ref: '#/components/schemas/Integrations_API_SelfLinks'
