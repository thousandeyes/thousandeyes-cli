      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tags_API_Tag'
        _links:
          $ref: '#/components/schemas/Tags_API_SelfLinks'
    Tags_API_TagBulkCreateError:
      type: object
