          description: IP address to use for DNS override.
          example: 8.8.8.8
        httpTargetTime:
          $ref: '#/components/schemas/Tests_API_TestHttpTargetTime'
        httpTimeLimit:
          $ref: '#/components/schemas/Tests_API_TestHttpTimeLimit'
        httpVersion:
          $ref: '#/components/schemas/Tests_API_TestHttpVersion'
        includeHeaders:
          $ref: '#/components/schemas/Tests_API_TestIncludeHeaders'
        mtuMeasurements:
          $ref: '#/components/schemas/Tests_API_TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/Tests_API_TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Tests_API_TestNumPathTraces'
        oAuth:
          $ref: '#/components/schemas/Tests_API_OAuth'
        password:
          $ref: '#/components/schemas/Tests_API_TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Tests_API_TestProtocol'
        sslVersion:
