      summary: Retrieve Cloud and Enterprise Agent
      operationId: getAgent
      description: >
        Returns details for an agent, including assigned tests.


        For Enterprise Agents, this operation returns additional details,
        including utilization data, assigned accounts, a list of account groups
        the agent is assigned to, and utilization details.
      parameters:
        - $ref: '#/components/parameters/Agents_API_AgentId'
        - $ref: '#/components/parameters/Agents_API_AccountGroupId'
        - $ref: '#/components/parameters/Agents_API_ExpandAgentDetails'
