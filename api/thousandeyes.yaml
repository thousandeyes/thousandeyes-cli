    Dashboards_API_WidgetFilters:
      type: object
      description: >-
        (Optional) Specifies the filters applied to the widget. When present,
        the `filters` property displays. Each filter object has two properties:
        `filterProperty` and `filterValue`. The `filterProperty` can be values
        like `AGENT`, `ENDPOINT_MACHINE_ID`, `TEST`, `MONITOR`, etc.  The
        `filterValue` represents an identifier array of the selected property.
      example:
        TEST:
          - 5187
          - 5227
        ENDPOINT_MACHINE_ID:
          - fbd0050c-07f7-43f7-9631-14b32f096962
      additionalProperties:
        uniqueItems: true
        type: array
        items: {}
    Dashboards_API_Widget:
      type: object
      properties:
        id:
          type: string
          description: Identifier of the widget.
          readOnly: true
          example: '1234'
        title:
          type: string
          description: Title of the widget
          example: Widget Title
        visualMode:
          $ref: '#/components/schemas/Dashboards_API_VisualMode'
        embedUrl:
          type: string
          description: When `isEmbedded` is set to `true`, an `embedUrl` is provided.
          readOnly: true
          example: >-
            https://embed.thousandeyes.com/e/00aa:3039802d-5c76-42d2-9a93-c6e5f9d3122f
        isEmbedded:
          type: boolean
          description: >-
            Set to `true` if widget is marked as embedded; otherwise, set to
            `false`.
        metricGroup:
          $ref: '#/components/schemas/Dashboards_API_MetricGroup'
        direction:
          $ref: '#/components/schemas/Dashboards_API_DashboardMetricDirection'
        metric:
          $ref: '#/components/schemas/Dashboards_API_DashboardMetric'
        filters:
          $ref: '#/components/schemas/Dashboards_API_WidgetFilters'
        measure:
          $ref: '#/components/schemas/Dashboards_API_ApiWidgetMeasure'
        fixedTimespan:
          $ref: '#/components/schemas/Dashboards_API_ApiDuration'
        apiLink:
          type: string
          readOnly: true
          deprecated: true
        shouldExcludeAlertSuppressionWindows:
          type: boolean
          description: Excludes alert suppression window data if set to `true`.
        _links:
          $ref: '#/components/schemas/Dashboards_API_SelfLinks'
