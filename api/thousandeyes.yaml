        Retrieves details for a specific AWS inventory or flow logs monitoring
        integration associated with the authenticated account group using the
        unique integration ID.
      parameters:
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_AccountGroupId
        - $ref: >-
            #/components/parameters/Cloud_Insights_Integrations_API_IntegrationId
      responses:
        '200':
          description: >
            The response contains a single integration object representing
            either: AWS inventory monitoring integration or AWS flow logs
            monitoring integration. Each integration includes metadata that
            defines its configuration: id — the unique identifier of the
            integration; name — the user-defined name of the integration;
            roleArn — the AWS IAM role ARN that ThousandEyes assumes to access
            your AWS resources; externalId — the external identifier used for
            secure cross-account role assumption; monitoringType — identifies
            whether the integration monitors AWS inventory
            (inventory-monitoring) or flow logs (flow-logs-monitoring);
            snsTopicsArns — a list of SNS topic ARNs associated with flow logs
            monitoring (only present for flow-logs-monitoring integrations);
            links — HAL-style link relations that include a self URL pointing to
            this integration resource. This endpoint is typically used to:
            retrieve detailed configuration information for a specific AWS
            integration, verify that the integration is correctly set up and
            associated with the expected AWS IAM role, and obtain integration
            details before performing deletion or troubleshooting operations.
          content:
            application/hal+json:
              schema:
                $ref: >-
                  #/components/schemas/Cloud_Insights_Integrations_API_AwsMonitoringIntegration
        '401':
