  /usage/units/enterprise-agents:
    get:
      tags:
        - Usage
      summary: Get enterprise agent usage
      operationId: getEnterpriseAgentsUnitsUsage
      description: >-
        This operation returns the organization's enterprise agents usage for a
        specific time period, or the curent billing cycle if no time period is
        specified.

        In the `/v7/usage` API, a shared enterprise agent's usage is reported in
        the account group where the agent was created (i.e Primary Account
        Group).  However in this API, the shared agent's usage is distributed
        among all the account groups where the tests are running on the
        particular agent. This API is also only available to customers on usage
        based pricing model.
      parameters:
        - $ref: '#/components/parameters/Usage_API_StartDateParameter'
        - $ref: '#/components/parameters/Usage_API_EndDateParameter'
        - $ref: '#/components/parameters/Usage_API_PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Usage_API_EnterpriseAgentsUsage'
        '400':
          $ref: '#/components/responses/Usage_API_400'
        '401':
          $ref: '#/components/responses/Usage_API_401'
        '403':
          $ref: '#/components/responses/Usage_API_403'
        '404':
          $ref: '#/components/responses/Usage_API_404'
        '429':
          $ref: '#/components/responses/Usage_API_429'
        '500':
          $ref: '#/components/responses/Usage_API_500'
      security:
        - Usage_API_BearerAuth: []
  /usage/units/tests:
    get:
      tags:
        - Usage
      summary: Get cloud and enterprise agents units usage
      operationId: getTestsUnitsUsage
      description: >-
        This operation returns the cloud and enterprise agents usage for all the
        tests for a specific time period, or the curent billing cycle if no time
        period is specified.

        In the `/v7/usage` API, an enterprise agent's usage is reported in the
        account group where the agent was created (i.e Primary Account Group). 
        However in this API, the agent's usage is distributed among all the
