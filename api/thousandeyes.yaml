        self:
          $ref: '#/components/schemas/Tests_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Tests_API_TestResults'
      readOnly: true
    Tests_API_SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Tests_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Tests_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Tests_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Tests_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Tests_API_TestType'
        _links:
          $ref: '#/components/schemas/Tests_API_TestLinks'
    Tests_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Tests_API_Link'
    Tests_API_TestAgentRequest:
      type: object
      required:
        - agentId
      properties:
        agentId:
          type: string
          description: The agent ID. Get `agentId` from `/agents` endpoint.
        sourceIpAddress:
          type: string
          description: >-
            The IP address from the `ipAddresses` field in agent details, used
            for interface selection. Get `ipAddresses` from the `/agents`
            endpoint.
      example:
        agentId: '125'
        sourceIpAddress: 1.1.1.1
    Tests_API_TestAgentsRequest:
      type: array
      description: Contains list of Agent IDs (get `agentId` from `/agents` endpoint).
      items:
        $ref: '#/components/schemas/Tests_API_TestAgentRequest'
    Tests_API_UnexpandedInstantTest:
      type: object
      properties:
        createdBy:
          $ref: '#/components/schemas/Tests_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Tests_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Tests_API_TestType'
        _links:
          $ref: '#/components/schemas/Tests_API_TestLinks'
    Tests_API_TestUsePublicBgp:
      type: boolean
      description: >-
        Indicate if all available public BGP monitors should be used, when
        ommited defaults to `bgpMeasurements` value.
      default: true
      example: true
    Tests_API_UnexpandedBgpTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - type: object
          required:
            - prefix
          properties:
            enabled:
              $ref: '#/components/schemas/Tests_API_Enabled'
            includeCoveredPrefixes:
              type: boolean
              description: >-
                Indicate if queries for subprefixes detected under this prefix
                should included.
              example: true
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
            alertsEnabled:
              type: boolean
              description: Indicates if alerts are enabled.
              example: true
            createdBy:
              $ref: '#/components/schemas/Tests_API_TestCreatedBy'
            createdDate:
              $ref: '#/components/schemas/Tests_API_TestCreatedDate'
            type:
              type: string
              example: bgp
              readOnly: true
            prefix:
              type: string
              description: >-
                a.b.c.d is a network address, with the prefix length defined as
                e. Prefixes can be any length from 8 to 24.
    Tests_API_TestBgpType:
      type: string
      example: bgp
      readOnly: true
    Tests_API_BaseBgpRequest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - type: object
          properties:
            enabled:
              $ref: '#/components/schemas/Tests_API_Enabled'
            includeCoveredPrefixes:
              type: boolean
              description: >-
                Indicate if queries for subprefixes detected under this prefix
                should included.
              example: true
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
            alertsEnabled:
              type: boolean
              description: Indicates if alerts are enabled.
              example: true
            createdBy:
              $ref: '#/components/schemas/Tests_API_TestCreatedBy'
            createdDate:
              $ref: '#/components/schemas/Tests_API_TestCreatedDate'
            type:
              $ref: '#/components/schemas/Tests_API_TestBgpType'
    Tests_API_TestLabel:
      type: object
      properties:
        labelId:
          type: string
          description: Label ID.
        name:
          type: string
          description: Name of the label.
        isBuiltin:
          type: boolean
          description: >-
            Value indicating if the label in question is BuiltIn (Account Admin,
            Organization Admin, Regular User).
      example:
        labelId: '961'
        name: Artem label
        isBuiltin: false
    Tests_API_TestLabels:
      type: array
      description: >-
        Labels to which the test is assigned. This field is not returned for
        Instant Tests.
      readOnly: true
      items:
        $ref: '#/components/schemas/Tests_API_TestLabel'
    Tests_API_SharedWithAccount:
      type: object
      properties:
        aid:
          type: string
          description: Account group ID.
          example: '1234'
        name:
          type: string
          description: Account group name.
          example: Account name
    Tests_API_TestSharedAccounts:
      type: array
      readOnly: true
      items:
        $ref: '#/components/schemas/Tests_API_SharedWithAccount'
    Tests_API_InstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - type: object
          properties:
            labels:
              $ref: '#/components/schemas/Tests_API_TestLabels'
            sharedWithAccounts:
              $ref: '#/components/schemas/Tests_API_TestSharedAccounts'
    Tests_API_MonitorType:
      type: string
      description: Type of monitor
      enum:
        - public
        - private
      example: public
    Tests_API_Monitor:
      type: object
      properties:
        countryId:
          type: string
          description: Country ID
          example: GB
          readOnly: true
        monitorId:
          type: string
          description: BGP monitor ID
          example: '1234'
          readOnly: true
        ipAddress:
          type: string
          description: IP address of the BGP monitor
          example: 4.69.184.193
        network:
          type: string
          description: Name of the autonomous system in which the monitor is found
          example: Level 3 Communications, Inc. (AS 3356)
        monitorType:
          $ref: '#/components/schemas/Tests_API_MonitorType'
        monitorName:
          type: string
          description: Display name of the BGP monitor
          example: Seattle, WA
    Tests_API_TestBgpMonitors:
      type: array
      description: Contains list of enabled BGP monitors.
      readOnly: true
      items:
        $ref: '#/components/schemas/Tests_API_Monitor'
    Tests_API_RuleId:
      type: string
      description: Unique ID of the rule.
      example: '127094'
      readOnly: true
    Tests_API_AlertDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: >-
        Direction for applicable alert types (eg. path trace, End-to-End (Agent)
        etc.)
      example: to-target
    Tests_API_AlertType:
      type: string
      description: >-
        Type of alert being triggered. In multi-layered tests, this value
        represents the layer the alert relates to. See [Alert
        Details](https://developer.cisco.com/docs/thousandeyes/retrieve-alert-details/)
        documentation for a list of possible values
      example: http-server
      enum:
        - page-load
        - http-server
        - end-to-end-server
        - end-to-end-agent
        - voice
        - dns-server
        - dns-trace
        - dnssec
        - bgp
        - path-trace
        - ftp
        - sip-server
        - transactions
        - web-transactions
        - agent
        - network-outage
        - application-outage
        - device-device
        - device-interface
        - endpoint-network-server
        - endpoint-http-server
        - endpoint-path-trace
        - endpoint-browser-sessions-agent
        - endpoint-browser-sessions-application
        - api
        - web-transaction
        - unknown
    Tests_API_AlertRoundsViolationMode:
      type: string
      description: >-
        `exact` requires the same agents to meet the threshold in consecutive
        rounds. `auto` is only enabled for CEA and Endpoint Scheduled test
        rules. The default is `any`.
      enum:
        - exact
        - any
        - auto
      example: exact
      readOnly: true
    Tests_API_SensitivityLevel:
      type: string
      description: >-
        Used when `roundsViolatingMode` is set to `auto`. The default is
        `medium`. Higher sensitivity increases the likelihood of triggering
        alerts.
      enum:
        - high
        - medium
        - low
      example: medium
      readOnly: true
    Tests_API_Severity:
      type: string
      description: The severity of the alert.
      enum:
        - info
        - major
        - minor
        - critical
        - unknown
      example: major
    Tests_API_AlertRule:
      type: object
      properties:
        ruleId:
          $ref: '#/components/schemas/Tests_API_RuleId'
        ruleName:
          type: string
          description: Name of the alert rule
          example: The End of the Internet
          readOnly: true
        expression:
          type: string
          description: String expression of alert rule
          example: ((hops((hopDelay >= 100 ms))))
          readOnly: true
        direction:
          $ref: '#/components/schemas/Tests_API_AlertDirection'
        isDefault:
          type: boolean
          description: >-
            Alert rules allow up to 1 alert rule to be selected as a default for
            each type. By checking the default option, this alert rule will be
            automatically included on subsequently created tests that test a
            metric used in alerting here
          example: true
          readOnly: true
        alertType:
          $ref: '#/components/schemas/Tests_API_AlertType'
        minimumSources:
          type: integer
          description: >-
            The minimum number of agents or monitors that must meet the
            specified criteria in order to trigger the alert
          example: 10
          readOnly: true
        minimumSourcesPct:
          type: integer
          description: >-
            the minimum percentage of all assigned agents or monitors that must
            meet the specified criteria in order to trigger the alert
          example: 99
          readOnly: true
        roundsViolatingMode:
          $ref: '#/components/schemas/Tests_API_AlertRoundsViolationMode'
        roundsViolatingOutOf:
          type: integer
          description: Specifies the divisor (y value) for the “X of Y times” condition.
          example: 5
          readOnly: true
        roundsViolatingRequired:
          type: integer
          description: Specifies the numerator (x value) for the “X of Y times” condition
          example: 2
          readOnly: true
        sensitivityLevel:
          $ref: '#/components/schemas/Tests_API_SensitivityLevel'
        severity:
          $ref: '#/components/schemas/Tests_API_Severity'
    Tests_API_BaseBgpTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - type: object
          properties:
            enabled:
              $ref: '#/components/schemas/Tests_API_Enabled'
            monitors:
              $ref: '#/components/schemas/Tests_API_TestBgpMonitors'
            includeCoveredPrefixes:
              type: boolean
              description: >-
                Indicate if queries for subprefixes detected under this prefix
                should included.
              example: true
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
            alertsEnabled:
              type: boolean
              description: Indicates if alerts are enabled.
              example: true
            alertRules:
              type: array
              description: A list of enabled alert rule objects.
              items:
                $ref: '#/components/schemas/Tests_API_AlertRule'
            createdBy:
              $ref: '#/components/schemas/Tests_API_TestCreatedBy'
            createdDate:
              $ref: '#/components/schemas/Tests_API_TestCreatedDate'
            type:
              $ref: '#/components/schemas/Tests_API_TestBgpType'
    Tests_API_BgpTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseBgpTest'
        - type: object
          required:
            - prefix
          properties:
            prefix:
              type: string
              description: >-
                a.b.c.d is a network address, with the prefix length defined as
                e. Prefixes can be any length from 8 to 24.
    Tests_API_UnexpandedTest:
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Tests_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Tests_API_Enabled'
    Tests_API_TestBandwidthMeasurements:
      type: boolean
      description: >-
        Set to `true` to enable bandwidth measurements, only applies to
        Enterprise agents assigned to the test.
      example: true
    Tests_API_TestMtuMeasurements:
      type: boolean
      description: Set `true` to measure MTU sizes on network from agents to the target.
      example: false
    Tests_API_TestNumPathTraces:
      type: integer
      minimum: 1
      maximum: 10
      description: Number of path traces executed by the agent.
      default: 3
      example: 3
    Tests_API_TestPathTraceMode:
      type: string
      enum:
        - classic
        - in-session
      description: Select `inSession` to perform the path trace within a TCP session.
      default: classic
      example: classic
    Tests_API_TestProbeMode:
      type: string
      enum:
        - auto
        - sack
        - syn
      description: >-
        Probe mode used by network test, only valid when the protocol is set to
        TCP.
      default: auto
      example: auto
    Tests_API_TestProtocol:
      type: string
      enum:
        - tcp
        - icmp
        - udp
      description: >-
        Protocol used by dependent network tests (end-to-end, path trace,
        PMTUD).
      default: tcp
      example: tcp
    Tests_API_TestRandomizedStartTime:
      type: boolean
      description: >-
        Indicates whether agents should randomize the start time in each test
        round.
      default: false
      example: false
    Tests_API_TestDscp:
      type: string
      description: DSCP label.
      readOnly: true
      example: Best Effort (DSCP 0)
    Tests_API_TestDscpId:
      type: string
      enum:
        - '0'
        - '8'
        - '16'
        - '24'
        - '32'
        - '40'
        - '48'
        - '56'
        - '10'
        - '12'
        - '14'
        - '18'
        - '20'
        - '22'
        - '26'
        - '28'
        - '30'
        - '34'
        - '36'
        - '38'
        - '46'
        - '44'
      description: >-
        DSCP ID [to see list for acceptable
        values](https://docs.thousandeyes.com/product-documentation/tests/dscp-options-in-network-tests)
      default: '0'
      example: '0'
    Tests_API_TestIpv6Policy:
      type: string
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
        - use-agent-policy
      description: >-
        IP version policy. Overrides the IPv6 policy configured at the agent
        level.
      default: use-agent-policy
      example: use-agent-policy
    Tests_API_AgentToServerWritablePropertyFields:
      type: object
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/Tests_API_TestBandwidthMeasurements'
        continuousMode:
          type: boolean
          description: |
            To enable continuous monitoring, set this parameter to `true` to. 
            When continuous monitoring is enabled, the following actions occur:
            * `fixedPacketRate` is enforced
            * `bandwidthMeasurements` are disabled
            * If the `protocol` is set to `tcp`, `probeMode` is set to `syn`.
          example: false
        fixedPacketRate:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            If continuousMode is `false`, set the fixedPacketRate to a value
            between 10-100. If `continuousMode` is `true`, set the
            `fixedPacketRate` to `1`
          example: 25
        mtuMeasurements:
          $ref: '#/components/schemas/Tests_API_TestMtuMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/Tests_API_TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/Tests_API_TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/Tests_API_TestProbeMode'
        protocol:
          $ref: '#/components/schemas/Tests_API_TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/Tests_API_TestRandomizedStartTime'
        server:
          type: string
          description: >-
            The target name or IP address. If a port is set for the test, it is
            appended to the target name or IP address using a colon.
          example: www.thousandeyes.com:80
        dscp:
          $ref: '#/components/schemas/Tests_API_TestDscp'
        dscpId:
          $ref: '#/components/schemas/Tests_API_TestDscpId'
        ipv6Policy:
          $ref: '#/components/schemas/Tests_API_TestIpv6Policy'
        pingPayloadSize:
          type: integer
          minimum: 0
          maximum: 1400
          description: >-
            Payload size (not total packet size) for the end-to-end metric's
            probes, ping payload size allows values from 0 to 1400 bytes. When
            set to null, payload sizes are 0 bytes for ICMP-based tests and 1
            byte for TCP-based tests.
        networkMeasurements:
          type: boolean
          description: >-
            View packet loss in 1-second intervals. This is only available for
            1-minute interval tests. Set to `true` to enable network
            measurements.
          default: false
          example: false
    Tests_API_AgentToServerTestType:
      type: string
      example: agent-to-server
      readOnly: true
    Tests_API_AgentToServerProperties:
      allOf:
        - $ref: '#/components/schemas/Tests_API_AgentToServerWritablePropertyFields'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/Tests_API_AgentToServerTestType'
          required:
            - server
    Tests_API_TestBgpMeasurements:
      type: boolean
      description: Set to `true` to enable bgp measurements.
      default: true
      example: true
    Tests_API_UnexpandedAgentToServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - $ref: '#/components/schemas/Tests_API_UnexpandedInstantTest'
        - $ref: '#/components/schemas/Tests_API_AgentToServerProperties'
        - type: object
          required:
            - interval
          properties:
            bgpMeasurements:
              $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
    Tests_API_TestName:
      type: string
      description: Name of the test.
      example: Test name
    Tests_API_BaseTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_UnexpandedTest'
        - type: object
          properties:
            alertRules:
              type: array
              description: Contains list of enabled alert rule objects.
              items:
                $ref: '#/components/schemas/Tests_API_AlertRule'
    Tests_API_AgentToServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_InstantTest'
        - $ref: '#/components/schemas/Tests_API_AgentToServerProperties'
    Tests_API_TestMonitorsProperties:
      type: object
      properties:
        bgpMeasurements:
          $ref: '#/components/schemas/Tests_API_TestBgpMeasurements'
        usePublicBgp:
          $ref: '#/components/schemas/Tests_API_TestUsePublicBgp'
        monitors:
          $ref: '#/components/schemas/Tests_API_TestBgpMonitors'
    Tests_API_AgentToServerTest:
      allOf:
        - $ref: '#/components/schemas/Tests_API_BaseTest'
        - $ref: '#/components/schemas/Tests_API_AgentToServerInstantTest'
        - $ref: '#/components/schemas/Tests_API_TestMonitorsProperties'
        - type: object
          required:
            - interval
    Tests_API_CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    Tests_API_AgentBase:
      type: object
      properties:
        ipAddresses:
          type: array
          description: Array of private IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 99.139.65.220
            - 9bbd:8a0a:a257:5876:288b:6cb2:3f36:64ce
        publicIpAddresses:
          type: array
          description: Array of public IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 192.168.1.78
            - f9b2:3a21:f25c:d300:03f4:586d:f8d6:4e1c
        network:
          type: string
          description: Network (including ASN) of agent’s public IP.
          example: AT&T Services, Inc. (AS 7018)
          readOnly: true
    Tests_API_Coordinates:
      type: object
      description: Geographic coordinates for agent location.
      properties:
        latitude:
          type: number
          format: double
          description: The latitude of the agent location in decimal degrees
          example: 37.77493
          readOnly: true
        longitude:
          type: number
          format: double
          description: The longitude of the agent location in decimal degrees
          example: -122.41942
          readOnly: true
    Tests_API_SimpleAgent:
      type: object
      allOf:
        - $ref: '#/components/schemas/Tests_API_AgentBase'
        - type: object
          properties:
            agentId:
              type: string
              description: Unique ID of the agent.
              example: '281474976710706'
              readOnly: true
            agentName:
              type: string
              description: Name of the agent.
              example: thousandeyes-stg-va-254
            location:
              type: string
              description: Location of the agent.
              example: San Francisco Bay Area
              readOnly: true
            countryId:
              type: string
              description: 2-digit ISO country code
              example: US
              readOnly: true
            coordinates:
              $ref: '#/components/schemas/Tests_API_Coordinates'
            enabled:
              type: boolean
              description: Flag indicating if the agent is enabled.
              example: true
            verifySslCertificates:
              type: boolean
              description: >-
                Flag indicating if has normal SSL operations or  if instead it's
                set to ignore SSL errors on browserbot-based tests.
              example: true
              readOnly: true
            prefix:
              type: string
              description: Prefix containing agents public IP address.
              example: 99.128.0.0/11
              readOnly: true
    Tests_API_AgentResponse:
      allOf:
        - required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Tests_API_CloudEnterpriseAgentType'
        - $ref: '#/components/schemas/Tests_API_SimpleAgent'
    Tests_API_TestAgentsResponse:
      type: array
      description: Contains list of agents.
      items:
        $ref: '#/components/schemas/Tests_API_AgentResponse'
    Tests_API_TestDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: Direction of the test, which affects how results are shown.
      default: to-target
      example: to-target
    Tests_API_TestPort:
      type: integer
      minimum: 1
