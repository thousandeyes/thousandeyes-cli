    put:
      tags:
        - Roles
      summary: Update role
      operationId: updateRole
      description: >-
        Updates a user-defined role using its ID.


        When updating a role, the following applies: 

        * The full list of permissions must be sent, This operation does not
        support delta-based grant or revoking of permissions. 

        * Permission definitions and details can be obtained from the
        Permissions operation.
      parameters:
        - $ref: '#/components/parameters/Administrative_API_RoleId'
        - $ref: '#/components/parameters/Administrative_API_AccountGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Administrative_API_RoleRequestBody'
        required: true
      responses:
        '200':
          description: OK
          content:
