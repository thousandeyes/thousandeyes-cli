  /templates/{id}/deploy:
    post:
      tags:
        - Templates
      summary: Deploy template
      description: >-
        Deploys a template, which will result in creating any of the tests,
        tags, alert rules, dashboards or other assets defined in the template.

        You must specify any `userInputValues` required by the template in the
        request body. `userInputValues` enables you to specify a minimum set of
        user values required to configure the tests from a template. This way,
        you do not have to edit all the details of each test configuration. If
        necessary, you can edit the test details directly in the template.

        ### Considerations

        Consider the following when deploying a template:

        * To deploy a template, you must first create a template or use one of
        ThousandEyes' built-in templates.

        * The deployment strategy allows you to specify what should happen to a
        particular asset in the event that a template is redeployed.
          When you attempt to deploy a template that has already been deployed, the API service compares any assets that have not yet been deployed with the assets that were deployed in the previous deployment (the comparison is done using the **asset key**; the asset keys are simply the object keys used in the `tests`, `labels`, `tags`, `alertRules`, and `dashboards` fields). By default, if the configuration of a particular asset has not changed from the previous deployment, that asset is ignored.
            If a change is detected:
          * If the asset is a test, a new test is created with the new configuration.
          * If the asset is not a test, the asset is updated.
        * Tags are deployed in two phases. Every field on the tag configuration
        except `assignments` (`key`, `value`, `objectType`, `accessType`, and
        optional `color`) is applied before dependent assets so that tag IDs are
        available for Handlebars references (for example, `{{tags.myTag.id}}`).
        The `assignments` field is applied after those assets exist (for
        example, after the tests you reference have been created), so it can
        resolve deployed IDs such as `{{tests.myTest.testId}}`. When tags are
        shared across multiple template deployments, existing assignments from
        other deployments are preserved because assignments are additive.

        * You can create new resources such as tests, tags, alert rules, labels,
        dashboards, and modify existing resources defined in templates,
        overwriting the default configurations.

        * You can also use existing resources (such as those created outside the
        template deployment flow) by adding their ID either in the raw template
        or using the overrides when deploying the template. See example usage
        below for the raw template sample.

        **Note**: The template API does not currently track "live" configuration
        of assets. Any changes made to assets outside of the template API will
        not be considered when comparing changes during the redeployment
        scenario.

        ### Example usage:

        ```POST

        /v7/tests/templates/fcbb89a7-61cf-4616-9c4f-828fa3cb4684/deploy

        {
          "userInputValues": {
            "interval": 120,
            "target": "https://microsoft.com",
            "agents": [{"agentId":11}],
            "domain": "microsoft.com"
          },
          "name":"Microsoft Suite",
          "tests": {
            "secondPageLoadTest": {
              "httpInterval": 120,
              "interval": 120,
              "testId": 182481,
              "type": "page-load",
              "url": "https://microsoft.com",
              "testName": "Microsoft Suite - Second Page Load",
              "agents": [
                {
                  "agentId": 11
                }
              ]
            }
          }
        }

        ```

        #### Raw Template Sample

        ```

        {
          ...
          "tests": {
              "existingTest": {
                  "testId": "123", //The API will only try to update this test; will never create it
                  "type": "http-server",
                  ....
              },
              ...
          },
          ...
        }

        ```
      operationId: deployTemplate
      parameters:
        - $ref: '#/components/parameters/Templates_API_IdTemplate'
        - $ref: '#/components/parameters/Templates_API_AccountGroupId'
      requestBody:
        description: Deploy template
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Templates_API_DeployTemplate'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Templates_API_TemplateResponse'
        '400':
          $ref: '#/components/responses/Templates_API_400'
        '401':
          $ref: '#/components/responses/Templates_API_401'
        '403':
          $ref: '#/components/responses/Templates_API_403'
        '404':
          $ref: '#/components/responses/Templates_API_404'
        '500':
          $ref: '#/components/responses/Templates_API_500'
      security:
        - Templates_API_BearerAuth: []
