      enum:
        - ONE_WAY_NET_LOSS_TO_TARGET
        - ONE_WAY_NET_LATENCY_TO_TARGET
        - ONE_WAY_NET_JITTER_TO_TARGET
        - ONE_WAY_NET_THROUGHPUT_TO_TARGET
