          items:
            $ref: '#/components/schemas/Alerts_API_AlertSuppressionWindow'
        _links:
          $ref: '#/components/schemas/Alerts_API_SelfLinks'
    Alerts_API_BaseAlertSuppressionWindow:
      type: object
