    Dashboards_API_SnapshotExpirationDate:
      type: string
      format: date-time
      description: >-
        Expiration date of the snapshot. If unspecified, the snapshot expires 1
        year from its creation date. The expiration date must be set within 5
        years from the current date and adhere to the ISO date-time format.
      example: '2023-05-16T10:14:28Z'
    Dashboards_API_GenerateDashboardSnapshotRequest:
      type: object
      description: Request to generate a snapshot from a dashboard.
      properties:
        startDate:
          type: string
          format: date-time
          description: Date and time to start aggregating data (ISO date-time format).
          example: '2023-05-16T10:14:28Z'
        endDate:
          type: string
          format: date-time
          description: Date and time to end aggregating data (ISO date-time format).
          example: '2023-05-16T10:14:28Z'
        displayName:
          type: string
          description: The name of the snapshot, does not have to be unique.
          example: snapshot from API
        dashboardId:
          type: string
          description: TheIdentifierof the dashboard to generate a snapshot from
          example: 646f4d2ce3c99b0536c3821e
        anonymizeData:
          type: boolean
          description: Set to `true` to anonymize the data in the snapshot.
        timezone:
          type: string
          description: Specifies the timezone used for date and time fields.
          example: PST
        expirationDate:
          $ref: '#/components/schemas/Dashboards_API_SnapshotExpirationDate'
    Dashboards_API_UpdateSnapshotExpirationDateApiRequest:
      type: object
      description: Request to update the expiration date of a snapshot.
      properties:
        snapshotExpirationDate:
          $ref: '#/components/schemas/Dashboards_API_SnapshotExpirationDate'
        expirationDate:
          deprecated: true
          type: string
          description: >-
            Expiration date of the snapshot. If unspecified, the snapshot
            expires 1 year from its creation date. The expiration date must be
            set within 5 years from the current date.
          example: '2023-05-16 10:14:28'
