          example: '2023-05-16T10:14:28Z'
        endDate:
          type: string
          format: date-time
          description: >-
            UTC end date of the data shown in the API output (ISO date-time
            format).
          example: '2023-05-16T10:14:28Z'
        previousValue:
          type: number
          format: double
          description: Previous value if `compareToPreviousValue == true` in configuration.
          example: 500
        binSize:
          $ref: '#/components/schemas/Dashboards_API_BinSize'
        timestamp:
          $ref: '#/components/schemas/Dashboards_API_Timestamp'
        numberOfDataPoints:
          type: integer
          format: int64
          description: Number of points aggregated into the data point
          example: 24192
        value:
          $ref: '#/components/schemas/Dashboards_API_WidgetValue'
        status:
          $ref: '#/components/schemas/Dashboards_API_WidgetStatus'
        alertSuppressionWindows:
          type: array
          items:
            $ref: '#/components/schemas/Dashboards_API_ApiDashboardAsw'
        _links:
          $ref: '#/components/schemas/Dashboards_API_SelfLinks'
    Dashboards_API_ApiReportDataComponentLabelMap:
      type: object
