        status:
          $ref: '#/components/schemas/Alerts_API_AlertSuppressionWindowState'
        startDate:
          type: string
          format: date-time
          description: >-
            The date/time when the alert suppression window starts (ISO
            date-time format).
          example: '2017-07-01T05:00:00Z'
        duration:
          type: integer
          description: Duration in seconds the suppression window is active.
          example: 0
        repeat:
          $ref: '#/components/schemas/Alerts_API_Repeat'
        endRepeat:
          $ref: '#/components/schemas/Alerts_API_EndRepeat'
    Alerts_API_AlertSuppressionWindow:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_BaseAlertSuppressionWindow'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Alerts_API_SelfLinks'
    Alerts_API_AlertSuppressionWindowState:
      type: string
      enum:
        - active
        - inactive
        - ended
      description: Indicates the current status of the suppression window.
      example: ended
      readOnly: true
    Alerts_API_AlertSuppressionWindowRequest:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_BaseAlertSuppressionWindow'
        - type: object
          properties:
            testIds:
              type: array
              description: List of test IDs to assign to the alert suppression window.
              items:
                type: string
                example: '71687'
    Alerts_API_AlertSuppressionWindowDetail:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_AlertSuppressionWindow'
        - type: object
          properties:
            tests:
              type: array
              description: List of tests assigned to the alert suppression window.
              items:
                $ref: '#/components/schemas/Alerts_API_SimpleTest'
    Alerts_API_Repeat:
      type: object
      description: Repeat options.
      properties:
        type:
          $ref: '#/components/schemas/Alerts_API_RepeatType'
        intervalType:
          $ref: '#/components/schemas/Alerts_API_IntervalType'
        intervalLength:
          type: integer
          description: >-
            Number of `intervalTypes` to wait before reactivating the alert
            suppression window.
          example: 2
        daysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/Alerts_API_DaysOfWeek'
    Alerts_API_RepeatType:
      type: string
      description: Repeat options type.
      enum:
        - day
        - week
        - month
        - custom
      example: week
    Alerts_API_IntervalType:
      type: string
      description: Repeat options interval type
      enum:
        - day
        - week
        - month
      example: day
    Alerts_API_DaysOfWeek:
      type: string
      description: >-
        Specifies the day to activate the alert suppression window. Applicable
        only when `intervalType` is set to `week`.
      enum:
        - sun
        - mon
        - tue
        - wed
        - thu
        - fri
        - sat
      example: sun
    Alerts_API_EndRepeat:
      type: object
      description: End repeat options.
      properties:
        type:
          $ref: '#/components/schemas/Alerts_API_EndRepeatType'
        count:
          type: integer
          description: >-
            End repeat after number of occurrences, only valid with count type
            option.
          example: 3
        date:
          type: string
          format: date
          description: >-
            End repeat after specific date, only valid with date type option
            (ISO date format).
          example: '2017-07-01'
    Alerts_API_EndRepeatType:
      type: string
      description: End repeat options type.
      enum:
        - count
        - never
        - date
      example: never
    Alerts_API_RuleTestIds:
      type: array
      description: >-
        Array of test IDs to link to alert rule (get `testId` from `/tests`
        endpoint).
      items:
        type: string
      example:
        - '281474976710706'
        - '271659'
    Alerts_API_AlertLinks:
      type: object
      description: An object containing the alert links.
      readOnly: true
      properties:
        test:
          $ref: '#/components/schemas/Alerts_API_Link'
        rule:
          $ref: '#/components/schemas/Alerts_API_Link'
        appLink:
          $ref: '#/components/schemas/Alerts_API_Link'
        self:
          $ref: '#/components/schemas/Alerts_API_Link'
    Alerts_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Alerts_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Alerts_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Alerts_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Alerts_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Alerts_API_ValidationErrorItem'
    Alerts_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Alerts_API_Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    Alerts_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Alerts_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Alerts_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Alerts_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Alerts_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Alerts_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Alerts_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Alerts_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Alerts_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Alerts_API_TestResults'
      readOnly: true
    Alerts_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Alerts_API_Link'
    Alerts_API_RuleId:
      type: string
      description: Unique ID of the rule.
      example: '127094'
      readOnly: true
    Alerts_API_AlertDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: >-
        Direction for applicable alert types (eg. path trace, End-to-End (Agent)
        etc.)
      example: to-target
    Alerts_API_AlertType:
      type: string
      description: >-
        Type of alert being triggered. In multi-layered tests, this value
        represents the layer the alert relates to. See [Alert
        Details](https://developer.cisco.com/docs/thousandeyes/retrieve-alert-details/)
        documentation for a list of possible values
      example: http-server
      enum:
        - page-load
        - http-server
        - end-to-end-server
        - end-to-end-agent
        - voice
        - dns-server
        - dns-trace
        - dnssec
        - bgp
        - path-trace
        - ftp
        - sip-server
        - transactions
        - web-transactions
        - agent
        - network-outage
        - application-outage
        - device-device
        - device-interface
        - endpoint-network-server
        - endpoint-http-server
        - endpoint-path-trace
        - endpoint-browser-sessions-agent
        - endpoint-browser-sessions-application
        - api
        - web-transaction
        - unknown
    Alerts_API_AlertGroupType:
      type: string
      description: >-
        Category of alert type based on the application or network layer and
        source of the test.
      enum:
        - bgp
        - browser-session
        - cloud-enterprise
        - endpoint
      example: endpoint
    Alerts_API_AlertRoundsViolationMode:
      type: string
      description: >-
        `exact` requires the same agents to meet the threshold in consecutive
        rounds. `auto` is only enabled for CEA and Endpoint Scheduled test
        rules. The default is `any`.
      enum:
        - exact
        - any
        - auto
      example: exact
      readOnly: true
    Alerts_API_SensitivityLevel:
      type: string
      description: >-
        Used when `roundsViolatingMode` is set to `auto`. The default is
        `medium`. Higher sensitivity increases the likelihood of triggering
        alerts.
      enum:
        - high
        - medium
        - low
      example: medium
      readOnly: true
    Alerts_API_Severity:
      type: string
      description: The severity of the alert.
      enum:
        - info
        - major
        - minor
        - critical
        - unknown
      example: major
    Alerts_API_StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Alerts_API_EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Alerts_API_PaginationLinks:
      type: object
      description: A links object containing pagination related link(s).
      properties:
        previous:
          $ref: '#/components/schemas/Alerts_API_Link'
        next:
          $ref: '#/components/schemas/Alerts_API_Link'
        self:
          $ref: '#/components/schemas/Alerts_API_Link'
    Alerts_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Alerts_API_SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Alerts_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Alerts_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Alerts_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Alerts_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Alerts_API_TestType'
        _links:
          $ref: '#/components/schemas/Alerts_API_TestLinks'
    Agents_API_CloudEnterpriseAgents:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_CloudEnterpriseAgent'
        _links:
          $ref: '#/components/schemas/Agents_API_SelfLinks'
    Agents_API_CloudEnterpriseAgent:
      anyOf:
        - $ref: '#/components/schemas/Agents_API_AgentResponse'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgent'
    Agents_API_CloudAgentType:
      type: string
      description: Cloud agent type.
      example: cloud
      pattern: ^cloud$
    Agents_API_EnterpriseAgentType:
      type: string
      description: Enterprise agent type.
      example: enterprise
      pattern: ^enterprise$
    Agents_API_EnterpriseClusterAgentType:
      type: string
      description: Enterprise Cluster agent type.
      example: enterprise-cluster
      pattern: ^enterprise-cluster$
    Agents_API_AgentClusterAssignRequest:
      type: object
      properties:
        agents:
          type: array
          description: Contains list of agent IDs (get `agentId` from `/agents` operation)
          items:
            type: string
            description: Agent ID
          example:
            - '281474976710706'
    Agents_API_AgentClusterUnassignRequest:
      type: object
      properties:
        members:
          type: array
          description: >-
            Contains list of member IDs. (get `memberId` from
            `/agents/{agentId}` operation)
          items:
            type: string
            description: member ID
          example:
            - '281474976710706'
    Agents_API_AgentTestsAssignRequest:
      type: object
      properties:
        testIds:
          type: array
          description: >
            List of test IDs to assign.   You can retrieve available `testIds`
            using the `/agents` endpoint with the `expand=testIds` query
            parameter.
          items:
            type: string
            description: Test ID
          example:
            - '281474976710706'
    Agents_API_AgentDetails:
      oneOf:
        - $ref: '#/components/schemas/Agents_API_CloudAgentDetail'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentDetail'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentClusterDetail'
      discriminator:
        propertyName: agentType
        mapping:
          cloud: '#/components/schemas/Agents_API_CloudAgentDetail'
          enterprise: '#/components/schemas/Agents_API_EnterpriseAgentDetail'
          enterprise-cluster: '#/components/schemas/Agents_API_EnterpriseAgentClusterDetail'
    Agents_API_CloudAgentDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/Agents_API_SimpleAgent'
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Agents_API_CloudAgentType'
            tests:
              type: array
              description: List of tests. See `/tests` for more information.
              items:
                $ref: '#/components/schemas/Agents_API_SimpleTest'
            labels:
              type: array
              description: List of labels - see `/labels` for more information.
              items:
                $ref: '#/components/schemas/Agents_API_AgentLabel'
              readOnly: true
            tags:
              type: array
              description: List of tags. See `/tags` for more information.
              items:
                $ref: '#/components/schemas/Agents_API_AgentTag'
              readOnly: true
            _links:
              $ref: '#/components/schemas/Agents_API_SelfLinks'
    Agents_API_EnterpriseAgentDetail:
      allOf:
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Agents_API_EnterpriseAgentType'
            _links:
              $ref: '#/components/schemas/Agents_API_SelfLinks'
        - $ref: '#/components/schemas/Agents_API_SimpleEnterpriseAgent'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentResponseExpands'
    Agents_API_EnterpriseAgentClusterDetail:
      allOf:
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Agents_API_EnterpriseClusterAgentType'
            _links:
              $ref: '#/components/schemas/Agents_API_SelfLinks'
        - $ref: '#/components/schemas/Agents_API_SimpleEnterpriseAgent'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentResponseExpands'
    Agents_API_EnterpriseAgentResponseExpands:
      type: object
      properties:
        testIds:
          $ref: '#/components/schemas/Agents_API_TestIds'
        tests:
          type: array
          description: List of tests. See `/tests` for more information.
          items:
            $ref: '#/components/schemas/Agents_API_SimpleTest'
        notificationRules:
          type: array
          description: List of notification rule objects configured on agent
          items:
            $ref: '#/components/schemas/Agents_API_NotificationRules'
        labels:
          type: array
          description: List of labels. See `/labels` for more information.
          items:
            $ref: '#/components/schemas/Agents_API_AgentLabel'
          readOnly: true
        tags:
          type: array
          description: List of tags. See `/tags` for more information.
          items:
            $ref: '#/components/schemas/Agents_API_AgentTag'
          readOnly: true
    Agents_API_AgentRequest:
      type: object
      properties:
        agentName:
          type: string
          description: Name of the agent.
          example: thousandeyes-stg-va-254
        enabled:
          type: boolean
          description: Flag indicating if the agent is enabled.
          example: true
        accountGroups:
          type: array
          description: >-
            Contains a list of account groups IDs. See `/accounts-groups` for a
            list of account IDs
          items:
            type: string
          example:
            - '1234'
            - '1'
        ipv6Policy:
          $ref: '#/components/schemas/Agents_API_AgentIpv6Policy'
        keepBrowserCache:
          type: boolean
          description: Flag indicating if the agent retains cache.
          example: true
        targetForTests:
          type: string
          format: ipv4
          description: Test target IP address.
          example: 1.1.1.1
        localResolutionPrefixes:
          type: array
          description: >-
            Public IP ranges for rDNS lookups. The range must be in CIDR
            notation; for example, 10.1.1.0/24. Maximum of 5 prefixes allowed
            (Enterprise Agents and Enterprise Agent clusters only).
          items:
            type: string
          example:
            - 10.2.3.3/24
            - 10.2.3.3/25
        tests:
          type: array
          description: >-
            Contains list of test IDs. See `/tests` to pull a list of available
            tests.
          items:
            type: string
          example:
            - '12313145'
            - '12345'
    Agents_API_AgentIpv6Policy:
      type: string
      description: IP version policy, (Enterprise Agents and Enterprise Clusters only)
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
      example: force-ipv4
    Agents_API_ListNotificationRulesResponse:
      allOf:
        - $ref: '#/components/schemas/Agents_API_NotificationRules'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Agents_API_SelfLinks'
    Agents_API_NotificationRules:
      type: object
      properties:
        agentAlertRules:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_NotificationRule'
          example:
            - ruleId: '281474976710706'
              ruleName: Default Agent Offline Notification
              expression: ((lastContact >= 30 min))
              notifyOnClear: true
              isDefault: false
            - ruleId: '281474976710709'
              ruleName: Test Rule
              expression: ((lastContact >= 40 min))
              notifyOnClear: true
              isDefault: true
    Agents_API_NotificationRule:
      type: object
      properties:
        ruleId:
          type: string
          description: Agent notification rule ID
          example: '281474976710706'
          readOnly: true
        ruleName:
          type: string
          description: Name of the agent notification rule
          example: Default Agent Offline Notification
        expression:
          type: string
          description: Expression of agent notification rule
          example: ((lastContact >= 30 min))
        notifyOnClear:
          type: boolean
          description: Send notification when notification clears
          example: true
        isDefault:
          type: boolean
          description: >-
            Agent notification rule will be automatically included on all new
            Enterprise Agents.
          example: false
    Agents_API_NotificationRuleDetail:
      allOf:
        - $ref: '#/components/schemas/Agents_API_NotificationRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/Agents_API_AgentNotification'
            agents:
              type: array
              items:
                $ref: '#/components/schemas/Agents_API_AgentResponse'
            _links:
              $ref: '#/components/schemas/Agents_API_SelfLinks'
    Agents_API_AgentNotification:
      type: object
      description: Alert notification object.
      properties:
        email:
          $ref: '#/components/schemas/Agents_API_AlertEmail'
        thirdParty:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_AlertIntegrationBase'
        webhook:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_AlertIntegrationBase'
    Agents_API_AgentProxies:
      type: object
      properties:
        agentProxies:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_AgentProxy'
        _links:
          $ref: '#/components/schemas/Agents_API_SelfLinks'
    Agents_API_AgentProxy:
      type: object
      properties:
        aid:
          type: string
          description: Account id that this proxy configuration belongs to
          example: '1234'
        authType:
          $ref: '#/components/schemas/Agents_API_ProxyAuthType'
        bypassList:
          type: array
          description: >-
            A list of hostnames, network prefixes, or wildcards used to
            determine which test targets should not be proxied. If all tests
            should be proxied, leave empty.
          items:
            type: string
          example:
            - 10.0.0.0/16
            - '*.thousandeyes.com'
        lastModified:
          type: string
          description: >-
            Last modification timestamp of the proxy. Expressed in UTC (ISO
            date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        location:
          type: string
          description: >-
            The location of the proxy. If proxyType is `static` use the format
            `hostname:port`. If location is `pac`, then specify the URL where
            the PAC file can be obtained.
          example: proxy.thousandeyes.com:3128
        isLocalConfigured:
          type: boolean
          description: >-
            Set to `true` if this proxy configuration comes from the agent’s
            config file. Specify `false` if the proxy configuration was created
            in the ThousandEyes application.
          example: true
        name:
          type: string
          description: Expression of agent notification rule.
          example: Test Proxy - Auth Type - BASIC
        password:
          type: string
          format: password
          description: Password for proxy authentication
          example: '**********'
        proxyId:
          type: string
          description: Agent proxy's unique ID.
          example: '281474976710706'
        type:
          $ref: '#/components/schemas/Agents_API_ProxyType'
        user:
          type: string
          description: Username for proxy authentication.
          example: user1
    Agents_API_ProxyAuthType:
      type: string
      description: The type of authentication the proxy requires
      enum:
        - basic
        - ntlm
        - kerberos
        - unknown
      example: basic
    Agents_API_ProxyType:
      type: string
      description: The type of proxy, STATIC or PAC.
      enum:
        - static
        - pac
      example: static
    Agents_API_AlertEmail:
      type: object
      properties:
        message:
          type: string
          description: Message used for email notification.
          example: This test is failing, check as soon as possible.
        recipients:
          type: array
          description: List of recipients emails that will be notified.
          items:
            type: string
          example:
            - user1@thousandeyes.com
            - user2@cisco.com
    Agents_API_AlertIntegrationBase:
      type: object
      properties:
        integrationId:
          type: string
          description: Unique ID of the integration.
          example: wb-78
        integrationName:
          type: string
          description: Name of the integration.
          example: integrationSlack1
        integrationType:
          $ref: '#/components/schemas/Agents_API_AlertIntegrationType'
        target:
          type: string
          description: Target URL of the integration.
          example: https://hooks.slack.com/services/asd/0VqDYEpidpHVAK397x8PBsmZ
        authMethod:
          type: string
          description: (PagerDuty only) Authentication method.
          example: Basic
        authUser:
          type: string
          description: (PagerDuty only) Authentication user.
          example: user123
        authToken:
          type: string
          description: (PagerDuty only) Authentication token.
          example: 0VqDYEpidpHVAK397x8PBsmZ
        channel:
          type: string
          description: (Slack only) Slack `#channel` or `@user`.
          example: '#slackChannel'
    Agents_API_AlertIntegrationType:
      type: string
      description: Type of the alert integration
      enum:
        - pager-duty
        - slack
      example: slack
    Agents_API_AgentLabel:
      type: object
      readOnly: true
      properties:
        labelId:
          type: string
          description: Label Id.
          example: '11'
        name:
          type: string
          description: Name of the label.
          example: Label name
    Agents_API_AgentTag:
      type: object
      readOnly: true
      properties:
        id:
          type: string
          description: Tag Id.
          example: 5aeab5d5-0d34-4d44-a7ac-fb440185295c
          format: uuid
        key:
          type: string
          description: Tag key, for example, "Location" or "Department".
          example: Location
        value:
          type: string
          description: Tag value, for example, "San Francisco" or "Engineering".
          example: San Francisco
    Agents_API_AgentListExpand:
      type: string
      enum:
        - cluster-member
        - test
        - test-ids
    Agents_API_AgentDetailsExpand:
      type: string
      enum:
        - cluster-member
        - test
        - test-ids
        - notification-rule
    Agents_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Agents_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Agents_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Agents_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Agents_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Agents_API_ValidationErrorItem'
    Agents_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Agents_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Agents_API_Link'
    Agents_API_CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    Agents_API_AgentBase:
      type: object
      properties:
        ipAddresses:
          type: array
          description: Array of private IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 99.139.65.220
            - 9bbd:8a0a:a257:5876:288b:6cb2:3f36:64ce
        publicIpAddresses:
          type: array
          description: Array of public IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 192.168.1.78
            - f9b2:3a21:f25c:d300:03f4:586d:f8d6:4e1c
        network:
          type: string
          description: Network (including ASN) of agent’s public IP.
          example: AT&T Services, Inc. (AS 7018)
          readOnly: true
    Agents_API_Coordinates:
      type: object
      description: Geographic coordinates for agent location.
      properties:
        latitude:
          type: number
          format: double
          description: The latitude of the agent location in decimal degrees
          example: 37.77493
          readOnly: true
        longitude:
          type: number
          format: double
          description: The longitude of the agent location in decimal degrees
          example: -122.41942
          readOnly: true
    Agents_API_SimpleAgent:
      type: object
      allOf:
        - $ref: '#/components/schemas/Agents_API_AgentBase'
        - type: object
          properties:
            agentId:
              type: string
              description: Unique ID of the agent.
              example: '281474976710706'
              readOnly: true
            agentName:
              type: string
              description: Name of the agent.
              example: thousandeyes-stg-va-254
            location:
              type: string
              description: Location of the agent.
              example: San Francisco Bay Area
              readOnly: true
            countryId:
              type: string
              description: 2-digit ISO country code
              example: US
              readOnly: true
            coordinates:
              $ref: '#/components/schemas/Agents_API_Coordinates'
            enabled:
              type: boolean
              description: Flag indicating if the agent is enabled.
              example: true
            verifySslCertificates:
              type: boolean
              description: >-
                Flag indicating if has normal SSL operations or  if instead it's
                set to ignore SSL errors on browserbot-based tests.
              example: true
              readOnly: true
            prefix:
              type: string
              description: Prefix containing agents public IP address.
              example: 99.128.0.0/11
              readOnly: true
    Agents_API_AgentResponse:
      allOf:
        - required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Agents_API_CloudEnterpriseAgentType'
        - $ref: '#/components/schemas/Agents_API_SimpleAgent'
    Agents_API_TestIds:
      type: array
      description: List of test IDs assigned to the agent.
      items:
        type: integer
        format: int64
      readOnly: true
      example:
        - 281474976710706
    Agents_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Agents_API_Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    Agents_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Agents_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Agents_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Agents_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Agents_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Agents_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Agents_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Agents_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Agents_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Agents_API_TestResults'
      readOnly: true
    Agents_API_SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Agents_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Agents_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Agents_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Agents_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Agents_API_TestType'
        _links:
          $ref: '#/components/schemas/Agents_API_TestLinks'
    Agents_API_ErrorDetailCode:
      type: string
      description: Code for the agent error.
      enum:
        - agent-version-outdated
        - browserbot-version-outdated
        - appliance-version-outdated
        - clock-offset
        - os-end-of-installation-support
        - os-end-of-support
        - os-end-of-life
        - nat-traversal-error
      example: agent-version-outdated
      readOnly: true
    Agents_API_ErrorDetail:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/Agents_API_ErrorDetailCode'
        description:
          type: string
          description: Description for the agent error.
          example: 'Agent Version 0.1.1 (latest: 1.0.0)'
          readOnly: true
    Agents_API_EnterpriseAgentState:
      type: string
      description: State of the agent.
      enum:
        - online
        - offline
        - disabled
      example: online
      readOnly: true
    Agents_API_ClusterMember:
      allOf:
        - $ref: '#/components/schemas/Agents_API_AgentBase'
        - type: object
          properties:
            memberId:
              type: string
              description: Unique ID of the cluster member
              example: '10'
              readOnly: true
            name:
              type: string
              description: Name of the cluster member
              example: Cluster member name
              readOnly: true
            errorDetails:
              type: array
              description: >-
                If an enterprise agent or a cluster member presents at least one
                error, the errors will be shown as an array of entries in the
                errorDetails field (Enterprise Agents and Enterprise Cluster
                members only)
              items:
                $ref: '#/components/schemas/Agents_API_ErrorDetail'
              readOnly: true
            lastSeen:
              type: string
              description: UTC last seen date (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
              readOnly: true
            agentState:
              $ref: '#/components/schemas/Agents_API_EnterpriseAgentState'
            targetForTests:
              type: string
              format: ipv4
              description: Test target IP address.
              example: 1.1.1.1
            utilization:
              type: integer
              description: >-
                Shows overall utilization percentage (online Enterprise Agents
                and Enterprise Clusters only).
              example: 25
              readOnly: true
    Agents_API_ClusterMembers:
      type: array
      description: >-
        If an enterprise agent is clustered, detailed information about each
        cluster member will be shown as array entries in the clusterMembers
        field. This field is not shown for Enterprise Agents in standalone mode,
        or for Cloud Agents.
      items:
        $ref: '#/components/schemas/Agents_API_ClusterMember'
      readOnly: true
    Agents_API_AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Agents_API_AccountGroup:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/Agents_API_AccountGroupId'
        accountGroupName:
          type: string
          description: Account group name
          example: Account A
    Agents_API_EnterpriseAgentIpv6Policy:
      type: string
      description: IP version policy, (Enterprise Agents and Enterprise Clusters only)
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
      example: force-ipv4
    Agents_API_InterfaceIpMapping:
      type: object
      properties:
        interfaceName:
          type: string
          description: Name of the mapping
          example: wlp4s0
          readOnly: true
        ipAddresses:
          type: array
          description: Array of ipAddress entries
          items:
            type: string
          example:
            - 73.252.207.219
            - 2601:646:300:3ae0::b977
          readOnly: true
    Agents_API_EnterpriseAgentData:
      type: object
      properties:
        testIds:
          $ref: '#/components/schemas/Agents_API_TestIds'
        tests:
          type: array
          description: List of tests. See `/tests` for more information.
          items:
            $ref: '#/components/schemas/Agents_API_SimpleTest'
        clusterMembers:
          $ref: '#/components/schemas/Agents_API_ClusterMembers'
        utilization:
          type: integer
          description: >-
            Shows overall utilization percentage (online Enterprise Agents and
            Enterprise Clusters only).
          example: 25
          readOnly: true
        accountGroups:
          type: array
          description: >-
            List of account groups. See /accounts-groups to pull a list of
            account IDs
          items:
            $ref: '#/components/schemas/Agents_API_AccountGroup'
        ipv6Policy:
          $ref: '#/components/schemas/Agents_API_EnterpriseAgentIpv6Policy'
        errorDetails:
          type: array
          description: >-
            If an enterprise agent or a cluster member presents at least one
            error, the errors will be shown as an array of entries in the
            errorDetails field (Enterprise Agents and Enterprise Cluster members
            only)
          items:
            $ref: '#/components/schemas/Agents_API_ErrorDetail'
          readOnly: true
        hostname:
          type: string
          description: Fully qualified domain name of the agent (Enterprise Agents only)
          example: thousandeyes.com
          readOnly: true
        lastSeen:
          type: string
          description: UTC last seen date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        agentState:
          $ref: '#/components/schemas/Agents_API_EnterpriseAgentState'
        keepBrowserCache:
          type: boolean
          description: Flag indicating if the agent retains cache.
          example: true
        createdDate:
          type: string
          description: UTC Agent creation date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        targetForTests:
          type: string
          format: ipv4
          description: Test target IP address.
          example: 1.1.1.1
        localResolutionPrefixes:
          type: array
          description: >-
            To perform rDNS lookups for public IP ranges, this field represents
            the public IP ranges. The range must be in CIDR notation; for
            example, 10.1.1.0/24. Maximum of 5 prefixes allowed (Enterprise
            Agents and Enterprise Agent clusters only).
          items:
            type: string
            example: 10.2.3.3/24
        interfaceIpMapping:
          type: array
          items:
            $ref: '#/components/schemas/Agents_API_InterfaceIpMapping'
          readOnly: true
    Agents_API_EnterpriseAgent:
      allOf:
        - $ref: '#/components/schemas/Agents_API_AgentResponse'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentData'
    Agents_API_SimpleEnterpriseAgent:
      allOf:
        - $ref: '#/components/schemas/Agents_API_SimpleAgent'
        - $ref: '#/components/schemas/Agents_API_EnterpriseAgentData'
    Administrative_API_ExpandAccountGroupOptions:
      type: string
      enum:
        - user
        - agent
    Administrative_API_AccountGroupToken:
      type: string
      description: >-
        The account group token is an alphanumeric string used to bind an
        Enterprise Agent to a specific account group. This token is not a
        password that must be kept secret. You can retrieve your
        `AccountGroupToken` from the `/account-groups/{id}` endpoint.
      example: 6j052y4vfgyuhefghue
    Administrative_API_AccountGroupInfo:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_AccountGroup'
        - type: object
          properties:
            isCurrentAccountGroup:
              type: boolean
              description: >-
                Indicates whether the requested aid is the context of the
                current account.
              example: true
            isDefaultAccountGroup:
              type: boolean
              description: >-
                Indicates whether the aid is the default one for the requesting
                user.
              example: true
            organizationName:
              type: string
              description: >-
                (Optional) The name of the organization associated with the
                account group.
            orgId:
              type: string
              description: >-
                (Optional) The ID for the organization associated with the
                account group.
              example: '12345'
    Administrative_API_CreatedAccountGroup:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_AccountGroupInfo'
        - type: object
          properties:
            users:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_UserAccountGroup'
            _links:
              $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_AccountGroupDetail:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_CreatedAccountGroup'
        - type: object
          properties:
            agents:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_EnterpriseAgent'
            accountToken:
              $ref: '#/components/schemas/Administrative_API_AccountGroupToken'
              type: string
    Administrative_API_AccountGroupRequest:
      type: object
      properties:
        accountGroupName:
          type: string
          description: The name of the account group
          example: My testing account group
        agents:
          type: array
          description: >-
            To grant access to enterprise agents, specify the agent list. Note
            that this is not an additive list - the full list must be specified
            if changing access to agents.
          items:
            type: string
          example:
            - '105'
            - '719'
      required:
        - accountGroupName
    Administrative_API_AccountGroups:
      type: object
      properties:
        accountGroups:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_AccountGroupInfo'
        _links:
          $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_AccountGroupRole:
      type: object
      properties:
        accountGroup:
          $ref: '#/components/schemas/Administrative_API_AccountGroup'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_Role'
    Administrative_API_UserAccountGroupRole:
      type: object
      properties:
        accountGroupId:
          type: string
          description: Unique ID of the account group.
          example: '315'
        roleIds:
          type: array
          description: Unique role IDs.
          items:
            type: string
            description: Unique role ID.
            example: '57'
          example:
            - '57'
            - '1140'
    Administrative_API_UserRequest:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        loginAccountGroupId:
          type: string
          description: Unique ID of the login account group.
          example: '691'
        accountGroupRoles:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_UserAccountGroupRole'
        allAccountGroupRoleIds:
          type: array
          description: Unique IDs representing the roles.
          items:
            type: string
            description: Unique role ID.
            example: '57'
          example:
            - '57'
            - '1140'
    Administrative_API_User:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        uid:
          type: string
          description: Unique ID of the user.
          example: '245'
        dateRegistered:
          type: string
          description: UTC date the user registered their account (ISO date-time format).
          format: date-time
          example: '2020-07-17T22:00:54Z'
        loginAccountGroup:
          $ref: '#/components/schemas/Administrative_API_AccountGroup'
    Administrative_API_ExtendedUser:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_User'
        - type: object
          properties:
            lastLogin:
              type: string
              description: UTC last login of the user (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
    Administrative_API_Users:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_ExtendedUser'
        _links:
          $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_CreatedUser:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_User'
        - type: object
          properties:
            loginAccountGroup:
              $ref: '#/components/schemas/Administrative_API_AccountGroup'
            accountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_AccountGroupRole'
            allAccountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_Role'
            _links:
              $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_UserDetail:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_ExtendedUser'
        - type: object
          properties:
            loginAccountGroup:
              $ref: '#/components/schemas/Administrative_API_AccountGroup'
            accountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_AccountGroupRole'
            allAccountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Administrative_API_Role'
            _links:
              $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_UserAccountGroup:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        uid:
          type: string
          description: Unique ID representing the user.
          example: '235'
        lastLogin:
          type: string
          description: User's UTC last login date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        dateRegistered:
          type: string
          description: User's UTC registration date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_Role'
    Administrative_API_BaseRole:
      type: object
      properties:
        name:
          type: string
          description: Name of the role.
          example: Organization Admin
        roleId:
          type: string
          description: Unique ID representing the role.
          example: '35'
        isBuiltin:
          type: boolean
          description: >-
            Flag indicating if the role is built-in (Account Admin, Organization
            Admin, Regular User).
    Administrative_API_Role:
      type: object
      allOf:
        - $ref: '#/components/schemas/Administrative_API_BaseRole'
        - properties:
            hasManagementPermissions:
              type: boolean
              description: Flag indicating whether the user has management permissions.
    Administrative_API_Permission:
      type: object
      properties:
        label:
          type: string
          description: Label corresponding to the permission.
          example: View reports
        permissionId:
          type: string
          description: Unique ID representing the permission.
          example: '56'
        isManagementPermission:
          description: >-
            Flag indicating whether the permission is classified as a management
            permission.
          type: boolean
        permission:
          type: string
          description: Permission name
          example: REPORT_SNAPSHOTS_READ
    Administrative_API_PermissionsCollection:
      type: array
      items:
        $ref: '#/components/schemas/Administrative_API_Permission'
      example:
        - label: View reports
          permissionId: '1'
          isManagementPermission: true
          permission: REPORT_READ
        - label: View snapshots
          permissionId: '51'
          isManagementPermission: false
          permission: REPORT_SNAPSHOTS_READ
    Administrative_API_Permissions:
      type: object
      properties:
        permissions:
          $ref: '#/components/schemas/Administrative_API_PermissionsCollection'
        _links:
          $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_RoleDetail:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_BaseRole'
        - type: object
          properties:
            permissions:
              $ref: '#/components/schemas/Administrative_API_PermissionsCollection'
            _links:
              $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_Roles:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_Role'
        _links:
          $ref: '#/components/schemas/Administrative_API_SelfLinks'
    Administrative_API_RoleRequestBody:
      type: object
      properties:
        name:
          type: string
          description: Name of the role.
          example: Organization Admin
        permissions:
          type: array
          description: >-
            Contains list of test permission IDs (get `permissionId` from
            `/permissions` operation)
          items:
            type: string
          example:
            - '56'
            - '315'
    Administrative_API_UserEvent:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/Administrative_API_AccountGroupId'
        accountGroupName:
          type: string
          description: Account group name
          example: Account A
        date:
          type: string
          description: UTC event date (ISO date-time format).
          format: date-time
          example: '2020-07-17T22:00:54Z'
        event:
          type: string
          description: Event type.
          example: Login failed.
        ipAddress:
          type: string
          description: Source IP address of the user.
          example: 99.128.0.0/11
        uid:
          type: string
          description: Unique id representing the user.
          example: '245'
        user:
          type: string
          description: The name and email address of the user.
          example: API Sandbox User (noreply@thousandeyes.com)
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_Resource'
    Administrative_API_Resource:
      type: object
      properties:
        type:
          type: string
          description: >-
            Type of resource affected. Can be “testName”, “reportTitle”,
            “userDisplayName”, “alertRuleName”, etc.
        name:
          type: string
          description: Name of the affected resource.
    Administrative_API_AuditUserEvents:
      type: object
      properties:
        auditEvents:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_UserEvent'
          example:
            - accountGroupName: API Sandbox
              aid: '1234'
              date: '2020-07-17T21:54:54Z'
              event: Report created.
              ipAddress: 99.128.0.0/11
              uid: '1234'
              user: API Sandbox User (noreply@thousandeyes.com)
              resources:
                - name: My New report
                  type: reportTitle
                - name: Other Report
                  type: testName
            - accountGroupName: API Sandbox
              aid: '1234'
              date: '2020-07-17T22:00:54Z'
              event: Login failed.
              ipAddress: 99.128.0.0/11
              uid: '1234'
              user: API Sandbox User (noreply@thousandeyes.com)
        startDate:
          $ref: '#/components/schemas/Administrative_API_StartDate'
        endDate:
          $ref: '#/components/schemas/Administrative_API_EndDate'
        _links:
          $ref: '#/components/schemas/Administrative_API_PaginationLinks'
    Administrative_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Administrative_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Administrative_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Administrative_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Administrative_API_ValidationErrorItem'
    Administrative_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Administrative_API_AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Administrative_API_AccountGroup:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/Administrative_API_AccountGroupId'
        accountGroupName:
          type: string
          description: Account group name
          example: Account A
    Administrative_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Administrative_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Administrative_API_Link'
    Administrative_API_CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    Administrative_API_AgentBase:
      type: object
      properties:
        ipAddresses:
          type: array
          description: Array of private IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 99.139.65.220
            - 9bbd:8a0a:a257:5876:288b:6cb2:3f36:64ce
        publicIpAddresses:
          type: array
          description: Array of public IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 192.168.1.78
            - f9b2:3a21:f25c:d300:03f4:586d:f8d6:4e1c
        network:
          type: string
          description: Network (including ASN) of agent’s public IP.
          example: AT&T Services, Inc. (AS 7018)
          readOnly: true
    Administrative_API_Coordinates:
      type: object
      description: Geographic coordinates for agent location.
      properties:
        latitude:
          type: number
          format: double
          description: The latitude of the agent location in decimal degrees
          example: 37.77493
          readOnly: true
        longitude:
          type: number
          format: double
          description: The longitude of the agent location in decimal degrees
          example: -122.41942
          readOnly: true
    Administrative_API_SimpleAgent:
      type: object
      allOf:
        - $ref: '#/components/schemas/Administrative_API_AgentBase'
        - type: object
          properties:
            agentId:
              type: string
              description: Unique ID of the agent.
              example: '281474976710706'
              readOnly: true
            agentName:
              type: string
              description: Name of the agent.
              example: thousandeyes-stg-va-254
            location:
              type: string
              description: Location of the agent.
              example: San Francisco Bay Area
              readOnly: true
            countryId:
              type: string
              description: 2-digit ISO country code
              example: US
              readOnly: true
            coordinates:
              $ref: '#/components/schemas/Administrative_API_Coordinates'
            enabled:
              type: boolean
              description: Flag indicating if the agent is enabled.
              example: true
            verifySslCertificates:
              type: boolean
              description: >-
                Flag indicating if has normal SSL operations or  if instead it's
                set to ignore SSL errors on browserbot-based tests.
              example: true
              readOnly: true
            prefix:
              type: string
              description: Prefix containing agents public IP address.
              example: 99.128.0.0/11
              readOnly: true
    Administrative_API_AgentResponse:
      allOf:
        - required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/Administrative_API_CloudEnterpriseAgentType'
        - $ref: '#/components/schemas/Administrative_API_SimpleAgent'
    Administrative_API_TestIds:
      type: array
      description: List of test IDs assigned to the agent.
      items:
        type: integer
        format: int64
      readOnly: true
      example:
        - 281474976710706
    Administrative_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Administrative_API_Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    Administrative_API_TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    Administrative_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Administrative_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Administrative_API_TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    Administrative_API_TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Administrative_API_Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    Administrative_API_TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/Administrative_API_TestSelfLink'
        testResults:
          $ref: '#/components/schemas/Administrative_API_TestResults'
      readOnly: true
    Administrative_API_SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/Administrative_API_TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Administrative_API_Enabled'
        createdBy:
          $ref: '#/components/schemas/Administrative_API_TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/Administrative_API_TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/Administrative_API_TestType'
        _links:
          $ref: '#/components/schemas/Administrative_API_TestLinks'
    Administrative_API_ErrorDetailCode:
      type: string
      description: Code for the agent error.
      enum:
        - agent-version-outdated
        - browserbot-version-outdated
        - appliance-version-outdated
        - clock-offset
        - os-end-of-installation-support
        - os-end-of-support
        - os-end-of-life
        - nat-traversal-error
      example: agent-version-outdated
      readOnly: true
    Administrative_API_ErrorDetail:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/Administrative_API_ErrorDetailCode'
        description:
          type: string
          description: Description for the agent error.
          example: 'Agent Version 0.1.1 (latest: 1.0.0)'
          readOnly: true
    Administrative_API_EnterpriseAgentState:
      type: string
      description: State of the agent.
      enum:
        - online
        - offline
        - disabled
      example: online
      readOnly: true
    Administrative_API_ClusterMember:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_AgentBase'
        - type: object
          properties:
            memberId:
              type: string
              description: Unique ID of the cluster member
              example: '10'
              readOnly: true
            name:
              type: string
              description: Name of the cluster member
              example: Cluster member name
              readOnly: true
            errorDetails:
              type: array
              description: >-
                If an enterprise agent or a cluster member presents at least one
                error, the errors will be shown as an array of entries in the
                errorDetails field (Enterprise Agents and Enterprise Cluster
                members only)
              items:
                $ref: '#/components/schemas/Administrative_API_ErrorDetail'
              readOnly: true
            lastSeen:
              type: string
              description: UTC last seen date (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
              readOnly: true
            agentState:
              $ref: '#/components/schemas/Administrative_API_EnterpriseAgentState'
            targetForTests:
              type: string
              format: ipv4
              description: Test target IP address.
              example: 1.1.1.1
            utilization:
              type: integer
              description: >-
                Shows overall utilization percentage (online Enterprise Agents
                and Enterprise Clusters only).
              example: 25
              readOnly: true
    Administrative_API_ClusterMembers:
      type: array
      description: >-
        If an enterprise agent is clustered, detailed information about each
        cluster member will be shown as array entries in the clusterMembers
        field. This field is not shown for Enterprise Agents in standalone mode,
        or for Cloud Agents.
      items:
        $ref: '#/components/schemas/Administrative_API_ClusterMember'
      readOnly: true
    Administrative_API_EnterpriseAgentIpv6Policy:
      type: string
      description: IP version policy, (Enterprise Agents and Enterprise Clusters only)
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
      example: force-ipv4
    Administrative_API_InterfaceIpMapping:
      type: object
      properties:
        interfaceName:
          type: string
          description: Name of the mapping
          example: wlp4s0
          readOnly: true
        ipAddresses:
          type: array
          description: Array of ipAddress entries
          items:
            type: string
          example:
            - 73.252.207.219
            - 2601:646:300:3ae0::b977
          readOnly: true
    Administrative_API_EnterpriseAgentData:
      type: object
      properties:
        testIds:
          $ref: '#/components/schemas/Administrative_API_TestIds'
        tests:
          type: array
          description: List of tests. See `/tests` for more information.
          items:
            $ref: '#/components/schemas/Administrative_API_SimpleTest'
        clusterMembers:
          $ref: '#/components/schemas/Administrative_API_ClusterMembers'
        utilization:
          type: integer
          description: >-
            Shows overall utilization percentage (online Enterprise Agents and
            Enterprise Clusters only).
          example: 25
          readOnly: true
        accountGroups:
          type: array
          description: >-
            List of account groups. See /accounts-groups to pull a list of
            account IDs
          items:
            $ref: '#/components/schemas/Administrative_API_AccountGroup'
        ipv6Policy:
          $ref: '#/components/schemas/Administrative_API_EnterpriseAgentIpv6Policy'
        errorDetails:
          type: array
          description: >-
            If an enterprise agent or a cluster member presents at least one
            error, the errors will be shown as an array of entries in the
            errorDetails field (Enterprise Agents and Enterprise Cluster members
            only)
          items:
            $ref: '#/components/schemas/Administrative_API_ErrorDetail'
          readOnly: true
        hostname:
          type: string
          description: Fully qualified domain name of the agent (Enterprise Agents only)
          example: thousandeyes.com
          readOnly: true
        lastSeen:
          type: string
          description: UTC last seen date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        agentState:
          $ref: '#/components/schemas/Administrative_API_EnterpriseAgentState'
        keepBrowserCache:
          type: boolean
          description: Flag indicating if the agent retains cache.
          example: true
        createdDate:
          type: string
          description: UTC Agent creation date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        targetForTests:
          type: string
          format: ipv4
          description: Test target IP address.
          example: 1.1.1.1
        localResolutionPrefixes:
          type: array
          description: >-
            To perform rDNS lookups for public IP ranges, this field represents
            the public IP ranges. The range must be in CIDR notation; for
            example, 10.1.1.0/24. Maximum of 5 prefixes allowed (Enterprise
            Agents and Enterprise Agent clusters only).
          items:
            type: string
            example: 10.2.3.3/24
        interfaceIpMapping:
          type: array
          items:
            $ref: '#/components/schemas/Administrative_API_InterfaceIpMapping'
          readOnly: true
    Administrative_API_EnterpriseAgent:
      allOf:
        - $ref: '#/components/schemas/Administrative_API_AgentResponse'
        - $ref: '#/components/schemas/Administrative_API_EnterpriseAgentData'
    Administrative_API_StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Administrative_API_EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Administrative_API_PaginationLinks:
      type: object
      description: A links object containing pagination related link(s).
      properties:
        previous:
          $ref: '#/components/schemas/Administrative_API_Link'
        next:
          $ref: '#/components/schemas/Administrative_API_Link'
        self:
          $ref: '#/components/schemas/Administrative_API_Link'
  responses:
    Tests_API_204:
      description: No content
    Tests_API_400:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Tests_API_ValidationError'
          example:
            type: about:blank
            title: Request validation failed. There are invalid or missing fields
            status: 400
            detail: Your request object contains invalid fields.
            instance: /v7
            errors:
