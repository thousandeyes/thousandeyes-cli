      security:
        - Endpoint_Test_Results_API_BearerAuth: []
  /endpoint/test-results/scheduled-tests/network/filter:
    post:
      tags:
        - Network Endpoint Scheduled Test Results
      summary: Retrieve network scheduled test results from multiple tests
      description: >
        Returns network metrics, including loss, latency, and jitter, for
        multiple test IDs obtained from each endpoint agent. It allows you to
        specify a time window using search filters to retrieve metrics for
        specific round IDs within that time frame. The default order of results
