          $ref: '#/components/schemas/Alerts_API_Asn'
    Alerts_API_Asn:
      type: object
      description: Autonomous System Number (ASN) information for network outage alerts.
      properties:
        id:
          type: string
          description: ASN identifier.
          example: '13445'
        name:
          type: string
          description: Autonomous system name.
          example: Cisco Webex LLC
        type:
          type: string
          description: Resource type.
          example: asn
    Alerts_API_LegacyAlertDetail:
      type: object
