        - auto
        - sack
        - syn
      description: >-
        Probe mode used by network test, only valid when the protocol is set to
        TCP.
      default: auto
      example: auto
    Endpoint_Tests_API_EndpointHttpServerTestUrl:
      type: string
      description: >
        The test target URL. You can optionally specify the protocol (`http` or
        `https`). 


        - **Default Protocol:** If no protocol is specified, `https` is used by
        default.


        - **Port Number:** To specify a port, append it to the URL with a colon
        after the hostname or IP address (e.g., `https://example.com:443`).

            - If no port is specified in the URL, the `port` is determined by the default for protocol (HTTP: 80, HTTPS: 443).
      example: https://example.com:443
