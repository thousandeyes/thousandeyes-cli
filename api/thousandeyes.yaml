    Tests_API_TestAuthType:
      type: string
      description: HTTP authentication type.
      enum:
        - none
        - basic
        - ntlm
        - kerberos
        - oauth
      default: none
      example: none
    Tests_API_AgentInterfaces:
      type: object
      properties:
        ipAddress:
          type: string
          example: 192.1.1.0
          description: IP address of the agent interface.
        agentId:
          type: string
          description: The agent ID of the enterprise agent for the test.
          example: '2954'
    Tests_API_TestClientCertificate:
      type: string
      description: >-
        String representation (containing newline characters) of client
        certificate, the private key must be placed first, then the certificate.
      example: |
        -----BEGIN PRIVATE KEY-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END PRIVATE KEY-----
        -----BEGIN CERTIFICATE-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END CERTIFICATE-----
    Tests_API_TestCustomHeaders:
      type: object
      properties:
        root:
          type: object
          description: Use these HTTP headers for root server request.
          additionalProperties:
            type: string
        domains:
          type: object
          description: Use these HTTP headers for the specified domains.
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        all:
          type: object
          description: Use these HTTP headers for all domains.
          additionalProperties:
            type: string
      example:
        root:
          header1: value1
        domains:
          domain1.com:
            header2: value2
        all:
          header3: value3
    Tests_API_TestDesiredStatusCode:
      type: string
      description: >-
        Specify the HTTP status code value that indicates a successful response.
        The default value accepts any 2xx or 3xx status code.
      default: default
      example: '200'
    Tests_API_TestDistributedTracing:
      type: boolean
      description: >-
        Adds distributed tracing headers to API requests using B3 and W3C
        standards.
      example: false
    Tests_API_TestHttpTargetTime:
      type: integer
      minimum: 100
      maximum: 5000
      description: Target time for HTTP server completion, specified in milliseconds.
      example: 100
    Tests_API_TestHttpTimeLimit:
      type: integer
      minimum: 5
      maximum: 60
      description: HTTP time limit in seconds.
      default: 5
      example: 5
    Tests_API_TestHttpVersion:
      type: integer
      minimum: 1
      maximum: 2
      description: >-
        HTTP protocol version. Set to '2' to prefer HTTP/2, or '1' to use only
        HTTP/1.1.
      default: 2
      example: 2
    Tests_API_TestIncludeHeaders:
      type: boolean
      description: >-
        Set to `true` to capture response headers for objects loaded by the
        test.
      default: true
      example: true
    Tests_API_TestUrl:
      type: string
      description: Target for the test.
      example: www.thousandeyes.com
    Tests_API_OAuthRequestMethod:
      type: string
      enum:
        - get
        - post
      description: HTTP request method used for the OAuth request.
      example: get
    Tests_API_OAuthAuthType:
      type: string
      description: HTTP authentication type used for the OAuth request.
      enum:
        - none
        - basic
        - ntlm
      default: none
      example: none
    Tests_API_OAuth:
      type: object
      properties:
        testUrl:
          $ref: '#/components/schemas/Tests_API_TestUrl'
        requestMethod:
          $ref: '#/components/schemas/Tests_API_OAuthRequestMethod'
        postBody:
          type: string
          description: >-
            Enter the OAuth body for the HTTP POST request in this field when
            using OAuth as the authentication mechanism. No special escaping is
            required. The value is saved only when `requestMethod` is set to
            `post`.
        headers:
          type: string
          description: Request headers used for OAuth.
        authType:
          $ref: '#/components/schemas/Tests_API_OAuthAuthType'
        username:
          type: string
          description: OAuth username
        password:
          type: string
          description: OAuth password
          writeOnly: true
      description: Use this only if you want to use OAuth as the authentication mechanism.
      example:
        testUrl: https://api.thousandeyes.com/v7/status
        requestMethod: post
        postBody: 'client_id: ************'
        headers: 'Authorization: Basic ************'
        authType: none
        username: user123
        password: '*******'
    Tests_API_TestPassword:
      type: string
      description: Password for Basic/NTLM authentication.
      example: password
      writeOnly: true
    Tests_API_TestSslVersion:
      type: string
      description: Reflects the verbose SSL protocol version used by a test.
      readOnly: true
      example: Auto
    Tests_API_TestSslVersionId:
      type: string
      description: |
        SSL version options:

        * Use '0' for automatic selection.
        * Use '3' for SSLv3.
        * Use '4' for TLS v1.0.
        * Use '5' for TLS v1.1.
        * Use '6' for TLS v1.2.
        * Use '7' for TLS v1.3.
      enum:
        - '0'
        - '3'
        - '4'
        - '5'
        - '6'
        - '7'
      default: '0'
      example: '0'
    Tests_API_TestUseNtlm:
      type: boolean
      description: >-
        Set to true to use NTLM, false to use Basic Authentication. Requires
        username and password to be set.
      example: false
    Tests_API_TestUserAgent:
      type: string
      description: User-agent string to be provided during the test.
      example: curl
    Tests_API_TestUsername:
      type: string
      description: Username for Basic/NTLM authentication.
      example: username
    Tests_API_TestVerifyCertificate:
      type: boolean
      description: >-
        Ignore or acknowledge certificate errors. Set to false to ignore
        certificate errors.
      default: false
      example: false
    Tests_API_TestAllowUnsafeLegacyRenegotiation:
      type: boolean
      description: >-
        Allows TLS renegotiation with servers not supporting RFC 5746. Default
        Set to true to allow unsafe legacy renegotiation.
      default: true
      example: true
    Tests_API_TestFollowRedirects:
      type: boolean
      description: >-
        To disable following HTTP/301 or HTTP/302 redirect directives, set this
        parameter to `false`.
      default: true
      example: true
    Tests_API_TestOverrideAgentProxy:
      type: boolean
      description: >-
        Flag indicating if a proxy other than the default should be used. To
        override the default proxy for agents, set to `true` and specify a value
        for `overrideProxyId`.
      default: false
      example: false
    Tests_API_TestOverrideProxyId:
      type: string
      description: ID of the proxy to be used if the default proxy is overridden.
      example: '281474976710706'
    Tests_API_TestCollectProxyNetworkData:
      type: boolean
      description: Indicates whether network data to the proxy should be collected.
      default: false
      example: false
    Tests_API_HttpServerBaseProperties:
      type: object
      properties:
        authType:
          $ref: '#/components/schemas/Tests_API_TestAuthType'
        agentInterfaces:
          $ref: '#/components/schemas/Tests_API_AgentInterfaces'
        bandwidthMeasurements:
          $ref: '#/components/schemas/Tests_API_TestBandwidthMeasurements'
        clientCertificate:
          $ref: '#/components/schemas/Tests_API_TestClientCertificate'
        contentRegex:
