    Integrations_API_OperationStatus:
      type: string
      description: >-
        The connectivity status of the operation to its target endpoint.
        Indicates whether the operation can successfully connect and communicate
        with the target URL. Values: 'pending' (initial state, not yet tested),
        'connected' (successfully connected), 'failing' (connection or execution
        issues), 'unverified' (not yet verified/tested).
      enum:
        - pending
        - connected
        - failing
        - unverified
    Integrations_API_OperationType:
      type: string
      enum:
        - webhook
    Integrations_API_WebhookOperation:
      required:
