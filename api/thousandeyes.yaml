        self:
          $ref: '#/components/schemas/Usage_API_Link'
    Templates_API_Template:
      title: Template
      required:
        - name
      description: The template to create or update.
      type: object
      properties:
        name:
          type: string
          description: The name of the template.
          example: My Template
        description:
          type: string
          description: Text that describes the template.
          example: A description of My Template
        icon:
          $ref: '#/components/schemas/Templates_API_TemplateIcon'
        isBuiltIn:
          type: boolean
          description: >-
            Indicates whether the template is a built-in template. This field is
            read-only for normal users.
          example: false
        schemaVersion:
          $ref: '#/components/schemas/Templates_API_SchemaVersionConfig'
        certificationLevel:
          $ref: '#/components/schemas/Templates_API_CertificationLevel'
          description: >
            The certification level of the Template. Normal users may only
            create `user` templates.
          example: user
        userInputs:
          description: >
            A map of <key, UserInput>. User Inputs are values that the user must
            fill in order for

            the Template to deploy. User Inputs are like variables that can be
            used for dynamically setting just

            about any field in the Template, including fields for Tests, Labels,
            Dashboards, and most other template assets.

            User Inputs are referenced using Handlebars template substitution
            notation. For example:


            `"testName": "{{userInputs.targetDomain}} - HTTP"`


            The [Handlebars
            Syntax](https://handlebarsjs.com/guide/builtin-helpers.html) also
            supports basic logic operations

            and iterators that allow creating powerful and flexible templates.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_UserInput'
          example:
            targetDomain:
              name: Target Domain
              description: >-
                Name of target domain that will be used for configuring tests in
                this template.
              type: string
            region:
              name: Cloud Region
              description: The available cloud regions to target.
              type: string
              allowedValues:
                - name: West
                  value: us-west-1
                - name: East
                  value: us-east-2
            agents:
              name: Source Agents
              description: The agents that will be used by the tests in this template.
              type: agents
        groupings:
          uniqueItems: true
          type: array
          description: >-
            An ordered list of groupings that organize template objects, such as
            user inputs or tests.
          example:
            - name: personalize
              title: Personalize your dashboard
              description: Allow you to personalize your dashboard
              type: user-input
              items:
                - dashboardTitle
                - dashboardDescription
                - dashboardFilterTitle
            - name: dns-test-group
              title: DNS Tests
              description: Grouped by DNS test type
              type: test
              items:
                - dnsTest-microsoft365
                - dnsTest-sharepoint
                - dnsTest-microsoftlogin
                - dnsTest-onedrive
                - dnsTest-outlook
          items:
            $ref: '#/components/schemas/Templates_API_TemplateGrouping'
        labels:
          type: object
          description: >
            A map of <name, Label> objects. These are ThousandEyes Labels that
            will be created when the template is deployed.


            **Deprecation notice:** Labels are based on the V6 API, which is
            deprecated and has no V7 equivalent.

            Use `tags` instead, which provide enhanced functionality with full
            V7 API support.

            Do not use `labels` and `tags` together in the same template; prefer
            `tags` for all new templates.
          deprecated: true
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_LabelConfigurationTemplate'
          example:
            myLabel:
              name: My Label
              tests:
                - testId: 123
          externalDocs:
            url: https://developer.cisco.com/docs/thousandeyes/v6/update-a-label
        tests:
          type: object
          description: >
            A map of <name, TestConfiguration> objects. These are the
            ThousandEyes CEA/Synthetic tests that will be created when the
            template is deployed.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_TestConfigurationTemplate'
          example:
            httpServerTest:
              testName: '{{name}} - HTTP Server'
              type: http-server
              tagIds:
                - '{{tags.webHealthDashTag.id}}'
                - '{{tags.templateTag.id}}'
              interval: '{{userInputs.interval}}'
              url: https://{{userInputs.domain}}
              agents: '{{userInputs.agents}}'
            networkTest:
              testName: '{{name}} - Network'
              type: agent-to-server
              server: '{{userInputs.domain}}'
              protocol: TCP
              port: '{{userInputs.port}}'
              tagIds:
                - '{{tags.webHealthDashTag.id}}'
                - '{{tags.templateTag.id}}'
              interval: '{{userInputs.interval}}'
              url: https://{{userInputs.domain}}
              agents: '{{userInputs.agents}}'
            dnsTest:
              testName: '{{name}} - DNS'
              type: dns-server
              domain: '{{userInputs.domain}} A'
              tagIds:
                - '{{tags.webHealthDashTag.id}}'
                - '{{tags.templateTag.id}}'
              interval: '{{userInputs.interval}}'
              dnsServers: '{{userInputs.dnsServers}}'
              agents: '{{userInputs.agents}}'
        endpointTests:
          type: object
          description: >
            A map of <name, EndpointTestConfiguration> objects. These are the
            Endpoint tests that will be created when the template is deployed.
            Field values support Handlebars template substitution.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_EndpointTestConfigTemplate'
          example:
            endpointTests:
              scheduledHttpTest:
                name: Scheduled HTTP Test
                testType: Http
                testCategory: SCHEDULED_TEST
                genericConfig:
                  interval: 3600
                networkConfig:
                  flagPing: true
                httpConfig:
                  url: https://{{userInputs.tenantName}}-my.sharepoint.com
                machineConfig:
                  monitoringSettingsType: ANY_AGENT
                  agentIds: '{{userInputs.endpointAgents}}'
        tags:
          type: object
          description: >
            A map of <name, TagConfiguration> objects. These are ThousandEyes
            Tags that will be created when the template is deployed.

            Tags use a key/value model and can be assigned to tests, endpoint
            tests, connected devices tests, and dashboards.

            Tag IDs can be referenced in other template assets using Handlebars
            notation,

            e.g., `"tagIds": ["{{tags.myTag.id}}"]`.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_TagConfigurationTemplate'
          example:
            webHealthDashTag:
              key: Health Overview Dashboard
              value: Health Overview Dashboard
              objectType: test
              accessType: all
            templateTag:
              key: '{{name}}'
              value: '{{name}}'
              objectType: test
              accessType: all
        alertRules:
          type: object
          description: >
            A map of <key, AlertRuleConfigurationTemplate> objects. These are
            the set of Alert Rules that will be created when the template is
            deployed.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_AlertRuleConfigurationTemplate'
            description: >
              An Alert Rule object. Values can be templated with Handlebars
              notation. As such, the Alert Rule object is defined here as

              a set of key/value pairs. See external docs for schema details.
          example:
            httpAlert:
              alertType: HTTP Server
              ruleName: '{{userInputs.tenantName}} - Alert Rule'
              expression: ((totalTime >= 500 ms) && (responseTime >= 500 ms))
              roundsViolatingRequired: 1
              roundsViolatingOutOf: 1
              testIds:
                - '{{tests.pageLoadTest.testId}}'
        dashboards:
          description: >
            A map of <key, DashboardConfiguration> objects. These are the set of
            dashboards that will be created when the template is deployed.
            Dashboard fields support Handlebars notation.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_DashboardConfigurationTemplate'
          example:
            myDashboard:
              title: My Dashboard
              widgets:
                - filters:
                    Test Labels: '[{{labels.templateLabel.groupId}}]'
                  type: 'Bar Chart: Stacked'
                  title: 'A Bar Chart: Stacked widget'
                  metricGroup: Web - HTTP Server
                  measure:
                    type: Median
                  metric: Response Time
                  axisGroupBy: Continents
                  dataSource: Cloud & Enterprise Agents
        dashboardFilters:
          type: object
          description: >-
            A map of <key, DashboardFilter> objects. These will be the dashboard
            filters created when the template is deployed.
          additionalProperties:
            $ref: >-
              #/components/schemas/Templates_API_DashboardFilterConfigurationTemplate
          example:
            netHealthDashboardFilter:
              name: '{{userInputs.dashboardFilterTitle}}'
              context:
                - dataSourceId: VIRTUAL_AGENT
                  filters:
                    - filterId: TEST_LABEL
                      metricIds:
                        - NET_LOSS
                        - NET_LATENCY
                        - NET_JITTER
                      values:
                        - '{{labels.testLabel.groupId}}'
        deploymentStrategy:
          description: >
            A map of <assetKey, DeploymentStrategy> values. The
            `deploymentStrategy` field defines how the system behaves when an
            asset (test, label, tag, dashboard) defined in the template already
            exists.

            The `assetKey` identifies the asset that the deployment strategy
            will apply to.

            For tests, the system uses the test type and name to determine if a
            test already exists. For example, if a template contains an
            http-server test named `Test123` and an http-server test with the
            same name already exists, the system assumes that this test already
            exists. If the test had a different type (for example, page-load),
            then the system would not consider the test to already exist because
            the types are different.

            For Labels and Dashboards, the system uses only the name. For Tags,
            the unique key is determined by the combination of `key`, `value`,
            and `objectType`.

            Alert Rules do not currently support `deploymentStrategy`.

            Below are the possible deployment strategies and their behaviors:
              * `create` - The system will always attempt to create the asset. If an asset of the same name and type already exists, the system will generate an error. This behavior ensures that each asset created from a template is unique. This is the default behavior.
              * `update` - If an asset of the same type and name already exists, the existing asset is used instead of creating a new asset. If the configuration of the asset in the template is different from the existing one, the latest configuration is applied.
              * `ignore` - If an asset of the same type and name already exists, the existing asset is used instead of creating a new asset. If the configuration of the asset in the template is different from the existing one, the configuration of the existing asset is used and the configuration in the template is ignored.
            The `update` and `ignore` strategies essentially allow assets to be
            shared across templates. For example, the built-in "Custom Web
            Page", "Custom Web Server", and "Custom Device" templates all
            contain a Dashboard asset called "Health Overview". It's
            `deploymentStrategy` is set to `ignore`, which means that the first
            deployment of a template such as the "Custom Web Page" template
            creates the "Health Overview" dashboard. Subsequent deployments of
            the "Custom Web Page" template do not attempt to recreate the
            "Health Overview" dashboard. Instead, the existing dashboard is
            reused.

            Note: Assets that were not created using a template are not included
            when the system searches for existing assets; they are not used with
            `update` or `ignore`.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_DeploymentStrategy'
          example:
            testVoiceLabel: update
            testVideoLabel: update
            testLabel: update
            webHealthDashTag: update
            templateTag: update
            dnsTest: ignore
            webexDashboard: ignore
            serverTest: create
        resourceInclusion:
          description: >
            A map of `<assetKey, ResourceInclusion>` pairs. The
            `resourceInclusion` field specifies whether an asset (such as a
            test, endpoint test, label, tag, dashboard, or alert rule) should be
            included in a deployment.

            The `assetKey` identifies the specific asset to which the inclusion
            rule applies.

            Possible resource inclusion values for each asset:
              * `included` - The system will always create the asset.
              * `skipped` - The system will not create the asset.
            If an `assetKey` is not present in the `resourceInclusion` map, it
            defaults to `included`.

            **Note**: The deployment payload can override the
            `resourceInclusion` value defined in a template.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_ResourceInclusion'
          example:
            testLabel: skipped
            dnsTest: skipped
            webexDashboard: included
        modules:
          uniqueItems: true
          type: array
          description: >-
            ThousandEyes modules this template belongs to. Regular users can
            only set this to `default`.
          example:
            - default
          items:
            $ref: '#/components/schemas/Templates_API_TemplateModule'
    Templates_API_UserInput:
      description: >
        A user input is a value that the user must provide when deploying a
        template.

        User Input values are provided by the user in the UI under the **Global
        Settings** section.

        When deploying via the API, User Inputs values are specified in the
        payload using the `userInputValues` field.
      required:
        - name
        - type
      type: object
      properties:
        name:
          type: string
          description: The name of the user input field.
          example: target
        type:
          $ref: '#/components/schemas/Templates_API_UserInputType'
        title:
          type: string
          description: The title of the user input field; may be used by UI.
          example: Test Target
        description:
          type: string
          description: Description of the user input field; used by UI.
          example: The target of the Tests
        defaultValue:
          $ref: '#/components/schemas/Templates_API_UserInputValue'
          description: Default value of user input field.
          example: https://google.com
        allowedValues:
          type: array
          description: >-
            Allowed values for the User Input. An array of name/value pairs that
            specify specific values that can be used with the User Input. In the
            UI, user inputs with `allowedValues` will be displayed as a drop
            down selector; the `name` will be used as the display text.
          items:
            $ref: '#/components/schemas/Templates_API_UserInputAllowedValue'
    Templates_API_UserInputAllowedValue:
      type: object
      description: The list of values that the user is allowed to use as inputs.
      properties:
        value:
          $ref: '#/components/schemas/Templates_API_UserInputValue'
        name:
          type: string
          description: >-
            The name of the value, which will be used for display in the UI and
            API messages.
          example: West
    Templates_API_UserInputValue:
      description: >-
        A user input value. The type of object depends on the user input `type`
        field.
      anyOf:
        - type: string
        - type: number
        - type: object
        - type: array
          items:
            type: string
        - type: array
          items:
            type: number
        - type: array
          items:
            type: object
      example: us-west-1
    Templates_API_UserInputType:
      type: string
      description: >
        The type of user input. This defines the value the user can provide as
        well as the UI component displayed when redering User Inputs.

        The type is used to validate the user provided value when deploying a
        template.

        - `string`: User input expects a string value; UI will be rendered as a
        text box.

        - `number`: User input expects a numeric value; UI will be rendered as a
        text box.

        - `boolean`: User input expects a boolean value; UI will be rendered as
        a check box.

        - `string[]`: User input expects an array of string values; UI will be
        rendered as drop down.

        - `number[]`: User input expects an array of numeric values; UI will be
        rendered as drop down.

        - `boolean[]`: User input expects an array of boolean values; UI will be
        rendered as drop down.

        - `agents`: User input expects an array of `agentId`s; UI will be
        rendered as an Agent Selector (CEA) drop down.

        - `bgpPrefix`: User input expects a BGP prefix value; UI will be
        rendered as a text box with validation for correct BGP prefix format.

        - `tests`: User input expects an array of `testId`s; UI will be rendered
        as a Test Selector (CEA) drop down.

        - `any`: For any other user inputs that don't belong to the types listed
        above. These will be determined based on usage in template.
      example: string
      enum:
        - string
        - number
        - boolean
        - string[]
        - number[]
        - boolean[]
        - agents
        - bgpPrefix
        - tests
        - any
    Templates_API_TemplateGrouping:
      description: >-
        Represents a grouping of different template resources for display
        purposes in the UI. This grouping does not affect template deployment.
      example:
        name: web-page-tests
        title: Web Page Tests
        description: Used for testing web pages
        type: test
        items:
          - dnsTest
          - pageLoadTest
      properties:
        name:
          description: The name of the grouping.
          example: dashboard-inputs
          type: string
        title:
          description: The title of the grouping.
          example: Dashboard Inputs
          type: string
        type:
          $ref: '#/components/schemas/Templates_API_TemplateGroupingType'
        description:
          description: Description of the grouping.
          example: The target of the tests
          type: string
        items:
          uniqueItems: true
          description: >-
            A list of items within the group, corresponding to the keys in the
            `userInputs` or `tests` fields of the template. Each key must be
            unique within its respective group (`user-input` or `test`).
          example:
            - dnsTest
            - pageLoadTest
          items:
            description: The unique key for an item in this grouping.
            example:
              - dnsTest
              - pageLoadTest
            type: string
          type: array
      required:
        - name
        - title
        - type
      type: object
    Templates_API_TemplateGroupingType:
      type: string
      description: >-
        The type of resources included in the grouping. Supported types are
        `Tests` and `User Inputs`. Grouped tests are displayed under a shared
        `title` in the template test list view, while grouped user inputs are
        organized into sections in the Global Inputs area, using the provided
        `title` and `description`.
      enum:
        - test
        - user-input
      example: user-input
    Templates_API_DeploymentStrategy:
      type: string
      description: The deployment strategy to apply to the asset.
      example:
        pageLoadTest: update
        httpAlert: ignore
      enum:
        - create
        - update
        - ignore
    Templates_API_ResourceInclusion:
      type: string
      description: The deployment inclusion configuration for the asset.
      example: included
      enum:
        - skipped
        - included
    Templates_API_TemplateResponse:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TemplateResponseBase'
        - $ref: '#/components/schemas/Templates_API_Template'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Templates_API_SelfLinks'
    Templates_API_TemplateResponseBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the template.
          example: fcbb89a7-61cf-4616-9c4f-828fa3cb4684
        dateCreated:
          type: string
          format: date-time
          description: The date and time the template was created.
          example: '2023-07-17T22:00:54Z'
    Templates_API_TemplatesResponse:
      allOf:
        - $ref: '#/components/schemas/Templates_API_Templates'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Templates_API_SelfLinks'
    Templates_API_Templates:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/Templates_API_TemplateResponse'
    Templates_API_DeployTemplate:
      type: object
      properties:
        userInputValues:
          type: object
          description: >-
            Specifies the values to be used for all `userInputs` defined in the
            template. User must provide a value for each User Input defined in
            the template being deployed.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_UserInputValue'
        name:
          type: string
          description: >-
            The name of the deployed template. This value will be used anywhere
            the `{{name}}` expression is used in the template being deployed.
        tags:
          type: object
          description: >
            Optional overrides for tag configurations defined in the template.
            Each key corresponds to a tag asset key

            defined in the template's `tags` map. Overrides are partial: you may
            set any combination of tag configuration fields; unspecified fields
            remain as defined in the template.
          additionalProperties:
            $ref: '#/components/schemas/Templates_API_TagConfigurationOverride'
      example:
        userInputValues:
          interval: 120
          target: https://microsoft.com
          agents:
            - agentId: 11
          domain: microsoft.com
        name: Microsoft Suite
        tags:
          webHealthDashTag:
            value: Production Health Dashboard
          templateTag:
            color: '#00FF00'
    Templates_API_CertificationLevel:
      type: string
      description: >
        The certification level of the Template. The accepted values are:

        - `user`: User created template; not verified by ThousandEyes

        - `thousandeyes`: Created by ThousandEyes

        - `partner`: Created by ThousandEyes and approved by Partner/Vendor

        - `certified`: Created and certified by ThousandEyes using included best
        practice guide (see `documentation` link).
      example: user
      enum:
        - user
        - thousandeyes
        - partner
        - certified
    Templates_API_TemplateModule:
      type: string
      description: >-
        A ThousandEyes module this template belongs to. Regular users can only
        set to `default`.
      example: default
      enum:
        - default
    Templates_API_TestsSchemaVersion:
      type: string
      description: Schema version for test resources.
      default: v6
      example: v7
      enum:
        - v6
        - v7
    Templates_API_AlertRulesSchemaVersion:
      type: string
      description: Schema version for alert rule resources.
      default: v6
      example: v7
      enum:
        - v6
        - v7
    Templates_API_SchemaVersionConfig:
      title: SchemaVersionConfig
      description: >
        Configuration for resource schema versions. Specifies which schema
        version (`v6` or `v7`)

        to use for each resource type in a template. If a field is omitted, the
        default version is used.

        Defaults: `tests`=v6, `alertRules`=v6. Other resources default
        internally (`labels`=v6; 

        `tags`, `dashboards`, `endpointTests`, `connectedDevicesTests`=v7).
      type: object
      properties:
        tests:
          $ref: '#/components/schemas/Templates_API_TestsSchemaVersion'
        alertRules:
          $ref: '#/components/schemas/Templates_API_AlertRulesSchemaVersion'
    Templates_API_TemplateIcon:
      type: string
      description: >
        Icon that will be used when displaying the template in UI. If none
        supplied, will display `thousandeyes` icon. Supported values include:

        - `api`

        - `custom`

        - `server`

        - `user-template`

        - `thousandeyes`
      example: server
    Templates_API_SharingSettings:
      required:
        - scope
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/Templates_API_SharingScope'
      description: The Template to change the sharing settings for.
    Templates_API_SharingScope:
      type: string
      description: >
        The scope of the template sharing. The accepted values are:

        - `default`: The template is visible only within the account group that
        owns it.

        - `organization`: The template is visible by all the users within the
        organization that owns it.
      example: organization
      enum:
        - default
        - organization
    Templates_API_SharingSettingsResponse:
      allOf:
        - $ref: '#/components/schemas/Templates_API_SharingSettings'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/Templates_API_SharingSettingsLinks'
    Templates_API_SharingSettingsLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/Templates_API_SharingSettingsLink'
        template:
          $ref: '#/components/schemas/Templates_API_TemplateLink'
      readOnly: true
    Templates_API_TemplateLink:
      allOf:
        - description: A reference to the template.
          example:
            href: >-
              https://api.thousandeyes.com/v7/templates/fcbb89a7-61cf-4616-9c4f-828fa3cb4684
        - $ref: '#/components/schemas/Templates_API_Link'
    Templates_API_SharingSettingsLink:
      allOf:
        - description: A reference to the sharing settings.
          example:
            href: >-
              https://api.thousandeyes.com/v7/templates/fcbb89a7-61cf-4616-9c4f-828fa3cb4684/sharing-settings
        - $ref: '#/components/schemas/Templates_API_Link'
    Templates_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Templates_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Templates_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Templates_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Templates_API_ValidationErrorItem'
    Templates_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Templates_API_HandlebarsExpression:
      description: >
        A valid Handlebars expression. Can reference user inputs, such as
        `{{name}}`, or fields of other assets defined in the template.

        * `{{userInputs.<key>}}` - resolves to the user provided value the
        `userInput` identified its key.

        * `{{name}}` - resolves to the name of the deployed template.

        * `{{<asset key>.<field>}}` - resolves to the value of a field of
        another asset defined in the template identified by the asset key and
        field name. 

        For example, set the `testIds` field of an `alertRule` by referencing
        the `testId` field of a `tests` asset.
          **Note**: Due to dependencies, assets can only reference fields of other assets that appear earlier in the hierarchy below (e.g., labels cannot reference other assets, tests can reference labels and tags, etc.)
          - Labels
          - Tags
          - Tests (can reference `{{labels.*.groupId}}` and `{{tags.*.id}}`)
          - Endpoint Tests (can reference `{{labels.*.groupId}}` and `{{tags.*.id}}`)
          - Connected Devices Tests (can reference `{{labels.*.groupId}}` and `{{tags.*.id}}`)
          - Alert Rules
          - Dashboard Filters
          - Dashboards

          Tags are deployed in two phases. Every field on the tag configuration except `assignments` (`key`, `value`, `objectType`, `accessType`, and optional `color`) is applied before dependent assets so that tag IDs are available for Handlebars references (for example, `{{tags.myTag.id}}`). The `assignments` field is applied after those assets exist (for example, after the tests you reference have been created), so it can resolve deployed IDs such as `{{tests.myTest.testId}}`. Both phases run automatically during deployment.
      type: string
      pattern: .*{{.*}}.*
      example: '{{userInputs.testName}}'
    Templates_API_LabelTypeTemplate:
      description: |
        The type of label. Acceptable values are:
        - `tests` - A Label that can be assigned to CEA/Synthetic tests
        - `endpoint_tests` - A Label that can be assigned to Endpoint tests
      type: string
      example: tests
      enum:
        - tests
        - endpoint_tests
    Templates_API_StringTemplate:
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TestIdTemplate:
      description: Test identified by the test's ID.
      type: object
      properties:
        testId:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: ID of the test.
    Templates_API_LabelConfigurationTemplate:
      type: object
      description: >
        A label object that is compatible with [ThousandEyes V6
        API](https://developer.cisco.com/docs/thousandeyes/v6/create-a-label/#request).

        All field values can be templated with Handlebars expression unless
        otherwise noted.
      required:
        - name
      properties:
        name:
          description: The name of the label.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        type:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_LabelTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        tests:
          description: >-
            Array of CEA/Synthetic testId objects, if the type specified is
            `tests`.
          title: Label_tests
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Templates_API_TestIdTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        endpointTests:
          description: >-
            Array of Endpoint testId objects, if the type specified is
            `endpoint_tests`.
          title: Label_endpointTests
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Templates_API_TestIdTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      enum:
        - agent-to-server
        - agent-to-agent
        - dns-server
        - dns-trace
        - http-server
        - page-load
        - web-transactions
        - sip-server
        - voice
        - bgp
      example: http-server
    Templates_API_NumberTemplate:
      anyOf:
        - type: number
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_AgentAssignmentTemplate:
      type: object
      properties:
        agentId:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
    Templates_API_LabelAssignmentTemplate:
      type: object
      description: Label to assign to a test, identified by the ID (`groupId`).
      properties:
        groupId:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
    Templates_API_TagIdTemplate:
      description: >-
        A tag ID, typically a Handlebars reference to a tag defined in the
        template.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
      example: '{{tags.myTag.id}}'
    Templates_API_TagIdListTemplate:
      description: A list of tag IDs identifying tags to be assigned.
      type: array
      items:
        $ref: '#/components/schemas/Templates_API_TagIdTemplate'
    Templates_API_TestBaseTemplate:
      type: object
      required:
        - testName
        - type
        - agents
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_TestTypeTemplate'
        testName:
          description: The name of the test, must be unique.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        agents:
          description: The agents to assign to the test identified by `agentId`.
          title: Agents
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Templates_API_AgentAssignmentTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        groups:
          description: >
            The Labels to assign to the test.


            **Deprecation notice:** Labels (`groups`) are based on the V6 API,
            which is deprecated.

            Use `tagIds` instead for V7 API support. Do not use `groups` and
            `tagIds` together on the same test.
          deprecated: true
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Templates_API_LabelAssignmentTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        tagIds:
          description: >
            The Tags to assign to the test, identified by tag ID. Typically set
            using

            Handlebars references to tags defined in the template. Tags are the
            recommended

            replacement for labels (`groups`) and provide full V7 API support.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagIdListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example:
            - '{{tags.webHealthDashTag.id}}'
            - '{{tags.templateTag.id}}'
        description:
          description: Description of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Templates_API_PortTemplate:
      description: The network port.
      anyOf:
        - type: integer
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_BooleanNumber:
      type: integer
      enum:
        - 0
        - 1
      example: 0
    Templates_API_NumPathTracesTemplate:
      description: >-
        Number of path trace probes to run. Defaults to 3, with a range of 3 to
        10.
      type: integer
      example: 3
      minimum: 3
      maximum: 10
      default: 3
    Templates_API_PathTraceModeTemplate:
      description: >-
        The path trace mode. Choose `inSession` to perform the path trace within
        a TCP session. Defaults to `classic` for network path discovery.
      type: string
      default: classic
      example: classic
      enum:
        - classic
        - inSession
    Templates_API_ProbeModeTemplate:
      description: >-
        The probe mode used by the end-to-end Network test. Only valid if the
        protocol is set to `TCP`. Defaults to `AUTO`.
      type: string
      default: AUTO
      example: AUTO
      enum:
        - AUTO
        - SACK
        - SYN
    Templates_API_TransportProtocolTemplate:
      description: The network transport protocol to use for the test.
      type: string
      example: TCP
      enum:
        - TCP
        - UDP
    Templates_API_NetworkTestBaseTemplate:
      type: object
      properties:
        interval:
          description: How often the network test will run, in seconds.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TestInterval'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        port:
          $ref: '#/components/schemas/Templates_API_PortTemplate'
        bgpMeasurements:
          description: Enable/disable BGP measurements.
          title: BgpMeasurements
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        bandwidthMeasurements:
          description: Enable/disable bandwidth measurements.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        mtuMeasurements:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        numPathTraces:
          description: >-
            Number of path trace probes to run. Defaults to 3, with a range of 3
            to 10.
          title: NumPathTraces
          anyOf:
            - $ref: '#/components/schemas/Templates_API_NumPathTracesTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        pathTraceMode:
          description: >-
            The path trace mode. Choose `inSession` to perform the path trace
            within a TCP session. Defaults to `classic` for network path
            discovery.
          title: PathTraceMode
          anyOf:
            - $ref: '#/components/schemas/Templates_API_PathTraceModeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        probeMode:
          description: >-
            The probe mode used by the end-to-end Network test. Only valid if
            the protocol is set to `TCP`. Defaults to `AUTO`.
          title: ProbeMode
          anyOf:
            - $ref: '#/components/schemas/Templates_API_ProbeModeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        protocol:
          description: The network transport protocol that will be used. Defaults to `TCP`.
          title: TransportProtocol
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TransportProtocolTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_AgentToServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: agent-to-server
      default: agent-to-server
    Templates_API_TargetServerTemplate:
      description: Target host name or IP address. Example "app.thousandeyes.com".
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_AgentToServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - server
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_AgentToServerTestTypeTemplate'
            server:
              $ref: '#/components/schemas/Templates_API_TargetServerTemplate'
            continuousMode:
              anyOf:
                - $ref: '#/components/schemas/Templates_API_BooleanNumber'
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
            fixedPacketRate:
              anyOf:
                - $ref: '#/components/schemas/Templates_API_BooleanNumber'
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_HttpVersionTemplate:
      description: The HTTP Version; 2 for default (prefer HTTP/2), 1 for HTTP/1.1 only.
      type: integer
      default: 2
      example: 2
      enum:
        - 1
        - 2
    Templates_API_AuthTypeTestTemplate:
      description: Authentication type to use when establishing connection.
      type: string
      enum:
        - NONE
        - BASIC
        - NTLM
        - KERBEROS
      default: NONE
      example: NONE
    Templates_API_CustomHeadersTemplate:
      description: Custom headers to use in HTTP request.
      type: object
      properties:
        all:
          type: object
          additionalProperties:
            type: string
        domains:
          type: object
          additionalProperties:
            type: string
        root:
          type: object
          additionalProperties:
            type: string
    Templates_API_SslVersionIdTemplate:
      description: >-
        The SSL Version; `0` for auto, `3` for SSLv3, `4` for TLS v1.0, `5` for
        TLS v1.1, `6` for TLS v1.2.
      type: integer
      default: 0
      example: 0
      enum:
        - 0
        - 3
        - 4
        - 5
        - 6
        - 7
    Templates_API_HttpServerTestBaseTemplate:
      type: object
      properties:
        networkMeasurements:
          description: |
            `1` to enable network measurements, `0` to disable.
          title: NetworkMeasurements
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        desiredStatusCode:
          description: Expected HTTP status response code.
          title: DesiredStatusCode
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        followRedirects:
          description: Whether or not transaction test should follow redirects.
          title: FollowRedirects
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        httpTargetTime:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          description: Target time for HTTP server completion; specified in milliseconds.
          minimum: 100
          maximum: 5000
        httpTimeLimit:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
        httpVersion:
          description: HTTP Version; 2 for default (prefer HTTP/2), 1 for HTTP/1.1 only.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_HttpVersionTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        authType:
          description: The Authentication type.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_AuthTypeTestTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        username:
          description: The username to be used for Basic/NTLM authentication.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        password:
          description: The password to be used for Basic/NTLM authentication.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        useNtlm:
          description: Whether test should use NTLM during auth.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        userAgent:
          description: The user-agent string to be provided during the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        customHeaders:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_CustomHeadersTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        verifyCertificate:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        clientCertificate:
          description: >-
            The string representation (containing newline characters) of client
            certificate, if used.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        sslVersionId:
          description: >-
            The SSL Version; `0` for auto, `3` for SSLv3, `4` for TLS v1.0, `5`
            for TLS v1.1, `6` for TLS v1.2.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_SslVersionIdTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_HttpServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: http-server
      default: http-server
    Templates_API_HttpServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_HttpServerTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_HttpServerTestTypeTemplate'
            downloadLimit:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: >-
                Specify maximum number of bytes to download from the target
                object.
            dnsOverride:
              $ref: '#/components/schemas/Templates_API_StringTemplate'
              description: IP address to use for DNS override.
            postBody:
              $ref: '#/components/schemas/Templates_API_StringTemplate'
              description: POST body to be sent with the request.
    Templates_API_PageLoadStrategyTemplate:
      type: string
      default: normal
      example: normal
      enum:
        - none
        - eager
        - normal
    Templates_API_BrowserTestBaseTemplate:
      type: object
      properties:
        url:
          description: The URL that the test will target.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        blockDomains:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        allowMicAndCamera:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        allowGeolocation:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        pageLoadingStrategy:
          description: >
            The page loading strategy the browser should use when loading the
            target webpage.

            - `normal`: Wait for the entire page to load, meaning that HTML
            content and all resources have been downloaded and parsed before
            moving to the next action in the transaction test script. 

            - `eager`: Wait for the `DOMContentLoaded` event, meaning that HTML
            content is downloaded and parsed, and the document readiness state
            is “interactive” before moving to the next action in the test
            script. 

            - `none`: Wait only for HTML content to download. Once the HTML is
            downloaded, the test proceeds to the next action in the transaction
            test script. (Default is `normal`).
          anyOf:
            - $ref: '#/components/schemas/Templates_API_PageLoadStrategyTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        subinterval:
          description: >-
            Subinterval for round-robin testing (in seconds). Must be less than
            or equal to interval and must evenly divide interval. Defaults to
            null, which disables round-robin.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_PageLoadTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: page-load
      default: page-load
    Templates_API_PageLoadTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - interval
        - url
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_PageLoadTestTypeTemplate'
        httpInterval:
          description: How often the HTTP test will run, in seconds.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TestInterval'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        pageLoadTargetTime:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
          description: >-
            Target time for page load completion, in seconds. Cannot exceed the
            `pageLoadTimeLimit` value.
          minimum: 1
          maximum: 60
          default: 6
          example: 10
        pageLoadTimeLimit:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
          description: >-
            Page load timeout, in seconds. Must be greater than `httpTimeLimit`.
            Defaults to 10.
          example: 10
          default: 10
    Templates_API_PageLoadTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_HttpServerTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_BrowserTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_PageLoadTestBaseTemplate'
    Templates_API_AgentToAgentTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: agent-to-agent
      default: agent-to-agent
    Templates_API_AgentToAgentTestDirectionTemplate:
      description: >-
        Direction of the test (affects how results are shown). Defaults to
        `TO_TARGET`.
      type: string
      default: TO_TARGET
      example: TO_TARGET
      enum:
        - TO_TARGET
        - FROM_TARGET
        - BIDIRECTIONAL
    Templates_API_AgentToAgentTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - targetAgentId
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_AgentToAgentTestTypeTemplate'
            direction:
              anyOf:
                - $ref: >-
                    #/components/schemas/Templates_API_AgentToAgentTestDirectionTemplate
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
            dscpId:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
            targetAgentId:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: ID of the target agent for the test.
            throughputMeasurements:
              anyOf:
                - $ref: '#/components/schemas/Templates_API_BooleanNumber'
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
            throughputDuration:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              minimum: 5000
              maximum: 30000
              default: 10000
              example: 10000
            throughputRate:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: Throughput rate; For UDP only.
              minimum: 1
              maximum: 1000
              example: 10
    Templates_API_VoiceTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: voice
      default: voice
    Templates_API_VoiceIntervalTemplate:
      description: Voice test interval in seconds.
      type: integer
      enum:
        - 300
        - 600
        - 900
        - 1800
        - 3600
      example: 300
    Templates_API_VoiceTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - targetAgentId
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_VoiceTestTypeTemplate'
            interval:
              description: How often the Voice test will run, in seconds.
              anyOf:
                - $ref: '#/components/schemas/Templates_API_VoiceIntervalTemplate'
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
            dscpId:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: The DSCP value.
              default: 46
            dscp:
              $ref: '#/components/schemas/Templates_API_StringTemplate'
              description: The DSCP string.
            port:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: The Port to target.
              default: 49152
              minimum: 1024
              maximum: 65535
              example: 49152
            targetAgentId:
              $ref: '#/components/schemas/Templates_API_NumberTemplate'
              description: Id of the target agent for the test.
    Templates_API_TransactionTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: web-transactions
      default: web-transactions
    Templates_API_TransactionScriptTemplate:
      description: >-
        Transaction script for transaction test. Must be a JavaScript string
        with escaped quotes.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TransactionTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - interval
        - transactionScript
        - url
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_TransactionTestTypeTemplate'
        targetTime:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
          type: integer
          description: >-
            The target time for a transaction test to complete, in seconds.
            Defaults to 10. Cannot exceed the `timeLimit` value.
          minimum: 1
          maximum: 180
          default: 10
          example: 1
        timeLimit:
          description: The time limit for a transaction test, in seconds. Defaults to 30.
          example: 30
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        transactionScript:
          $ref: '#/components/schemas/Templates_API_TransactionScriptTemplate'
        disableScreenshot:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TransactionTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_HttpServerTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_BrowserTestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_TransactionTestBaseTemplate'
    Templates_API_SipServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: sip-server
      default: sip-server
    Templates_API_SipProtocolTemplate:
      description: >
        The SIP protocol to use for SIP transport layer; defaults to TCP. When
        creating or updating a SIP test, set this field as part of the
        `targetSipCredentials` field.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_SipRegistrarTemplate:
      description: The target SIP server, without port.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TargetSipCredentialsTemplate:
      type: object
      properties:
        authUser:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
        password:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
        port:
          $ref: '#/components/schemas/Templates_API_PortTemplate'
        protocol:
          $ref: '#/components/schemas/Templates_API_SipProtocolTemplate'
        sipRegistrar:
          $ref: '#/components/schemas/Templates_API_SipRegistrarTemplate'
      required:
        - sipRegistrar
        - port
    Templates_API_SipServerTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - targetSipCredentials
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_SipServerTestTypeTemplate'
        desiredStatusCode:
          $ref: '#/components/schemas/Templates_API_NumberTemplate'
          description: The expected SIP response code.
        server:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: The domain and port of the target SIP server.
        protocol:
          $ref: '#/components/schemas/Templates_API_SipProtocolTemplate'
        targetSipCredentials:
          $ref: '#/components/schemas/Templates_API_TargetSipCredentialsTemplate'
    Templates_API_SipServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_SipServerTestBaseTemplate'
    Templates_API_DnsServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: dns-server
      default: dns-server
    Templates_API_DnsServerEntryTemplate:
      description: Server host name (FQDN). Example "www.example.com".
      type: object
      properties:
        serverName:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
      required:
        - serverName
    Templates_API_DnsServersTemplate:
      description: DNS Servers to target
      type: array
      items:
        $ref: '#/components/schemas/Templates_API_DnsServerEntryTemplate'
    Templates_API_DnsTargetDomainTemplate:
      description: >
        Specifies the target DNS host name for the test, suffixed by the record
        type (e.g., www.thousandeyes.com CNAME). If no record type is specified,
        the test will default to an ANY record.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_DnsServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - $ref: '#/components/schemas/Templates_API_NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - dnsServers
            - domain
            - interval
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_DnsServerTestTypeTemplate'
            dnsServers:
              anyOf:
                - $ref: '#/components/schemas/Templates_API_DnsServersTemplate'
                - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
            domain:
              $ref: '#/components/schemas/Templates_API_DnsTargetDomainTemplate'
    Templates_API_DnsTraceTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: dns-trace
      default: dns-trace
    Templates_API_DnsTraceTestTemplate:
      allOf:
        - $ref: '#/components/schemas/Templates_API_TestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - domain
            - interval
          properties:
            type:
              $ref: '#/components/schemas/Templates_API_DnsTraceTestTypeTemplate'
            dnsTransportProtocolTemplate:
              $ref: '#/components/schemas/Templates_API_TransportProtocolTemplate'
            domain:
              $ref: '#/components/schemas/Templates_API_DnsTargetDomainTemplate'
    Templates_API_BgpTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: bgp
      default: bgp
    Templates_API_BgpTestTemplate:
      type: object
      required:
        - type
        - testName
        - prefix
      properties:
        type:
          $ref: '#/components/schemas/Templates_API_BgpTestTypeTemplate'
        testName:
          description: The name of the test, must be unique.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        groups:
          description: >
            The Labels to assign to the test.


            **Deprecation notice:** Labels (`groups`) are based on the V6 API,
            which is deprecated.

            Use `tagIds` instead for V7 API support. Do not use `groups` and
            `tagIds` together on the same test.
          deprecated: true
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/Templates_API_LabelAssignmentTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        tagIds:
          description: >
            The Tags to assign to the test, identified by tag ID. Typically set
            using

            Handlebars references to tags defined in the template. Tags are the
            recommended

            replacement for labels (`groups`) and provide full V7 API support.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagIdListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example:
            - '{{tags.webHealthDashTag.id}}'
            - '{{tags.templateTag.id}}'
        description:
          description: Description of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        prefix:
          description: The BGP prefix to monitor.
          example: 192.0.2.0/24
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_StringTemplate'
        includeCoveredPrefixes:
          description: >-
            Whether to include covered prefixes. 1 denotes true, 0 denotes
            false.
          example: 1
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_NumberTemplate'
        usePublicBgp:
          description: Whether to use public BGP Monitors. 1 denotes true, 0 denotes false.
          example: 0
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_NumberTemplate'
        bgpMonitors:
          description: BGP Monitors to use.
          example:
            - monitorId: 1234
          type: array
          items:
            type: object
            properties:
              monitorId:
                description: The ID of the BGP Monitor.
                anyOf:
                  - type: integer
                  - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_TestConfigurationTemplate:
      description: >
        A ThousandEyes CEA (Synthetic) test configuration that is compatible
        with [ThousandEyes V6
        API](https://developer.cisco.com/docs/thousandeyes/v6/tests-metadata/). 

        All field values can be templated with Handlebars expression unless
        otherwise noted.
      externalDocs:
        url: https://developer.cisco.com/docs/thousandeyes/v6/tests-metadata/
      oneOf:
        - $ref: '#/components/schemas/Templates_API_AgentToServerTestTemplate'
        - $ref: '#/components/schemas/Templates_API_HttpServerTestTemplate'
        - $ref: '#/components/schemas/Templates_API_PageLoadTestTemplate'
        - $ref: '#/components/schemas/Templates_API_AgentToAgentTestTemplate'
        - $ref: '#/components/schemas/Templates_API_VoiceTestTemplate'
        - $ref: '#/components/schemas/Templates_API_TransactionTestTemplate'
        - $ref: '#/components/schemas/Templates_API_SipServerTestTemplate'
        - $ref: '#/components/schemas/Templates_API_DnsServerTestTemplate'
        - $ref: '#/components/schemas/Templates_API_DnsTraceTestTemplate'
        - $ref: '#/components/schemas/Templates_API_BgpTestTemplate'
      discriminator:
        propertyName: type
        mapping:
          agent-to-server: '#/components/schemas/Templates_API_AgentToServerTestTemplate'
          agent-to-agent: '#/components/schemas/Templates_API_AgentToAgentTestTemplate'
          dns-server: '#/components/schemas/Templates_API_DnsServerTestTemplate'
          dns-trace: '#/components/schemas/Templates_API_DnsTraceTestTemplate'
          http-server: '#/components/schemas/Templates_API_HttpServerTestTemplate'
          page-load: '#/components/schemas/Templates_API_PageLoadTestTemplate'
          web-transactions: '#/components/schemas/Templates_API_TransactionTestTemplate'
          sip-server: '#/components/schemas/Templates_API_SipServerTestTemplate'
          voice: '#/components/schemas/Templates_API_VoiceTestTemplate'
          bgp: '#/components/schemas/Templates_API_BgpTestTemplate'
    Templates_API_EndpointTestTypeOptionsTemplate:
      type: string
      enum:
        - Http
        - Network
      example: Http
    Templates_API_EndpointTestTypeTemplate:
      description: |
        The type of Endpoint scheduled test.

        Possible values are:

        - `Network` - endpoint network test
        - `Http` - endpoint http test
      anyOf:
        - $ref: '#/components/schemas/Templates_API_EndpointTestTypeOptionsTemplate'
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointTestCategoryOptionsTemplate:
      type: string
      enum:
        - SCHEDULED_TEST
        - DYNAMIC_APP_TEST
      example: SCHEDULED_TEST
    Templates_API_EndpointTestCategoryTemplate:
      description: Whether the test is `SCHEDULED_TEST` or `DYNAMIC_APP_TEST`.
      anyOf:
        - $ref: >-
            #/components/schemas/Templates_API_EndpointTestCategoryOptionsTemplate
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointAlertRuleConfigTemplate:
      description: Alert rules to associate with the test.
      required:
        - ruleId
      type: object
      properties:
        ruleId:
          description: The ID of the Alert rule to associate with test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointTestIntervalTemplate:
      description: How often the test will run, in seconds.
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      example: 60
    Templates_API_EndpointGenericConfigTemplate:
      description: Settings common to HTTP and Network tests.
      required:
        - interval
        - priority
      type: object
      properties:
        interval:
          description: Interval in seconds of when the test runs.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointTestIntervalTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        priority:
          description: >-
            Define a priority for scheduling. Higher priority value will be
            scheduled first.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointMonitoringSettingsTypeTemplate:
      description: >
        The strategy to use for selecting Endpoint agents to include in a test.
        Possible values are:

        - `SPECIFIC_AGENTS` - use `agentIds` to select a specific set of agents

        - `ANY_AGENT` - select all agents available

        - `LIST_OF_LABELS` - use `labelIds` to select agents based on a set of
        matching labels
      type: string
      enum:
        - ANY_AGENT
        - SPECIFIC_AGENTS
        - LIST_OF_LABELS
      example: ANY_AGENT
    Templates_API_EndpointAgentSelectionConfigTemplate:
      description: >-
        Configuration that will be used to determine what Endpoint Agents to
        assign to a test.
      required:
        - maxMachines
      type: object
      properties:
        monitoringSettingsType:
          anyOf:
            - $ref: >-
                #/components/schemas/Templates_API_EndpointMonitoringSettingsTypeTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        agentIds:
          description: >-
            An array of agent IDs used to assign specific Endpoint Agents to the
            test. Used when `monitoringSettingsType` is `SPECIFIC_AGENTS`.
          anyOf:
            - type: array
              items:
                type: string
                description: Agent ID
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        labelIds:
          description: >-
            An array of label IDs used to assign specific Endpoint Agents to the
            test. Used when `monitoringSettingsType` is `LIST_OF_LABELS`.
          anyOf:
            - type: array
              items:
                type: integer
                description: An Endpoint label ID.
                format: int64
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        maxMachines:
          description: Maximum number of machines assigned to a test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointIpVersionTemplate:
      description: IP version the test should use for network tests.
      type: string
      enum:
        - V4_ONLY
        - V6_ONLY
        - V6_PREFER
        - OS_DEFAULT
      example: V4_ONLY
    Templates_API_EndpointTestConfigProtocolTemplate:
      type: string
      description: The protocol to use for ping/traceroute tests.
      example: AUTODETECT
      enum:
        - UNKNOWN
        - ICMP
        - TCP
        - UDP
        - PREFER_TCP
        - AUTODETECT
    Templates_API_EndpointTcpProbeModeTemplate:
      type: string
      description: Used in TCP mode only.
      enum:
        - UNKNOWN
        - AUTO
        - SYN
        - SACK
      example: SACK
    Templates_API_EndpointNetworkTestConfigTemplate:
      description: Network test settings.
      required:
        - flagPing
        - flagTraceroute
        - ipVersion
        - networkProtocol
        - pathtraceInSession
        - tcpConnect
        - tcpProbeMode
      type: object
      properties:
        flagPing:
          anyOf:
            - type: boolean
              description: Indicates if the test should run ping.
              example: true
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        flagTraceroute:
          anyOf:
            - type: boolean
              description: Indicates if the test should run traceroute.
              example: true
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        ipVersion:
          description: IP version the test should use for network tests.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointIpVersionTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        networkProtocol:
          $ref: >-
            #/components/schemas/Templates_API_EndpointTestConfigProtocolTemplate
        pathtraceInSession:
          type: boolean
          description: Used in TCP mode only.
        tcpProbeMode:
          $ref: '#/components/schemas/Templates_API_EndpointTcpProbeModeTemplate'
        tcpConnect:
          type: boolean
          description: Indicates whether to use TCP Connect when running the ICMP test.
          default: false
          example: false
    Templates_API_EndpointServerConfigTemplate:
      description: Target server information.
      required:
        - port
        - serverName
      type: object
      properties:
        serverName:
          type: string
          description: Server host name or IP.
          example: www.example.com
        port:
          maximum: 65535
          minimum: 0
          type: integer
          description: Server port
          example: 80
    Templates_API_EndpointAuthTypeEnumTemplate:
      description: The authentication type.
      type: string
      enum:
        - NONE
        - BASIC
        - NTLM
        - KERBEROS
        - OAUTH
        - LEGACY
      example: BASIC
    Templates_API_EndpointAuthTypeTemplate:
      description: The authentication type.
      anyOf:
        - $ref: '#/components/schemas/Templates_API_EndpointAuthTypeEnumTemplate'
        - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointHttpTestConfigTemplate:
      description: HTTP test settings.
      required:
        - httpTimeLimit
        - sslVersion
        - targetFetchTime
        - targetResponseTime
        - url
        - verifyCertHostname
      type: object
      properties:
        url:
          description: URL to target for the test.
          anyOf:
            - type: string
              example: https://meet.google.com
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        targetResponseTime:
          description: Target response time in milliseconds.
          anyOf:
            - type: integer
              format: int64
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        targetFetchTime:
          description: Target fetch time in milliseconds.
          anyOf:
            - type: integer
              format: int64
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        headers:
          description: Headers to be used in the HTTP request.
          anyOf:
            - maxLength: 1024
              type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        verifyCertHostname:
          description: Flag indicating if we are to verify the certificate.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        authType:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointAuthTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        bytesToDownload:
          description: >-
            Maximum number of bytes to download on a request. If not present it
            means no limit.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        httpTimeLimit:
          description: >-
            Maximum amount of time in milliseconds the HTTP Server test will
            run.
          anyOf:
            - maximum: 60000
              minimum: 5000
              type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        username:
          description: Username if auth enabled.
          anyOf:
            - maximum: 255
              type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        password:
          description: Password if auth enabled.
          anyOf:
            - maximum: 255
              type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        postBody:
          description: Request body to be used with the POST request.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        contentRegex:
          description: >-
            Regular expression used to validate the received content. Must
            conform with the POSIX Extended Regular Expression Syntax.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        sslVersion:
          description: |
            SSL Version to be used: 
            - `0` - Auto
            - `3` - SSLv3
            - `4` - TLSv1.0
            - `5` - TLSv1.1
            - `6` - TLSv1.2
          anyOf:
            - maximum: 6
              minimum: 0
              type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        expectedResponseCode:
          description: Expected HTTP response code. If not present 2xx or 3xx are expected.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        targetIpOverride:
          description: |
            If set to a valid IP address, this is where the request will
            be sent regardless of what the agent's DNS resolver says.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        clientCert:
          description: Client PEM certificate used during the request.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        userAgent:
          description: >-
            The user-agent string to be used by the request. It can be any
            user-agent string. If not provided, the default implementation
            user-agent is used.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        maxRedirects:
          description: Maximum allowed redirects.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        proxyId:
          description: Proxy used by the agent to execute the test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        proxyDirect:
          description: Indicates if a direct proxy should be used when proxyId is not set.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
    Templates_API_EndpointTestLabelListTemplate:
      description: A list of label IDs identifying label to be assigned.
      type: array
      items:
        $ref: '#/components/schemas/Templates_API_NumberTemplate'
    Templates_API_EndpointTestConfigTemplate:
      description: >
        Configuration settings for a ThousandEyes Endpoint test. All test fields
        can be templated with Handlebars 

        expression unless otherwise noted.
      required:
        - name
        - testCategory
        - testType
        - genericConfig
        - machineConfig
        - networkConfig
      type: object
      properties:
        testName:
          description: The name of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        description:
          description: The description of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        testType:
          description: |
            The type of Endpoint scheduled test.

            Possible values are:

            - `Network` - endpoint network test
            - `Http` - endpoint http test
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointTestTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        testCategory:
          $ref: '#/components/schemas/Templates_API_EndpointTestCategoryTemplate'
        flagEnabled:
          description: Flag indicating if the test is enabled.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        alertRules:
          anyOf:
            - type: array
              description: Alert rules associated with the test config.
              items:
                $ref: >-
                  #/components/schemas/Templates_API_EndpointAlertRuleConfigTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        genericConfig:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointGenericConfigTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        machineConfig:
          anyOf:
            - $ref: >-
                #/components/schemas/Templates_API_EndpointAgentSelectionConfigTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        networkConfig:
          anyOf:
            - $ref: >-
                #/components/schemas/Templates_API_EndpointNetworkTestConfigTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        server:
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointServerConfigTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        httpConfig:
          anyOf:
            - $ref: >-
                #/components/schemas/Templates_API_EndpointHttpTestConfigTemplate
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        testLabelIds:
          description: >
            A list of labels to assign to the test. Typically this value will be
            set using Handlebars

            reference to a user input. Example: `"testLabelIds":
            "[{{labels.endpointLabel.groupId}}]"`


            **Deprecation notice:** Labels (`testLabelIds`) are based on the V6
            API, which is deprecated.

            Use `tagIds` instead for V7 API support. Do not use `testLabelIds`
            and `tagIds` together on the same test.
          deprecated: true
          anyOf:
            - $ref: '#/components/schemas/Templates_API_EndpointTestLabelListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        tagIds:
          description: >
            The Tags to assign to the endpoint test, identified by tag ID.
            Typically set using

            Handlebars references to tags defined in the template. Tags are the
            recommended

            replacement for labels (`testLabelIds`) and provide full V7 API
            support.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagIdListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example:
            - '{{tags.webHealthDashTag.id}}'
            - '{{tags.templateTag.id}}'
    Templates_API_TagObjectTypeTemplate:
      type: string
      description: >
        The type of object associated with the tag. Supported values for
        templates are:

        - `test` - CEA/Synthetic tests

        - `endpoint-test` - Endpoint tests

        - `connected-devices-test` - Connected Devices tests

        - `dashboard` - Dashboards
      enum:
        - test
        - endpoint-test
        - connected-devices-test
        - dashboard
      example: test
    Templates_API_AccessType:
      type: string
      description: >
        The access level of the tag. The access level determines the label's
        visibility in the UI and the permissions required to modify it. Accepted
        values are:



        * `all`: The tag is visible and editable by any user in the account
        group with the standard **View tags** or **Edit tags** permission.
        Default for all user-created tags.


        * `partner`: The tag is owned by a specific integration partner. Only
        that partner can read or modify it. It's hidden from all regular account
        users and excluded from their GET responses.


        * `system`: Reserved for ThousandEyes internal use only. This value may
        appear in GET responses on internally managed tags but cannot be set by
        users or integration partners. 
      enum:
        - all
        - partner
        - system
      example: all
    Templates_API_TagAssignmentObjectType:
      type: string
      description: The type of object that can be assigned a tag.
      enum:
        - test
        - endpoint-test
        - connected-devices-test
        - dashboard
      example: test
    Templates_API_TagAssignmentTemplate:
      type: object
      description: Identifies an object to assign a tag to.
      required:
        - id
        - type
      properties:
        id:
          description: The object ID, typically a Handlebars reference to a deployed test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: '{{tests.httpServerTest.testId}}'
        type:
          description: The type of object being assigned.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagAssignmentObjectType'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: test
    Templates_API_TagAssignmentListTemplate:
      description: A list of objects to assign a tag to.
      type: array
      items:
        $ref: '#/components/schemas/Templates_API_TagAssignmentTemplate'
    Templates_API_TagConfigurationTemplate:
      type: object
      description: >
        A tag configuration object for use in ThousandEyes Templates. Tags use a
        key/value model

        to provide meaningful metadata to ThousandEyes assets (such as tests,
        dashboards, endpoint tests).


        Except for `assignments`, every field on this object defines the tag
        itself (`key`,

        `value`, `objectType`, `accessType`, and optional `color`). In those
        fields, values may

        be plain strings or Handlebars expressions, but only `{{userInputs.*}}`
        and `{{name}}`

        references are allowed.

        References to other template assets such as `{{tests.*}}`,
        `{{endpointTests.*}}`, or

        `{{connectedDevicesTests.*}}` are **not permitted** in tag metadata
        fields and will result

        in an error during deployment.


        The `assignments` field is the exception: it supports the full
        Handlebars context including

        references to `{{tests.*}}`, `{{endpointTests.*}}`, and
        `{{connectedDevicesTests.*}}`,

        allowing you to assign tags to deployed test resources (e.g.,

        `[{ "id": "{{tests.myTest.testId}}", "type": "test" }]`).

        Alternatively, you can use the `tagIds` field on the test configuration
        to associate

        tags with tests.
      required:
        - key
        - value
        - objectType
        - accessType
      properties:
        key:
          description: The tag's key.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: branch
        value:
          description: The tag's value.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: sfo
        objectType:
          description: The type of object the tag is associated with.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagObjectTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        accessType:
          description: The access type of the tag.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_AccessType'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        color:
          description: The tag color as a hex code.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: '#FF0000'
        assignments:
          description: >
            A list of objects to assign this tag to. Unlike tag metadata fields,
            `assignments` supports

            the full Handlebars context including `{{tests.*}}`,
            `{{endpointTests.*}}`, and

            `{{connectedDevicesTests.*}}` references, allowing you to assign
            tags to deployed test

            resources. Assignments are processed in a second phase after all
            tests have been created,

            so test IDs are available for resolution. Assignments are additive:
            existing assignments

            from other deployments are preserved.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_TagAssignmentListTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example:
            - id: '{{tests.httpServerTest.testId}}'
              type: test
            - id: '{{endpointTests.scheduledHttpTest.testId}}'
              type: endpoint-test
    Templates_API_AlertRuleTypeTemplate:
      type: string
      enum:
        - Page Load
        - HTTP Server
        - End-to-End (Server)
        - End-to-End (Agent)
        - Voice
        - DNS Server
        - DNS Trace
        - DNSSEC
        - Web Transactions
        - BGP
        - Path Trace
        - FTP
        - SIP Server
      example: Page Load
    Templates_API_AlertRuleSeverityTemplate:
      type: string
      example: MINOR
      enum:
        - INFO
        - MAJOR
        - MINOR
        - CRITICAL
    Templates_API_AlertRuleConfigurationTemplate:
      type: object
      description: >-
        Alert Rule configuration. See [ThousandEyes v6 API
        spec](https://developer.cisco.com/docs/thousandeyes/v6/metadata/#alert-rule-metadata)
        for schema details.
      externalDocs:
        url: >-
          https://developer.cisco.com/docs/thousandeyes/v6/metadata/#alert-rule-metadata
      required:
        - ruleName
        - alertType
        - expression
        - roundsViolatingRequired
        - roundsViolatingOutOf
      properties:
        ruleName:
          $ref: '#/components/schemas/Templates_API_StringTemplate'
          description: The name of the alert rule.
        alertType:
          description: The type of the alert rule.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_AlertRuleTypeTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        expression:
          description: >-
            The alert rule expression. Must be valid JSON. See [V6
            API](https://developer.cisco.com/docs/thousandeyes/v6/metadata/#expressions)
            documentation for examples.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
          example: ((totalTime >= 500 ms) && (responseTime >= 500 ms))
        roundsViolatingRequired:
          description: >-
            Specifies the numerator (X value) of the "X of Y times" condition in
            an alert rule.
          title: RoundsViolatingRequired
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        roundsViolatingOutOf:
          description: >-
            Specifies the divisor (Y value) of the "X of Y times" condition in
            an alert rule.
          title: RoundsViolatingOutOf
          anyOf:
            - $ref: '#/components/schemas/Templates_API_BooleanNumber'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        severity:
          description: >-
            The severity that will be assigned when an alert is generated by
            this alert rule.
          anyOf:
            - $ref: '#/components/schemas/Templates_API_AlertRuleSeverityTemplate'
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        testIds:
          description: >-
            The tests that the alert rule will be assigned to identified by the
            test ID.
          title: TestIds
          anyOf:
            - type: array
              items:
                type: number
                example: 43289
            - $ref: '#/components/schemas/Templates_API_HandlebarsExpression'
        minimumSources:
          description: >-
            The minimum number of agents that must meet the specified criteria
            in order to trigger an alert.
          type: number
          example: 1
    Templates_API_WidgetType:
      type: string
