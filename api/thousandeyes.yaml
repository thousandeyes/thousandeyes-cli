  /tests/{testId}/snapshot:
    post:
      tags:
        - Test Snapshots
      summary: Create test snapshot
      description: >
        This operation creates a test snapshot based on the properties provided
        in the POST data.


        * To use this endpoint, you need the `Create snapshot shares`
        permission.

        * You can create a maximum of 5 snapshots per organization within a
        5-minute interval.

        * Snapshots generated through this operation have a 30-day expiration
        period.

        * The time range specified with the `from` and `to` parameters must
        adhere to one of the following intervals: 1, 2, 4, 6, 12, 24, or 48
        hours.

        * The `endDate` field of the snapshot must be set to the present or a
        past date.

        * Certain regions may not have public snapshots enabled for compliance
        reasons. In that case you will get a 403 Forbidden as a response.


        **Note**: This operation does not support the creation of operation
        Agent snapshots.
      operationId: createTestSnapshot
      parameters:
        - $ref: '#/components/parameters/Test_Snapshots_API_TestIdPath'
        - $ref: '#/components/parameters/Test_Snapshots_API_AccountGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Test_Snapshots_API_SnapshotRequest'
      responses:
        '201':
          description: Created
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Test_Snapshots_API_SnapshotResponse'
        '400':
          $ref: '#/components/responses/Test_Snapshots_API_400'
        '401':
          $ref: '#/components/responses/Test_Snapshots_API_401'
        '403':
          $ref: '#/components/responses/Test_Snapshots_API_403'
        '404':
          $ref: '#/components/responses/Test_Snapshots_API_404'
        '429':
          $ref: '#/components/responses/Test_Snapshots_API_429'
        '500':
          $ref: '#/components/responses/Test_Snapshots_API_500'
        '502':
          $ref: '#/components/responses/Test_Snapshots_API_502'
        default:
          $ref: '#/components/responses/Test_Snapshots_API_GeneralError'
      security:
        - Test_Snapshots_API_BearerAuth: []
