      type: object
      allOf:
        - $ref: '#/components/schemas/Endpoint_Test_Results_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: >-
                  #/components/schemas/Endpoint_Test_Results_API_ValidationErrorItem
    Endpoint_Test_Results_API_SortOrder:
      type: string
      example: desc
      description: >-
        Parameter indicates the ascending/descending  order of the sorting,
        using either the asc or desc values.
      enum:
        - asc
        - desc
    Endpoint_Test_Results_API_ConditionalOperator:
      type: string
      enum:
        - and
        - or
      example: and
    Endpoint_Test_Results_API_ThresholdFilterOperator:
      type: string
      enum:
        - gte
        - lte
      example: gte
    Endpoint_Test_Results_API_AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Endpoint_Test_Results_API_EndpointAgentId:
      type: string
      format: uuid
      description: Unique ID of endpoint agent, from `/endpoint/agents` endpoint.
      example: 861b7557-cd57-4bbb-b648-00bddf88ef49
      readOnly: true
    Endpoint_Test_Results_API_BatteryLevel:
      description: Battery level indicator.
      type: string
      example: medium
      enum:
        - high
        - medium
        - low
    Endpoint_Test_Results_API_BatteryMetrics:
      description: Battery metrics for the endpoint agent.
      type: object
      readOnly: true
      properties:
        batteryLevel:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_BatteryLevel'
        batteryLevelNormalizedPercent:
          type: number
          format: double
          description: Battery level as a normalized percentage (0-1).
          example: 0.3
          minimum: 0
          maximum: 1
      required:
        - batteryLevel
        - batteryLevelNormalizedPercent
    Endpoint_Test_Results_API_CellularNetworkGen:
      description: Cellular network generation.
      type: string
      example: 2g, 3g, 4g, 5g
    Endpoint_Test_Results_API_CellularProfile:
      description: Cellular network profile information for a mobile endpoint agent.
      type: object
      readOnly: true
      properties:
        carrierName:
          type: string
          description: Carrier name
          example: T-Mobile
        networkGen:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_CellularNetworkGen'
        networkSubtype:
          type: string
          description: >-
            A real network subtype. It may be different from an advertised
            network type.
          example: LTE/HSPA
        advertisedNetworkGen:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_CellularNetworkGen'
        advertisedNetworkSubtype:
          type: string
          description: Advertised Network subtype
          example: LTE/HSPA
        rssi:
          type: number
          format: double
          description: >-
            Received Signal Strength Indicator in dBm. Values are always
            negative.
          example: -10
        rsrp:
          type: number
          format: double
          description: Reference Signal Received Power in dBm. Values are always negative.
          example: -30
        rscp:
          type: number
          format: double
          description: >-
            Received Signal Code Power in dBm. Values are always negative or
            zero.
          example: -30
        rsrq:
          type: number
          format: double
          description: >-
            Reference Signal Received Quality in dBm. Values are always
            negative.
          example: -30
        sinr:
          type: number
          format: double
          description: >-
            Signal to Interference and Noise Ratio in dBm. It can be negative or
            positive.
          example: 20
    Endpoint_Test_Results_API_Platform:
      description: OS platform types. Platform "linux" was recently renamed to "roomos".
      type: string
      enum:
        - windows
        - roomos
        - phoneos
        - elux
        - cisco-wireless
        - linux
        - mac
        - android
        - unknown
      example: mac
    Endpoint_Test_Results_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Endpoint_Test_Results_API_EndpointTestSelfLink:
      allOf:
        - description: A reference to the test.
          example:
            href: >-
              https://api.thousandeyes.com/v7/endpoint/tests/{type}/281474976710706
        - $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
    Endpoint_Test_Results_API_ScheduledTestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Endpoint_Test_Results_API_Link'
      example:
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/network/filter
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/pathvis
    Endpoint_Test_Results_API_EndpointTestLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_EndpointTestSelfLink'
        testResults:
          $ref: '#/components/schemas/Endpoint_Test_Results_API_ScheduledTestResults'
      readOnly: true
