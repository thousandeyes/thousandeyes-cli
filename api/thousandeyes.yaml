        SSL version options:

        * Use '0' for automatic selection.
        * Use '3' for SSLv3.
        * Use '4' for TLS v1.0.
        * Use '5' for TLS v1.1.
        * Use '6' for TLS v1.2.
        * Use '7' for TLS v1.3.
      enum:
        - '0'
        - '3'
        - '4'
        - '5'
        - '6'
        - '7'
      default: '0'
      example: '0'
