        metric:
          type: string
          description: Name of the metric.
          example: Availability
        testId:
          type: string
          description: Identifier of the test.
          example: '68257'
        points:
          type: array
          items:
            $ref: '#/components/schemas/Dashboards_API_ApiGraphletPoint'
    Dashboards_API_ApiWidgetDataPoint:
