          readOnly: true
    Endpoint_Test_Results_API_CpuUtilization:
      type: object
      properties:
        min:
          type: number
          format: double
          description: >-
            The minimum sampled usage value recorded during the monitored
            period.
          example: 0.22
          minimum: 0
          maximum: 1
          readOnly: true
        max:
          type: number
          format: double
          description: >-
            The maximum sampled usage value recorded during the monitored
            period.
          example: 0.75
          minimum: 0
          maximum: 1
          readOnly: true
        mean:
          type: number
          format: double
          description: >-
            The mean (average) sampled usage value recorded during the monitored
            period.
          example: 0.55
          minimum: 0
          maximum: 1
          readOnly: true
        median:
          type: number
          format: double
          description: The median sampled usage value recorded during the monitored period.
          example: 0.61
          minimum: 0
          maximum: 1
          readOnly: true
        stdDev:
          type: number
          format: double
          description: >-
            The standard deviation of sampled usage values recorded during the
            monitored period.
          example: 0.01
          minimum: 0
          maximum: 1
          readOnly: true
        count:
          type: integer
          description: The total number of samples collected during the monitored period.
          example: 150
          readOnly: true
    Endpoint_Test_Results_API_PhysicalMemoryUsedBytes:
      type: object
      properties:
        min:
          type: number
          format: double
          description: >-
            The minimum sampled memory usage value recorded during the monitored
            period.
          example: 1.2
          readOnly: true
        max:
          type: number
          format: double
          description: >-
            The maximum sampled memory usage value recorded during the monitored
            period.
          example: 2.5
          readOnly: true
        mean:
          type: number
          format: double
          description: >-
            The mean (average) value of memory usage sampled over the monitored
            period.
          example: 1.77
          readOnly: true
        median:
          type: number
          format: double
          description: The median value of memory usage sampled over the monitored period.
          example: 1.85
          readOnly: true
        stdDev:
          type: number
          format: double
          description: >-
            The standard deviation of memory usage sampled during the monitored
            period.
          example: 0.25
          readOnly: true
        count:
          type: integer
          description: The total number of samples collected during the monitored period.
          example: 155
          readOnly: true
    Endpoint_Test_Results_API_SystemMetricDetails:
      type: object
      description: >
        Details of system metrics that contain top applications by CPU/memory
        usage.

        Not populated by default.
