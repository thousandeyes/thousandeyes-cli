      properties:
        groupProperty:
          type: string
          description: >-
            Defines the criterion used to aggregate data points under specific
            group values.
          example: AGENT
        groupLabels:
          type: array
          description: List of group labels.
          items:
            $ref: >-
              #/components/schemas/Dashboards_API_ApiReportDataComponentLabelMapEntry
    Dashboards_API_ApiReportDataComponentLabelMapEntry:
      type: object
      description: Represents a mapping entry of a group label.
      properties:
        groupId:
          type: string
          description: Identifier of the group.
          example: '2565'
        groupLabel:
          type: string
          description: Label of the group.
          example: San Francisco, CA
    Dashboards_API_ApiTestTableData:
      type: object
