              type: number
              description: Percentage of packets not reaching destination.
              example: 0
              format: double
              readOnly: true
            maxLatency:
              type: number
              description: Maximum RTT for packets sent to destination.
              example: 168
              format: double
              readOnly: true
            minLatency:
              type: number
              description: Minimum RTT for packets sent to destination.
              example: 167
              format: double
              readOnly: true
    Endpoint_Test_Results_API_SystemMetrics:
      type: object
