      summary: Retrieve network scheduled test results
      description: >
        Returns network metrics (loss, latency, and jitter) from each endpoint
        agent, for each roundId within the specified time window, as determined
        by search filters. If a time frame is provided, the rounds relevant to
        that time frame are returned, and the order is not predefined unless the
        user specifies a sort order in the filter.

        When no time frame is provided, the latest rounds are returned.
      operationId: filterScheduledTestNetworkResults
      parameters:
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_TestIdPath'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_AccountGroupId'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_Window'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_StartDateParameter'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_EndDateParameter'
        - $ref: '#/components/parameters/Endpoint_Test_Results_API_PaginationCursor'
        - $ref: >-
            #/components/parameters/Endpoint_Test_Results_API_ExpandEndpointNetwork
      requestBody:
        description: Tests data search filters.
        content:
          application/json:
            schema:
              $ref: >-
                #/components/schemas/Endpoint_Test_Results_API_EndpointTestsDataRoundsSearch
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: >-
                  #/components/schemas/Endpoint_Test_Results_API_NetworkEndpointTestResults
        '401':
          $ref: '#/components/responses/Endpoint_Test_Results_API_401'
        '403':
          $ref: '#/components/responses/Endpoint_Test_Results_API_403'
        '404':
          $ref: '#/components/responses/Endpoint_Test_Results_API_404'
        '429':
