      operationId: getUsage
      description: >-
        This operation returns usage for the current period. It provides
        visibility across all account groups within an organization. To access
        this endpoint, you need the `View Billing` permission (a management
        permission). If you have access to view billing in multiple
        organizations, query the endpoint using an `aid` querystring parameter
