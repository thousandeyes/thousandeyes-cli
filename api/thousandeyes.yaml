          type: string
          description: >-
            The target server IP resolved by the agent. Depending on the failure
            type, the IP may not be present. For example, if the agent failed to
            resolve it or if the requests were routed through the proxy.
          example: 216.239.32.10
          readOnly: true
        affectedTestIds:
          type: array
          description: >-
            An array of unique test IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '123'
            - '1234'
        affectedAgentIds:
          type: array
          description: >-
            An array of unique agent IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '2954'
            - '2953'
    Event_Detection_API_EventApiAffectedAgent:
      type: object
      properties:
        agentId:
          type: string
          description: The ID of the virtual agent.
          example: '2954'
          readOnly: true
        type:
          $ref: '#/components/schemas/Event_Detection_API_CloudEnterpriseAgentType'
        name:
          type: string
          description: The name of the agent as defined in settings.
          example: São Paulo, Brazil - agent
          readOnly: true
        location:
          type: string
          description: The name of the agent's location.
          example: São Paulo, Brazil
          readOnly: true
        countryCode:
          type: string
          description: The country code of the agent's location .
          example: BR
          readOnly: true
        affectedTargetIds:
          type: array
          description: >-
            An array of unique target IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '123'
            - '1234'
        affectedTestIds:
          type: array
          description: >-
            An array of unique agent IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '2954'
            - '2953'
        _links:
          $ref: '#/components/schemas/Event_Detection_API_AgentLinks'
    Event_Detection_API_EventStartDate:
      type: string
      format: date-time
      description: >-
        The start date and time (in UTC, ISO 8601 format) when the event was
        first detected.
      example: '2020-04-23T13:43:16Z'
      readOnly: true
    Event_Detection_API_EventEndDate:
      type: string
      nullable: true
      format: date-time
      description: >-
        The end date and time (in UTC, ISO 8601 format) when the event was
        resolved (due to timeout). This value is populated for "ongoing" events.
      example: '2020-04-23T13:43:16Z'
      readOnly: true
    Event_Detection_API_EventAlertSeverity:
      type: string
      description: The severity of the alert.
      enum:
        - high
        - medium
        - low
        - unknown
      example: medium
    Event_Detection_API_EventType:
      type: string
      description: >-
        Specifies the event type in a machine-readable and backwards-compatible
        format. Allowed values are: `agent-local`, `network-pop`, `network`,
        `dns`, `target`, and `proxy`.
      enum:
        - agent-local
        - network-pop
        - network
        - dns
        - target
        - target-network
        - proxy
      example: target
      readOnly: true
    Event_Detection_API_TargetEventType:
      type: string
      description: Target event type.
      example: target
      pattern: ^target$
    Event_Detection_API_TargetNetworkEventType:
      type: string
      description: Target network event type.
      example: target-network
      pattern: ^target-network$
    Event_Detection_API_ProxyEventType:
      type: string
      description: Proxy event type.
      example: proxy
      pattern: ^proxy$
    Event_Detection_API_DnsEventType:
      type: string
      description: DNS event type.
      example: dns
      pattern: ^dns$
    Event_Detection_API_AgentLocalEventType:
      type: string
      description: Agent local event type.
      example: agent-local
      pattern: ^agent-local$
    Event_Detection_API_NetworkEventType:
      type: string
      description: Network event type.
      example: network
      pattern: ^network$
    Event_Detection_API_NetworkPopEventType:
      type: string
      description: Network pop event type.
      example: network-pop
      pattern: ^network-pop$
    Event_Detection_API_EventState:
      type: string
      description: >-
        Indicates the state of the event, whether it is ongoing (active) or has
        been resolved.
      enum:
        - active
        - resolved
      example: resolved
      readOnly: true
    Event_Detection_API_Cause:
      uniqueItems: true
      type: array
      description: The cause of the error.
      items:
        type: string
      example:
        - Network Loss and/or High RTT
    Event_Detection_API_AgentLinks:
      type: object
      description: A links object containing the agent link.
      readOnly: true
      properties:
        agent:
          $ref: '#/components/schemas/Event_Detection_API_Link'
    Event_Detection_API_EventTestLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        test:
          $ref: '#/components/schemas/Event_Detection_API_Link'
    Event_Detection_API_PaginationNextAndSelfLinks:
      type: object
      description: >-
        A links object containing pagination-related links, including only next
        and self.
      properties:
        next:
          $ref: '#/components/schemas/Event_Detection_API_Link'
        self:
          $ref: '#/components/schemas/Event_Detection_API_Link'
    Event_Detection_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Event_Detection_API_ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    Event_Detection_API_ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Event_Detection_API_Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/Event_Detection_API_ValidationErrorItem'
    Event_Detection_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Event_Detection_API_AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Event_Detection_API_StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Event_Detection_API_EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    Event_Detection_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Event_Detection_API_SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Event_Detection_API_Link'
    Event_Detection_API_TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    Event_Detection_API_CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    Endpoint_Tests_API_DynamicTests:
      type: object
      properties:
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Tests_API_DynamicTest'
        _links:
          $ref: '#/components/schemas/Endpoint_Tests_API_SelfLinks'
    Endpoint_Tests_API_EndpointTests:
      type: object
      properties:
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTest'
        _links:
          $ref: '#/components/schemas/Endpoint_Tests_API_SelfLinks'
    Endpoint_Tests_API_EndpointAgentToServerTests:
      type: object
      properties:
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Tests_API_EndpointAgentToServerTest'
        _links:
          $ref: '#/components/schemas/Endpoint_Tests_API_SelfLinks'
    Endpoint_Tests_API_EndpointHttpServerTests:
      type: object
      properties:
        tests:
          type: array
          items:
            $ref: '#/components/schemas/Endpoint_Tests_API_EndpointHttpServerTest'
        _links:
          $ref: '#/components/schemas/Endpoint_Tests_API_SelfLinks'
    Endpoint_Tests_API_EndpointHttpTestUpdate:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Tests_API_TestUpdate'
        - type: object
          properties:
            url:
              $ref: >-
                #/components/schemas/Endpoint_Tests_API_EndpointHttpServerTestUrl
    Endpoint_Tests_API_EndpointNetworkTestUpdate:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Tests_API_TestUpdate'
        - type: object
          properties:
            port:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestPort'
            server:
              type: string
              description: Target domain name or IP address.
              example: www.example.com
    Endpoint_Tests_API_EndpointDynamicTestUpdate:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Tests_API_TestUpdate'
        - type: object
          properties:
            application:
              $ref: '#/components/schemas/Endpoint_Tests_API_DynamicTestApplication'
    Endpoint_Tests_API_UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    Endpoint_Tests_API_Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    Endpoint_Tests_API_EndpointTestAgentSelectorType:
      type: string
      enum:
        - all-agents
        - specific-agents
        - agent-labels
      description: >-
        Retrieve either all available agents, a specific list of agents, or a
        list of agent labels.
      default: all-agents
      example: all-agents
    Endpoint_Tests_API_EndpointTestAgents:
      type: array
      description: >-
        List of endpoint agent IDs (obtained from `/endpoint/agents` endpoint).
        Required when `agentSelectorType` is set to `specific-agent`.
      items:
        type: string
        format: uuid
      example:
        - 0a3b9998-dc3a-4ff2-b50d-ac4a7cd986e1
        - 66eec0f1-72b4-4755-aa83-3aed61d17f3c
    Endpoint_Tests_API_EndpointAgentLabels:
      type: array
      description: >-
        List of endpoint agent label IDs (obtained from `/endpoint/labels`
        endpoint), required when `agentSelectorType` is set to `agent-labels`.
      items:
        type: string
      example:
        - '567'
        - '214'
    Endpoint_Tests_API_EndpointTestMaxMachines:
      type: integer
      description: Maximum number of agents which can execute the test.
      default: 25
      example: 25
    Endpoint_Tests_API_TestName:
      type: string
      description: Name of the test.
      example: Test name
    Endpoint_Tests_API_EndpointIpVersionIn:
      description: For configuring network tests, the IP version of the test.
      type: string
      enum:
        - V4_ONLY
        - V6_ONLY
        - V6_PREFER
        - OS_DEFAULT
      example: V4_ONLY
    Endpoint_Tests_API_EndpointInstantTest:
      type: object
      required:
        - testName
      properties:
        agentSelectorType:
          $ref: >-
            #/components/schemas/Endpoint_Tests_API_EndpointTestAgentSelectorType
        agents:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestAgents'
        endpointAgentLabels:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointAgentLabels'
        maxMachines:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestMaxMachines'
        testName:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestName'
        ipVersion:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointIpVersionIn'
    Endpoint_Tests_API_EndpointTestPort:
      type: integer
      description: Port number.
      default: 443
      example: 443
    Endpoint_Tests_API_EndpointAgentToServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/Endpoint_Tests_API_EndpointInstantTest'
        - type: object
          required:
            - server
          properties:
            serverName:
              type: string
              deprecated: true
              description: >-
                A server address without a protocol or IP address. **Deprecated,
                use `server` instead**.
              example: www.example.com
            server:
              type: string
              description: Target domain name or IP address.
              example: www.example.com
            port:
              $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestPort'
    Endpoint_Tests_API_TestIsPrioritized:
      type: boolean
      description: >-
        Indicates whether the test should be prioritized when the number of
        tests assigned to an agent exceeds the license limit.
      default: false
      example: false
    Endpoint_Tests_API_TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Endpoint_Tests_API_EndpointTestProtocol:
      type: string
      enum:
        - icmp
        - icmp-with-tcp-connect
        - tcp
        - prefer-tcp
        - ast-autodetect
        - autodetect
      description: Protocol requested for the test.
      default: icmp
      example: icmp
    Endpoint_Tests_API_EndpointAgentToServerTestRequest:
      allOf:
        - $ref: >-
            #/components/schemas/Endpoint_Tests_API_EndpointAgentToServerInstantTest
        - type: object
          properties:
            isPrioritized:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestIsPrioritized'
            interval:
              $ref: '#/components/schemas/Endpoint_Tests_API_TestInterval'
            protocol:
              $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestProtocol'
    Endpoint_Tests_API_AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    Endpoint_Tests_API_Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    Endpoint_Tests_API_EndpointTestSelfLink:
      allOf:
        - description: A reference to the test.
          example:
            href: >-
              https://api.thousandeyes.com/v7/endpoint/tests/{type}/281474976710706
        - $ref: '#/components/schemas/Endpoint_Tests_API_Link'
    Endpoint_Tests_API_ScheduledTestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Endpoint_Tests_API_Link'
      example:
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/network/filter
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/pathvis
    Endpoint_Tests_API_EndpointTestLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestSelfLink'
        testResults:
          $ref: '#/components/schemas/Endpoint_Tests_API_ScheduledTestResults'
      readOnly: true
    Endpoint_Tests_API_EndpointAllAgentsSelectorConfig:
      type: object
      description: Any agent selection object.
      readOnly: true
      properties:
        agentSelectorType:
          example: all-agents
          pattern: ^all-agents$
          type: string
        maxMachines:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestMaxMachines'
      required:
        - agentSelectorType
    Endpoint_Tests_API_EndpointAgentLabelsSelectorConfig:
      type: object
      description: Agent labels selection object.
      readOnly: true
      properties:
        agentSelectorType:
          example: agent-labels
          pattern: ^agent-labels$
          type: string
        maxMachines:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestMaxMachines'
        endpointAgentLabels:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointAgentLabels'
      required:
        - agentSelectorType
    Endpoint_Tests_API_EndpointSpecificAgentsSelectorConfig:
      type: object
      description: Specific agents selection object.
      readOnly: true
      properties:
        agentSelectorType:
          type: string
          pattern: ^specific-agents$
          example: specific-agents
        maxMachines:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestMaxMachines'
        agents:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestAgents'
      required:
        - agentSelectorType
    Endpoint_Tests_API_EndpointAgentSelectorConfig:
      type: object
      description: Agents selection object based on agentSelectorType.
      readOnly: true
      oneOf:
        - $ref: >-
            #/components/schemas/Endpoint_Tests_API_EndpointAllAgentsSelectorConfig
        - $ref: >-
            #/components/schemas/Endpoint_Tests_API_EndpointAgentLabelsSelectorConfig
        - $ref: >-
            #/components/schemas/Endpoint_Tests_API_EndpointSpecificAgentsSelectorConfig
      discriminator:
        propertyName: agentSelectorType
        mapping:
          all-agents: >-
            #/components/schemas/Endpoint_Tests_API_EndpointAllAgentsSelectorConfig
          specific-agents: >-
            #/components/schemas/Endpoint_Tests_API_EndpointSpecificAgentsSelectorConfig
          agent-labels: >-
            #/components/schemas/Endpoint_Tests_API_EndpointAgentLabelsSelectorConfig
      required:
        - agentSelectorType
    Endpoint_Tests_API_TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    Endpoint_Tests_API_TestIsEnabled:
      type: boolean
      description: Indicates if test is enabled.
      example: true
      default: true
    Endpoint_Tests_API_TestIsSavedEvent:
      type: boolean
      description: >
        Indicates if the test is a saved event.


        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      example: false
      readOnly: true
    Endpoint_Tests_API_TestHasPathTraceInSession:
      type: boolean
      description: >-
        Enables "in session" path trace. When enabled, this option initiates a
        TCP session with the target server and sends path trace packets within
        the established TCP session.
      example: true
    Endpoint_Tests_API_TestLabel:
      type: object
      properties:
        labelId:
          type: string
          description: Label ID.
        name:
          type: string
          description: Name of the label.
        isBuiltin:
          type: boolean
          description: >-
            Value indicating if the label in question is BuiltIn (Account Admin,
            Organization Admin, Regular User).
      example:
        labelId: '961'
        name: Artem label
        isBuiltin: false
    Endpoint_Tests_API_TestLabels:
      type: array
      description: >-
        Labels to which the test is assigned. This field is not returned for
        Instant Tests.
      readOnly: true
      items:
        $ref: '#/components/schemas/Endpoint_Tests_API_TestLabel'
    Endpoint_Tests_API_TestNetworkMeasurements:
      type: boolean
      description: >-
        Enable or disable network measurements. Set to true to enable or false
        to disable network measurements.
      default: true
      example: true
    Endpoint_Tests_API_EndpointIpVersionOut:
      description: >-
        For reading current network test configurations, the IP version of the
        test. Values include V4_ONLY, V6_ONLY, V6_PREFER, and OS_DEFAULT.
      type: string
      example: V4_ONLY
    Endpoint_Tests_API_EndpointScheduledTestType:
      type: string
      enum:
        - agent-to-server
        - http-server
      description: Type of test being queried.
      example: agent-to-server
      readOnly: true
    Endpoint_Tests_API_TestProbeModeResponse:
      type: string
      enum:
        - auto
        - sack
        - syn
        - syn-pcap
        - syn-socket
        - unknown
      description: >-
        Probe mode returned by network test APIs, only valid when the protocol
        is set to TCP. Configuration responses return user-selectable values,
        while result responses may also return resolved driver values.
      default: auto
      example: auto
    Endpoint_Tests_API_EndpointTest:
      type: object
      required:
        - type
      properties:
        aid:
          $ref: '#/components/schemas/Endpoint_Tests_API_AccountGroupId'
        _links:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointTestLinks'
        agentSelectorConfig:
          $ref: '#/components/schemas/Endpoint_Tests_API_EndpointAgentSelectorConfig'
        createdDate:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestCreatedDate'
        isPrioritized:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestIsPrioritized'
        interval:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestInterval'
        isEnabled:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestIsEnabled'
        isSavedEvent:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestIsSavedEvent'
        hasPathTraceInSession:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestHasPathTraceInSession'
        labels:
          $ref: '#/components/schemas/Endpoint_Tests_API_TestLabels'
        modifiedDate:
