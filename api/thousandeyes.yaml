          format: int64
          description: Relative timespan in seconds.
          example: 7200
        start:
          type: string
          format: date-time
          description: UTC start date of the timespan range (ISO date-time format).
          example: '2023-05-16T10:14:28Z'
        end:
          type: string
          format: date-time
