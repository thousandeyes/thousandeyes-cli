        fixedPacketRate:
          $ref: '#/components/schemas/Tests_API_TestFixedPacketRate'
        overrideAgentProxy:
          $ref: '#/components/schemas/Tests_API_TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/Tests_API_TestOverrideProxyId'
        collectProxyNetworkData:
          $ref: '#/components/schemas/Tests_API_TestCollectProxyNetworkData'
    Tests_API_TestHeaders:
      type: array
      description: HTTP request headers used.
      items:
        type: string
      example:
        - 'header1: value1'
        - 'header2: value2'
    Tests_API_TestHttpType:
      type: string
