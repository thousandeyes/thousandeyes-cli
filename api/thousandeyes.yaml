externalDocs:
  description: Find out more about ThousandEyes
  url: https://developer.thousandeyes.com/
paths:
  /tests:
    get:
      tags:
        - Tests
      summary: List configured tests
      operationId: getTests
      description: >
        Returns configured tests and saved events.


        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      parameters:
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Tests_API_Tests'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
          $ref: '#/components/responses/Tests_API_502'
        default:
          $ref: '#/components/responses/Tests_API_GeneralError'
      security:
        - Tests_API_BearerAuth: []
  /tests/bgp:
    get:
      tags:
        - BGP Tests
      summary: List BGP tests
      operationId: getBgpTests
      description: >
        Returns a list of BGP tests and saved events.


        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      parameters:
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Tests_API_BgpTests'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
          $ref: '#/components/responses/Tests_API_502'
        default:
          $ref: '#/components/responses/Tests_API_GeneralError'
      security:
        - Tests_API_BearerAuth: []
    post:
      tags:
        - BGP Tests
      summary: Create BGP test
      operationId: createBgpTest
      description: Creates a new BGP test. This method requires Account Admin permissions.
      parameters:
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
        - $ref: '#/components/parameters/Tests_API_ExpandBgpTest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tests_API_BgpTestRequest'
      responses:
        '201':
          description: Created
          headers:
            Location:
              $ref: '#/components/headers/Tests_API_Location'
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Tests_API_BgpTestResponse'
        '400':
          $ref: '#/components/responses/Tests_API_400'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
          $ref: '#/components/responses/Tests_API_502'
        default:
          $ref: '#/components/responses/Tests_API_GeneralError'
      security:
        - Tests_API_BearerAuth: []
  /tests/bgp/{testId}:
    get:
      tags:
        - BGP Tests
      summary: Get BGP test
      operationId: getBgpTest
      description: >-
        Returns details for a BGP test, including name, intervals, targets,
        alert rules and agents.
      parameters:
        - $ref: '#/components/parameters/Tests_API_TestIdPath'
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
        - $ref: '#/components/parameters/Tests_API_ExpandBgpTest'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Tests_API_BgpTestResponse'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
          $ref: '#/components/responses/Tests_API_502'
        default:
          $ref: '#/components/responses/Tests_API_GeneralError'
      security:
        - Tests_API_BearerAuth: []
    put:
      tags:
        - BGP Tests
      summary: Update BGP test
      operationId: updateBgpTest
      description: >-
        Updates a BGP test. Shared tests have limited updating capabilities.
        Only account-specific configurations may be updated, namely: alert
        rules, alert suppression windows, labels, tags. This method requires
        Account Admin permissions.

        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      parameters:
        - $ref: '#/components/parameters/Tests_API_TestIdPath'
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
        - $ref: '#/components/parameters/Tests_API_ExpandBgpTest'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tests_API_UpdateBgpTestRequest'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Tests_API_BgpTestResponse'
        '400':
          $ref: '#/components/responses/Tests_API_400'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
          $ref: '#/components/responses/Tests_API_502'
        default:
          $ref: '#/components/responses/Tests_API_GeneralError'
      security:
        - Tests_API_BearerAuth: []
    delete:
      tags:
        - BGP Tests
      summary: Delete BGP test
      operationId: deleteBgpTest
      description: Deletes a BGP test. This method requires Account Admin permissions.
      parameters:
        - $ref: '#/components/parameters/Tests_API_TestIdPath'
        - $ref: '#/components/parameters/Tests_API_AccountGroupId'
      responses:
        '204':
          $ref: '#/components/responses/Tests_API_204'
        '401':
          $ref: '#/components/responses/Tests_API_401'
        '403':
          $ref: '#/components/responses/Tests_API_403'
        '404':
          $ref: '#/components/responses/Tests_API_404'
        '429':
          $ref: '#/components/responses/Tests_API_429'
        '500':
          $ref: '#/components/responses/Tests_API_500'
        '502':
