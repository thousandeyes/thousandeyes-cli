  /test-results/{testId}/path-vis:
    get:
      tags:
        - Network Test Results
      summary: Get path visualization network test results
      description: >
        Returns a summary of the path trace data collected during path
        visualization for a given time range. With each attempt, three tries are
        made to reach the destination. The entire path is displayed in order. If
        you do not specify a window or a start and end date, data is displayed
        for the most recent testing round. 


        Bidirectional agent-to-agent tests also support the `direction`
        parameter. For example, if agents A, B, and C are testing agent D
        bidirectionally, and you want results from the route from agent A to
        agent D, you can use the query `direction=to-target`. For results from
        agent D to agent A, you can use `direction=from-target`. To get both
        results for both routes, query without the direction parameter. The
        source will always be agent A and the destination will be agent D, but
        the direction field will indicate which trace direction you want test
        results from.
      operationId: getTestPathVisResults
      parameters:
        - $ref: '#/components/parameters/Test_Results_API_TestIdPath'
        - $ref: '#/components/parameters/Test_Results_API_AccountGroupId'
        - $ref: '#/components/parameters/Test_Results_API_Window'
